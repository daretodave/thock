<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock group-buy hero — GMK CYL Ishtar R2, six Cherry-profile keycaps with two focal terracotta caps and a glyph mark</title>

  <!--
    Composition: six Cherry-profile keycaps, top-down with a hint of front-edge bevel,
    arranged in two staggered rows of three. Each cap is ~150×150 with a slight
    trapezoidal sculpt (front lip lower than back). Two focal caps are washed in
    muted terracotta (oklch(0.62 0.13 35)) — one in each row to balance the eye —
    and the front-row focal cap carries a ziggurat-chevron glyph in the same hue,
    a quiet nod to the Mesopotamian theme without leaning on iconography.
    Editorial — readable at thumbnail.
  -->

  <!-- ── BACK ROW (three caps, staggered right) ────────────────────────────────────────── -->

  <!-- Back row, cap 1 (warm-grey stroke) -->
  <g>
    <!-- Cap body: top-down trapezoid, front edge slightly narrower -->
    <path d="
      M 305 215
      L 445 215
      L 455 350
      L 295 350
      Z" />
    <!-- Cherry sculpt: dished top surface — inset, with the front lip visible as a thin band -->
    <path d="
      M 322 230
      L 428 230
      L 432 318
      L 318 318
      Z" stroke-opacity="0.55"/>
    <!-- Front lip band — Cherry's lower-than-OEM front edge -->
    <path d="M 318 318 L 432 318 L 442 340 L 308 340 Z" stroke-opacity="0.4"/>
    <!-- Subtle row-sculpt indicator (centerline curve) -->
    <path d="M 326 270 Q 375 260 424 270" stroke-opacity="0.3"/>
  </g>

  <!-- Back row, cap 2 — FOCAL (terracotta splash) -->
  <g>
    <!-- Splash wash on the cap surface -->
    <path d="
      M 525 215
      L 665 215
      L 675 350
      L 515 350
      Z"
      fill="oklch(0.62 0.13 35 / 0.22)"
      stroke="oklch(0.62 0.13 35)"/>
    <!-- Inset dish with deeper terracotta wash -->
    <path d="
      M 542 230
      L 648 230
      L 652 318
      L 538 318
      Z"
      fill="oklch(0.62 0.13 35 / 0.32)"
      stroke="oklch(0.62 0.13 35)"
      stroke-opacity="0.85"/>
    <!-- Front lip -->
    <path d="M 538 318 L 652 318 L 662 340 L 528 340 Z"
      fill="oklch(0.62 0.13 35 / 0.18)"
      stroke="oklch(0.62 0.13 35)"
      stroke-opacity="0.7"/>
    <!-- Row-sculpt centerline -->
    <path d="M 546 270 Q 595 260 644 270" stroke="oklch(0.62 0.13 35)" stroke-opacity="0.55"/>
  </g>

  <!-- Back row, cap 3 (warm-grey stroke) -->
  <g>
    <path d="
      M 745 215
      L 885 215
      L 895 350
      L 735 350
      Z" />
    <path d="
      M 762 230
      L 868 230
      L 872 318
      L 758 318
      Z" stroke-opacity="0.55"/>
    <path d="M 758 318 L 872 318 L 882 340 L 748 340 Z" stroke-opacity="0.4"/>
    <path d="M 766 270 Q 815 260 864 270" stroke-opacity="0.3"/>
  </g>

  <!-- ── FRONT ROW (three caps, staggered left — offset by ~half cap width) ──────────────── -->

  <!-- Front row, cap 1 — FOCAL (terracotta splash) WITH ZIGGURAT GLYPH -->
  <g>
    <!-- Cap body splash -->
    <path d="
      M 215 410
      L 355 410
      L 365 545
      L 205 545
      Z"
      fill="oklch(0.62 0.13 35 / 0.22)"
      stroke="oklch(0.62 0.13 35)"/>
    <!-- Inset dish -->
    <path d="
      M 232 425
      L 338 425
      L 342 513
      L 228 513
      Z"
      fill="oklch(0.62 0.13 35 / 0.32)"
      stroke="oklch(0.62 0.13 35)"
      stroke-opacity="0.85"/>
    <!-- Front lip -->
    <path d="M 228 513 L 342 513 L 352 535 L 218 535 Z"
      fill="oklch(0.62 0.13 35 / 0.18)"
      stroke="oklch(0.62 0.13 35)"
      stroke-opacity="0.7"/>

    <!-- Mesopotamian glyph: stepped ziggurat silhouette centered on the dish.
         Three terraced platforms narrowing upward, with a chevron crown. -->
    <g stroke="oklch(0.62 0.13 35)" stroke-opacity="0.95" stroke-width="1.8" fill="oklch(0.62 0.13 35 / 0.55)">
      <!-- Base tier -->
      <path d="M 248 495 L 322 495 L 318 482 L 252 482 Z"/>
      <!-- Middle tier -->
      <path d="M 258 482 L 312 482 L 308 469 L 262 469 Z"/>
      <!-- Top tier -->
      <path d="M 268 469 L 302 469 L 298 456 L 272 456 Z"/>
      <!-- Chevron crown above -->
      <path d="M 277 456 L 285 446 L 293 456" fill="none"/>
    </g>
    <!-- Faint row-sculpt centerline (dashed so the glyph stays the focal element) -->
    <path d="M 236 465 Q 285 458 334 465" stroke="oklch(0.62 0.13 35)" stroke-opacity="0.35" stroke-dasharray="2 4"/>
  </g>

  <!-- Front row, cap 2 (warm-grey stroke) -->
  <g>
    <path d="
      M 435 410
      L 575 410
      L 585 545
      L 425 545
      Z" />
    <path d="
      M 452 425
      L 558 425
      L 562 513
      L 448 513
      Z" stroke-opacity="0.55"/>
    <path d="M 448 513 L 562 513 L 572 535 L 438 535 Z" stroke-opacity="0.4"/>
    <path d="M 456 465 Q 505 455 554 465" stroke-opacity="0.3"/>
  </g>

  <!-- Front row, cap 3 (warm-grey stroke) -->
  <g>
    <path d="
      M 655 410
      L 795 410
      L 805 545
      L 645 545
      Z" />
    <path d="
      M 672 425
      L 778 425
      L 782 513
      L 668 513
      Z" stroke-opacity="0.55"/>
    <path d="M 668 513 L 782 513 L 792 535 L 658 535 Z" stroke-opacity="0.4"/>
    <path d="M 676 465 Q 725 455 774 465" stroke-opacity="0.3"/>
  </g>

  <!-- ── Subtle ground shadow band — a single dashed line that anchors the cluster ───────── -->
  <line x1="180" y1="600" x2="900" y2="600" stroke-opacity="0.18" stroke-dasharray="3 8"/>

  <!-- ── Quiet didactic ticks at the right margin — three measurement notches mirroring the cluster height -->
  <g stroke-opacity="0.25">
    <line x1="930" y1="215" x2="942" y2="215"/>
    <line x1="930" y1="380" x2="942" y2="380"/>
    <line x1="930" y1="545" x2="942" y2="545"/>
    <line x1="936" y1="215" x2="936" y2="545" stroke-opacity="0.18"/>
  </g>

  <!-- ── Small terracotta accent dot, top-right — echoes the splash without crowding the glyph -->
  <circle cx="1050" cy="180" r="4" fill="oklch(0.62 0.13 35 / 0.85)" stroke="none"/>
  <circle cx="1050" cy="180" r="14" stroke="oklch(0.62 0.13 35)" stroke-opacity="0.35"/>
</svg>
