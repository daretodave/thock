      <rect x="298" y="385" width="42" height="42" rx="4" transform="rotate(-5 319 406)"/>
      <rect x="348" y="381" width="42" height="42" rx="4" transform="rotate(-5 369 402)"/>
      <rect x="398" y="377" width="42" height="42" rx="4" transform="rotate(-5 419 398)"/>
      <rect x="448" y="373" width="42" height="42" rx="4" transform="rotate(-5 469 394)"/>
      <rect x="498" y="369" width="42" height="42" rx="4" transform="rotate(-5 519 390)"/>
      <rect x="548" y="365" width="42" height="42" rx="4" transform="rotate(-5 569 386)"/>
    </g>
    <g>
      <rect x="306" y="430" width="42" height="42" rx="4"/>
      <rect x="356" y="430" width="42" height="42" rx="4"/>
      <rect x="406" y="430" width="42" height="42" rx="4"/>
