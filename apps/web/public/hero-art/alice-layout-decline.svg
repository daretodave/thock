<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — Alice layout, top-down silhouette</title>

  <!-- Splash: a soft, fading dusty-rose wash behind the right-hand cluster. Composure, not energy. -->
  <ellipse cx="820" cy="395" rx="170" ry="105" fill="oklch(0.72 0.082 25 / 0.18)" stroke="none"/>

  <!-- Case outline — split-symmetry Alice silhouette.
       Left half mirrors right around x=600. Top edge angles outward (~9°)
       from the centerline, classic Alice. -->
  <g>
    <!-- Outer case path -->
    <path d="
      M 230 270
      L 580 230
      L 600 232
      L 620 230
      L 970 270
      L 1000 290
      L 1000 470
      L 970 510
      L 230 510
      L 200 470
      L 200 290
      Z" />

    <!-- Inner bezel inset (top plate edge) -->
    <path d="
      M 250 295
      L 585 258
      L 600 260
      L 615 258
      L 950 295
      L 970 308
      L 970 460
      L 950 488
      L 250 488
      L 230 460
      L 230 308
      Z" stroke-opacity="0.55"/>

    <!-- Center seam (the split-symmetry reveal) -->
    <line x1="600" y1="260" x2="600" y2="488" stroke-opacity="0.4"/>
  </g>

  <!-- Left cluster: 2 columns of 6 keys (top row 6 keys offset diagonally per Alice) -->
  <g>
    <!-- Row 1 (numbers row) — 6 keys, angled -->
    <g>
      <rect x="282" y="285" width="42" height="42" rx="4" transform="rotate(-9 303 306)"/>
      <rect x="332" y="277" width="42" height="42" rx="4" transform="rotate(-9 353 298)"/>
