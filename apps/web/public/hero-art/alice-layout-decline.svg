      <rect x="868" y="335" width="42" height="42" rx="4" transform="rotate(9 889 356)"/>
    </g>
    <g>
      <rect x="610" y="365" width="42" height="42" rx="4" transform="rotate(5 631 386)"/>
      <rect x="660" y="369" width="42" height="42" rx="4" transform="rotate(5 681 390)"/>
      <rect x="710" y="373" width="42" height="42" rx="4" transform="rotate(5 731 394)"/>
      <rect x="760" y="377" width="42" height="42" rx="4" transform="rotate(5 781 398)"/>
