<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — keyboard cross-section with PE foam layer callout</title>

  <!-- ===== Background ===== -->
  <rect width="1200" height="750" fill="#0E0E10" stroke="none"/>

  <!-- ===== Coral glow wash behind the PE foam layer ===== -->
  <rect x="220" y="434" width="760" height="28" rx="4" fill="#E86A50" fill-opacity="0.09" stroke="none"/>

  <!-- ===== TOP CASE shell ===== -->
  <path d="
    M 200 178
    L 1000 178
    Q 1012 178 1012 190
    L 1012 294
    Q 1012 306 1000 306
    L 200 306
    Q 188 306 188 294
    L 188 190
    Q 188 178 200 178
    Z"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.72"/>

  <!-- Inner bezel of top case -->
  <rect x="214" y="196" width="772" height="96" rx="3"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.28"/>

  <!-- ===== CASE SIDE WALLS (inner faces) ===== -->
  <line x1="214" y1="196" x2="214" y2="578" stroke-opacity="0.42"/>
  <line x1="986" y1="196" x2="986" y2="578" stroke-opacity="0.42"/>

  <!-- ===== KEYCAP ROW (top-visible, above case) ===== -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.52" stroke-width="1.5">
    <rect x="262" y="140" width="38" height="38" rx="5"/>
    <rect x="308" y="140" width="38" height="38" rx="5"/>
    <rect x="354" y="140" width="38" height="38" rx="5"/>
    <rect x="400" y="138" width="38" height="40" rx="5"/>
    <rect x="446" y="140" width="38" height="38" rx="5"/>
    <rect x="492" y="140" width="38" height="38" rx="5"/>
    <rect x="538" y="140" width="38" height="38" rx="5"/>
    <rect x="584" y="138" width="38" height="40" rx="5"/>
    <rect x="630" y="140" width="38" height="38" rx="5"/>
    <rect x="676" y="140" width="38" height="38" rx="5"/>
    <rect x="722" y="140" width="38" height="38" rx="5"/>
    <rect x="768" y="140" width="38" height="38" rx="5"/>
    <rect x="814" y="138" width="38" height="40" rx="5"/>
    <rect x="860" y="140" width="38" height="38" rx="5"/>
    <rect x="906" y="140" width="38" height="38" rx="5"/>
  </g>

  <!-- Switch stems: keycaps down through case to plate -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.18" stroke-width="1">
    <line x1="281" y1="178" x2="281" y2="390"/>
    <line x1="327" y1="178" x2="327" y2="390"/>
    <line x1="373" y1="178" x2="373" y2="390"/>
    <line x1="419" y1="178" x2="419" y2="390"/>
    <line x1="465" y1="178" x2="465" y2="390"/>
    <line x1="511" y1="178" x2="511" y2="390"/>
    <line x1="557" y1="178" x2="557" y2="390"/>
    <line x1="603" y1="178" x2="603" y2="390"/>
    <line x1="649" y1="178" x2="649" y2="390"/>
    <line x1="695" y1="178" x2="695" y2="390"/>
    <line x1="741" y1="178" x2="741" y2="390"/>
    <line x1="787" y1="178" x2="787" y2="390"/>
    <line x1="833" y1="178" x2="833" y2="390"/>
    <line x1="879" y1="178" x2="879" y2="390"/>
    <line x1="925" y1="178" x2="925" y2="390"/>
  </g>

  <!-- ===== PLATE ===== -->
  <rect x="234" y="372" width="732" height="52" rx="3"
    fill="oklch(0.78 0.005 90 / 0.05)"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.80" stroke-width="2"/>

  <!-- Plate surface hint: faint horizontal lines -->
  <line x1="248" y1="390" x2="952" y2="390" stroke-opacity="0.15"/>
  <line x1="248" y1="412" x2="952" y2="412" stroke-opacity="0.15"/>

  <!-- Switch mounting holes through plate (stylised cross-section slots) -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.32" stroke-width="1.5">
    <rect x="268" y="377" width="26" height="42" rx="2"/>
    <rect x="406" y="377" width="26" height="42" rx="2"/>
    <rect x="544" y="377" width="26" height="42" rx="2"/>
    <rect x="682" y="377" width="26" height="42" rx="2"/>
    <rect x="820" y="377" width="26" height="42" rx="2"/>
    <rect x="910" y="377" width="26" height="42" rx="2"/>
  </g>

  <!-- ===== PE FOAM SHEET — the hero layer ===== -->
  <!-- Base fill: coral with a subtle opacity -->
  <rect x="234" y="432" width="732" height="30" rx="3"
    fill="#E86A50" fill-opacity="0.22"
    stroke="#E86A50" stroke-opacity="0.95" stroke-width="2"/>

  <!-- Foam cell texture: small circles suggesting open-cell PE foam -->
  <!-- Row 1 of cells -->
  <g fill="#E86A50" fill-opacity="0.30" stroke="none">
    <circle cx="264" cy="447" r="5"/>
    <circle cx="284" cy="447" r="5"/>
    <circle cx="304" cy="447" r="5"/>
    <circle cx="324" cy="447" r="5"/>
    <circle cx="344" cy="447" r="5"/>
    <circle cx="364" cy="447" r="5"/>
    <circle cx="384" cy="447" r="5"/>
    <circle cx="404" cy="447" r="5"/>
    <circle cx="424" cy="447" r="5"/>
    <circle cx="444" cy="447" r="5"/>
    <circle cx="464" cy="447" r="5"/>
    <circle cx="484" cy="447" r="5"/>
    <circle cx="504" cy="447" r="5"/>
    <circle cx="524" cy="447" r="5"/>
    <circle cx="544" cy="447" r="5"/>
    <circle cx="564" cy="447" r="5"/>
    <circle cx="584" cy="447" r="5"/>
    <circle cx="604" cy="447" r="5"/>
    <circle cx="624" cy="447" r="5"/>
    <circle cx="644" cy="447" r="5"/>
    <circle cx="664" cy="447" r="5"/>
    <circle cx="684" cy="447" r="5"/>
    <circle cx="704" cy="447" r="5"/>
    <circle cx="724" cy="447" r="5"/>
    <circle cx="744" cy="447" r="5"/>
    <circle cx="764" cy="447" r="5"/>
    <circle cx="784" cy="447" r="5"/>
    <circle cx="804" cy="447" r="5"/>
    <circle cx="824" cy="447" r="5"/>
    <circle cx="844" cy="447" r="5"/>
    <circle cx="864" cy="447" r="5"/>
    <circle cx="884" cy="447" r="5"/>
    <circle cx="904" cy="447" r="5"/>
    <circle cx="924" cy="447" r="5"/>
    <circle cx="944" cy="447" r="5"/>
  </g>

  <!-- Accent stroke on top edge of PE foam (coral highlight line) -->
  <line x1="234" y1="432" x2="966" y2="432"
    stroke="#E86A50" stroke-opacity="0.90" stroke-width="2.5"/>

  <!-- Subtle glow bloom on the foam top edge -->
  <line x1="234" y1="432" x2="966" y2="432"
    stroke="#E86A50" stroke-opacity="0.14" stroke-width="9"/>

  <!-- ===== PCB ===== -->
  <rect x="234" y="470" width="732" height="38" rx="3"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.52"/>

  <!-- PCB trace hints -->
  <line x1="290" y1="485" x2="350" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>
  <line x1="560" y1="485" x2="630" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>
  <line x1="840" y1="485" x2="900" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>

  <!-- PCB component bumps (SMD hint — three tiny squares) -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.30" stroke-width="1">
    <rect x="420" y="479" width="8" height="6" rx="1"/>
    <rect x="590" y="479" width="8" height="6" rx="1"/>
    <rect x="760" y="479" width="8" height="6" rx="1"/>
  </g>

  <!-- Standoffs (PCB to bottom case) -->
  <line x1="300"  y1="508" x2="300"  y2="526" stroke-opacity="0.38"/>
  <line x1="600"  y1="508" x2="600"  y2="526" stroke-opacity="0.38"/>
  <line x1="900"  y1="508" x2="900"  y2="526" stroke-opacity="0.38"/>

  <!-- ===== BOTTOM CASE shell ===== -->
  <path d="
    M 188 524
    Q 188 514 200 514
    L 1000 514
    Q 1012 514 1012 524
    L 1012 568
    Q 1012 580 1000 580
    L 200 580
    Q 188 580 188 568
    Z"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.72"/>

  <!-- Bottom case inner detail line -->
  <line x1="214" y1="540" x2="986" y2="540" stroke-opacity="0.28"/>

  <!-- ===== SECTION LABELS (faint, left margin) ===== -->
  <g font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
     font-size="11" fill="oklch(0.78 0.005 90)" fill-opacity="0.32"
     text-anchor="end" letter-spacing="0.04em" stroke="none">
    <text x="172" y="252">top</text>
    <text x="172" y="266">case</text>
    <text x="172" y="402">plate</text>
    <text x="172" y="450">foam</text>
    <text x="172" y="492">PCB</text>
    <text x="172" y="552">btm</text>
    <text x="172" y="566">case</text>
  </g>

  <!-- ===== CALLOUT: bronze leader to the PE foam layer ===== -->
  <!-- Leader line from label area on the right, pointing to PE foam top edge -->
  <g stroke="#C4943A" stroke-width="1.5" stroke-opacity="0.85" fill="none">
    <path d="M 1090 350 L 1040 350 L 990 432"/>
    <!-- Arrowhead -->
    <path d="M 990 432 L 1002 422 M 990 432 L 998 441"/>
  </g>

  <!-- Callout anchor dot (bronze) -->
  <circle cx="1090" cy="350" r="4" fill="#C4943A" stroke="none"/>

  <!-- Callout label text: "PE foam" in two lines -->
  <text x="1090" y="328"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13" fill="#C4943A" fill-opacity="0.92"
    letter-spacing="0.04em" text-anchor="middle" stroke="none">PE</text>
  <text x="1090" y="344"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13" fill="#C4943A" fill-opacity="0.92"
    letter-spacing="0.04em" text-anchor="middle" stroke="none">foam</text>

  <!-- ===== SECONDARY CALLOUT: bracket on the left showing the foam sits between plate and PCB ===== -->
  <!-- Bracket vertical line on the far left -->
  <g stroke="#C4943A" stroke-width="1.5" stroke-opacity="0.55" fill="none">
    <!-- Top tick at plate bottom -->
    <line x1="152" y1="424" x2="180" y2="424"/>
    <!-- Bottom tick at PCB top -->
    <line x1="152" y1="470" x2="180" y2="470"/>
    <!-- Bracket spine -->
    <line x1="152" y1="424" x2="152" y2="470"/>
    <!-- Bracket notch pointing right at midpoint -->
    <line x1="152" y1="447" x2="168" y2="447"/>
  </g>

  <!-- ===== CORAL TICK MARKS at foam layer boundaries (three positions) ===== -->
  <g stroke="#E86A50" stroke-width="2" stroke-opacity="0.70">
    <line x1="234" y1="424" x2="234" y2="440"/>
    <line x1="600" y1="424" x2="600" y2="440"/>
    <line x1="966" y1="424" x2="966" y2="440"/>
  </g>
</svg>
