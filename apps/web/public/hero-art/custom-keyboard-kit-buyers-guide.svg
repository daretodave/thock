<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — barebones keyboard kit exploded view: case shell, plate, and PCB shown as separate stacked layers, with a faint assembled silhouette below</title>

  <!-- ────────────────────────────────────────────────────────────────────────
       LAYOUT — three exploded layers (case shell, plate, PCB) stacked
       vertically with dashed explode gaps and downward assembly arrows,
       plus a faint ghost silhouette at the bottom showing the assembled
       result. Splash hue: ochre — used for standoff/mounting-hole
       highlights, the alignment guides, and the anchoring wash.
       Stack spans x=280 → x=920, centered on x=600.
  ──────────────────────────────────────────────────────────────────────── -->

  <!-- Ochre splash — soft warm wash anchoring the plate/PCB core of the kit -->
  <ellipse cx="600" cy="365" rx="360" ry="150" fill="oklch(0.72 0.13 88 / 0.14)" stroke="none"/>

  <!-- ============================================================
       LAYER 1 — CASE SHELL
       Front-elevation silhouette of the assembled case, empty
       inside (no plate/PCB seated yet). Standoff posts visible
       along the bottom edge where the plate will mount.
       y-range: 90 → 235
  ============================================================ -->
  <g>
    <path d="
      M 300 210
      Q 300 100 360 95
      L 840 95
      Q 900 100 900 210
      L 900 222
      Q 900 235 888 235
      L 312 235
      Q 300 235 300 222
      Z"
      stroke-opacity="0.85"/>

    <!-- Interior floor hint — the empty cavity, shell only, nothing seated -->
    <line x1="330" y1="150" x2="870" y2="150" stroke-opacity="0.28"/>

    <!-- Rear cutout (USB / daughterboard port) -->
    <rect x="570" y="97" width="60" height="10" rx="2" stroke-opacity="0.6"/>

    <!-- Standoff posts along the bottom edge — where the plate mounts -->
    <g stroke-opacity="0.55">
      <line x1="360" y1="212" x2="360" y2="234"/>
      <line x1="480" y1="216" x2="480" y2="234"/>
      <line x1="720" y1="216" x2="720" y2="234"/>
      <line x1="840" y1="212" x2="840" y2="234"/>
    </g>
    <!-- Standoff heads — ochre, mark the mount points the plate/PCB align to -->
    <g fill="oklch(0.72 0.13 88 / 0.9)" stroke="oklch(0.72 0.13 88)" stroke-width="1.4">
      <circle cx="360" cy="222" r="5"/>
      <circle cx="480" cy="225" r="5"/>
      <circle cx="720" cy="225" r="5"/>
      <circle cx="840" cy="222" r="5"/>
    </g>

    <!-- Feet at the outer base corners -->
    <circle cx="322" cy="228" r="3.4" stroke-opacity="0.5"/>
    <circle cx="878" cy="228" r="3.4" stroke-opacity="0.5"/>
  </g>

  <!-- Alignment guides — faint dashed verticals tying the standoff
       positions through the plate and PCB layers below, selling
       "these parts stack and register to each other" -->
  <g stroke="oklch(0.72 0.13 88)" stroke-opacity="0.30" stroke-width="1.4" stroke-dasharray="3 6">
    <line x1="360" y1="235" x2="360" y2="420"/>
    <line x1="480" y1="235" x2="480" y2="420"/>
    <line x1="720" y1="235" x2="720" y2="420"/>
    <line x1="840" y1="235" x2="840" y2="420"/>
  </g>

  <!-- Explode gap 1 — dashed divider + downward assembly arrow -->
  <line x1="300" y1="262" x2="900" y2="262" stroke-dasharray="4 6" stroke-opacity="0.32"/>
  <path d="M 600 250 L 600 274 M 590 264 L 600 276 L 610 264" stroke-opacity="0.6"/>

  <!-- ============================================================
       LAYER 2 — PLATE
       Thin switch plate with five cutouts and mounting holes that
       line up with the case standoffs above.
       y-range: 298 → 318
  ============================================================ -->
  <g>
    <rect x="320" y="298" width="560" height="20" rx="2" stroke-opacity="0.88"/>
    <!-- Switch cutouts -->
    <g stroke-opacity="0.75">
      <rect x="384" y="303" width="16" height="10" rx="2"/>
      <rect x="504" y="303" width="16" height="10" rx="2"/>
      <rect x="592" y="303" width="16" height="10" rx="2"/>
      <rect x="680" y="303" width="16" height="10" rx="2"/>
      <rect x="800" y="303" width="16" height="10" rx="2"/>
    </g>
    <!-- Mounting holes, aligned to the case standoffs — ochre -->
    <g fill="oklch(0.72 0.13 88 / 0.9)" stroke="oklch(0.72 0.13 88)" stroke-width="1.4">
      <circle cx="360" cy="308" r="4.2"/>
      <circle cx="480" cy="308" r="4.2"/>
      <circle cx="720" cy="308" r="4.2"/>
      <circle cx="840" cy="308" r="4.2"/>
    </g>
  </g>

  <!-- Explode gap 2 — dashed divider + downward assembly arrow -->
  <line x1="300" y1="350" x2="900" y2="350" stroke-dasharray="4 6" stroke-opacity="0.32"/>
  <path d="M 600 338 L 600 362 M 590 352 L 600 364 L 610 352" stroke-opacity="0.6"/>

  <!-- ============================================================
       LAYER 3 — PCB
       Thin board with a connector notch, trace hints, small SMD
       marks, and mounting holes aligned to the same standoffs.
       y-range: 398 → 420
  ============================================================ -->
  <g>
    <rect x="320" y="398" width="560" height="22" rx="2" stroke-opacity="0.82"/>
    <!-- Connector cutout, left edge -->
    <rect x="316" y="404" width="14" height="10" rx="1.5" stroke-opacity="0.75"/>
    <!-- Trace hints -->
    <g stroke-opacity="0.28" stroke-width="1">
      <line x1="400" y1="405" x2="452" y2="405" stroke-dasharray="4 5"/>
      <line x1="560" y1="413" x2="612" y2="413" stroke-dasharray="4 5"/>
      <line x1="700" y1="405" x2="752" y2="405" stroke-dasharray="4 5"/>
    </g>
    <!-- SMD component marks -->
    <g stroke-opacity="0.5">
      <rect x="440" y="411" width="8" height="5" rx="1"/>
      <rect x="748" y="404" width="8" height="5" rx="1"/>
    </g>
    <!-- Mounting holes, aligned to the case standoffs and plate — ochre -->
    <g fill="oklch(0.72 0.13 88 / 0.9)" stroke="oklch(0.72 0.13 88)" stroke-width="1.4">
      <circle cx="360" cy="409" r="4.2"/>
      <circle cx="480" cy="409" r="4.2"/>
      <circle cx="720" cy="409" r="4.2"/>
      <circle cx="840" cy="409" r="4.2"/>
    </g>
  </g>

  <!-- Explode gap 3 — dashed divider + downward assembly arrow, longer
       reach into the ghost silhouette below -->
  <line x1="300" y1="450" x2="900" y2="450" stroke-dasharray="4 6" stroke-opacity="0.28"/>
  <path d="M 600 436 L 600 464 M 588 450 L 600 466 L 612 450" stroke-opacity="0.55"/>

  <!-- ============================================================
       GHOST SILHOUETTE — the assembled kit, faint and dashed,
       showing what the three loose layers above become once built.
       y-range: 520 → 660
  ============================================================ -->
  <g stroke-opacity="0.30" stroke-dasharray="5 5">
    <path d="
      M 360 640
      Q 360 545 410 540
      L 790 540
      Q 840 545 840 640
      L 840 648
      Q 840 660 828 660
      L 372 660
      Q 360 660 360 648
      Z"/>
    <!-- Seam hint where plate meets case, now closed up -->
    <line x1="380" y1="562" x2="820" y2="562" stroke-opacity="0.6"/>
  </g>
  <!-- Single ochre accent carried through to the finished kit — the
       through-line the whole diagram is making -->
  <circle cx="600" cy="562" r="3.4" fill="oklch(0.72 0.13 88 / 0.85)" stroke="oklch(0.72 0.13 88)" stroke-width="1.2"/>

  <!-- Quiet didactic guide rule (left edge tick marks, one per layer) -->
  <g stroke-opacity="0.3">
    <line x1="230" y1="160" x2="250" y2="160"/>
    <line x1="230" y1="308" x2="250" y2="308"/>
    <line x1="230" y1="409" x2="250" y2="409"/>
    <line x1="230" y1="600" x2="250" y2="600"/>
  </g>

  <!-- Bronze theme dot — family ornamental anchor -->
  <circle cx="1148" cy="92" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
