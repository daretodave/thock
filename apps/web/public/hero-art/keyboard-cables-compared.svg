<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — coiled aviator-connector keyboard cable compared to a straight sleeved USB-C cable</title>

  <!-- ════════════════════════════════════════════════════════════════════
       LAYOUT — two stacked side-profile rows, left-to-right cable runs:
         Row A (y=230): coiled cable, detachable aviator connector at the
           keyboard end, USB-C at the host end. The coil is drawn as a
           chain of overlapping rings — the family's line-art shorthand
           for a wound spring cord.
         Row B (y=520): straight sleeved cable, USB-C connectors at both
           ends, diagonal ticks along the run hint at a woven sleeve.
       Splash: coral oklch(0.70 0.145 26) — pin contacts, tongue accents,
       the strain-relief focal marker, and the callout leaders/labels.
  ════════════════════════════════════════════════════════════════════ -->

  <!-- Coral wash — soft anchoring field behind both rows -->
  <ellipse cx="600" cy="380" rx="520" ry="300" fill="oklch(0.70 0.145 26)" fill-opacity="0.06" stroke="none"/>

  <!-- Quiet left-margin row ticks — family rhythm cue -->
  <g stroke-opacity="0.30">
    <line x1="100" y1="230" x2="118" y2="230"/>
    <line x1="100" y1="520" x2="118" y2="520"/>
  </g>

  <!-- ══════════════════════════════════════════════════════════════════
       ROW A — coiled cable, aviator connector to USB-C
  ══════════════════════════════════════════════════════════════════ -->
  <g>
    <!-- Aviator / GX16-style detachable connector — keyboard end -->
    <circle cx="175" cy="230" r="34" stroke-opacity="0.82"/>
    <circle cx="175" cy="230" r="24" stroke-width="1.4" stroke-opacity="0.45"/>
    <!-- Keying notch, top of shell -->
    <line x1="175" y1="196" x2="175" y2="206" stroke-width="1.4" stroke-opacity="0.4"/>
    <!-- Pin contacts -->
    <g fill="oklch(0.70 0.145 26)" fill-opacity="0.85" stroke="none">
      <circle cx="175"   cy="217"   r="2.2"/>
      <circle cx="187.4" cy="226"   r="2.2"/>
      <circle cx="182.6" cy="240.5" r="2.2"/>
      <circle cx="167.4" cy="240.5" r="2.2"/>
      <circle cx="162.6" cy="226"   r="2.2"/>
    </g>

    <!-- Lead-in stub, connector shell to coil -->
    <rect x="209" y="222" width="59" height="16" rx="8" stroke-opacity="0.78"/>

    <!-- Strain-relief focal marker — coral dot + ring, family convention
         for the article's load-bearing comparison point -->
    <circle cx="274" cy="230" r="4" fill="oklch(0.70 0.145 26)" fill-opacity="0.9" stroke="oklch(0.70 0.145 26)"/>
    <circle cx="274" cy="230" r="9" stroke="oklch(0.70 0.145 26)" stroke-opacity="0.4"/>

    <!-- Coil — eighteen overlapping rings read as a wound spring cord.
         Every third ring carries a faint coral tint for colorway texture. -->
    <g stroke-opacity="0.78">
      <circle cx="280" cy="230" r="25"/>
      <circle cx="313" cy="230" r="25"/>
      <circle cx="346" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
      <circle cx="379" cy="230" r="25"/>
      <circle cx="412" cy="230" r="25"/>
      <circle cx="445" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
      <circle cx="478" cy="230" r="25"/>
      <circle cx="511" cy="230" r="25"/>
      <circle cx="544" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
      <circle cx="577" cy="230" r="25"/>
      <circle cx="610" cy="230" r="25"/>
      <circle cx="643" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
      <circle cx="676" cy="230" r="25"/>
      <circle cx="709" cy="230" r="25"/>
      <circle cx="742" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
      <circle cx="775" cy="230" r="25"/>
      <circle cx="808" cy="230" r="25"/>
      <circle cx="841" cy="230" r="25" fill="oklch(0.70 0.145 26)" fill-opacity="0.10"/>
    </g>

    <!-- Lead-out stub, coil to USB-C shell -->
    <rect x="872" y="222" width="33" height="16" rx="8" stroke-opacity="0.78"/>

    <!-- USB-C connector — host end -->
    <rect x="905" y="215" width="70" height="30" rx="15" stroke-opacity="0.82"/>
    <rect x="920" y="225" width="40" height="10" rx="5" stroke-width="1.4" stroke-opacity="0.5"/>
    <g stroke-width="1" stroke-opacity="0.35">
      <line x1="932" y1="227" x2="932" y2="233"/>
      <line x1="948" y1="227" x2="948" y2="233"/>
    </g>
  </g>

  <!-- Row A caption -->
  <text x="1000" y="236"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="16" fill="oklch(0.78 0.005 90)" fill-opacity="0.95"
    letter-spacing="0.04em" text-anchor="start" stroke="none">coiled</text>

  <!-- ══════════════════════════════════════════════════════════════════
       ROW B — straight sleeved cable, USB-C to USB-C
  ══════════════════════════════════════════════════════════════════ -->
  <g>
    <!-- USB-C connector — keyboard end -->
    <rect x="140" y="505" width="70" height="30" rx="15" stroke-opacity="0.82"/>
    <rect x="155" y="515" width="40" height="10" rx="5" stroke-width="1.4" stroke-opacity="0.5"/>
    <g stroke-width="1" stroke-opacity="0.35">
      <line x1="167" y1="517" x2="167" y2="523"/>
      <line x1="183" y1="517" x2="183" y2="523"/>
    </g>

    <!-- Straight run, sleeved -->
    <rect x="210" y="512" width="695" height="16" rx="8" stroke-opacity="0.78"/>
    <!-- Sleeve weave ticks -->
    <g stroke-width="1" stroke-opacity="0.28">
      <line x1="246" y1="512" x2="254" y2="528"/>
      <line x1="286" y1="512" x2="294" y2="528"/>
      <line x1="326" y1="512" x2="334" y2="528"/>
      <line x1="366" y1="512" x2="374" y2="528"/>
      <line x1="406" y1="512" x2="414" y2="528"/>
      <line x1="446" y1="512" x2="454" y2="528"/>
      <line x1="486" y1="512" x2="494" y2="528"/>
      <line x1="526" y1="512" x2="534" y2="528"/>
      <line x1="566" y1="512" x2="574" y2="528"/>
      <line x1="606" y1="512" x2="614" y2="528"/>
      <line x1="646" y1="512" x2="654" y2="528"/>
      <line x1="686" y1="512" x2="694" y2="528"/>
      <line x1="726" y1="512" x2="734" y2="528"/>
      <line x1="766" y1="512" x2="774" y2="528"/>
      <line x1="806" y1="512" x2="814" y2="528"/>
      <line x1="846" y1="512" x2="854" y2="528"/>
    </g>

    <!-- USB-C connector — host end -->
    <rect x="905" y="505" width="70" height="30" rx="15" stroke-opacity="0.82"/>
    <rect x="920" y="515" width="40" height="10" rx="5" stroke-width="1.4" stroke-opacity="0.5"/>
    <g stroke-width="1" stroke-opacity="0.35">
      <line x1="932" y1="517" x2="932" y2="523"/>
      <line x1="948" y1="517" x2="948" y2="523"/>
    </g>
  </g>

  <!-- Row B caption -->
  <text x="1000" y="526"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="16" fill="oklch(0.78 0.005 90)" fill-opacity="0.95"
    letter-spacing="0.04em" text-anchor="start" stroke="none">straight</text>

  <!-- ════════════════════════════════════════════════════════════════════
       CALLOUTS — dotted-outline leader lines + lowercase mono labels,
       coral, family convention (cf. sound-dampening-compared.svg)
  ════════════════════════════════════════════════════════════════════ -->

  <!-- Callout 1 — aviator connector -->
  <g stroke="oklch(0.70 0.145 26)" stroke-opacity="0.85" stroke-width="1" stroke-dasharray="2 4" fill="none">
    <path d="M 70 120 L 140 150 L 154 203"/>
  </g>
  <circle cx="70" cy="120" r="2.5" fill="oklch(0.70 0.145 26)" stroke="none"/>
  <text x="64" y="106"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="14" fill="oklch(0.70 0.145 26)" fill-opacity="0.95"
    letter-spacing="0.04em" text-anchor="start" stroke="none">aviator</text>

  <!-- Callout 2 — strain relief -->
  <g stroke="oklch(0.70 0.145 26)" stroke-opacity="0.85" stroke-width="1" stroke-dasharray="2 4" fill="none">
    <path d="M 210 140 L 240 175 L 271 221"/>
  </g>
  <circle cx="210" cy="140" r="2.5" fill="oklch(0.70 0.145 26)" stroke="none"/>
  <text x="204" y="126"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="14" fill="oklch(0.70 0.145 26)" fill-opacity="0.95"
    letter-spacing="0.04em" text-anchor="start" stroke="none">strain relief</text>

  <!-- Callout 3 — sleeve texture -->
  <g stroke="oklch(0.70 0.145 26)" stroke-opacity="0.85" stroke-width="1" stroke-dasharray="2 4" fill="none">
    <path d="M 1090 650 L 780 566 L 574 528"/>
  </g>
  <circle cx="1090" cy="650" r="2.5" fill="oklch(0.70 0.145 26)" stroke="none"/>
  <text x="1084" y="666"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="14" fill="oklch(0.70 0.145 26)" fill-opacity="0.95"
    letter-spacing="0.04em" text-anchor="end" stroke="none">sleeve weave</text>

  <!-- ════════════════════════════════════════════════════════════════════
       Brass-bronze theme dot — family ornamental anchor
  ════════════════════════════════════════════════════════════════════ -->
  <circle cx="1148" cy="92" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
