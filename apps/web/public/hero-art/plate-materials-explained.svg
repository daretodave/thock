<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — plate materials, side-view cross-section of five candidate plates</title>

  <!-- Plate stack:
       Each plate is 1020 px wide (x: 90 → 1110), centered horizontally.
       5 plates × 95 px tall + 4 × 14 px gaps = 531 px total content height.
       Vertical content range: y 110 → y 641. Generous margins above and below.

       Order, top to bottom (heaviest / stiffest → most compliant):
         1. brass          (y 110–205) — diagonal scribed hatch
         2. aluminium      (y 219–314) — clean, single anodisation tick
         3. FR4 (focal)    (y 328–423) — coarse cross-hatch, terracotta splash
         4. POM            (y 437–532) — thinner outline, sparse texture
         5. polycarbonate  (y 546–641) — thinnest outline, near-empty interior
  -->

  <!-- Splash: terracotta wash centered on the FR4 plate (focal "what changes" layer).
       Translucent fill across the FR4 rectangle; the focal outline is restated below
       at heavier weight in same hue so it reads as the article's anchor element. -->
  <rect x="90" y="328" width="1020" height="95" fill="oklch(0.66 0.13 45 / 0.25)" stroke="none"/>

  <!-- ── PLATE 1 — BRASS (stiffest, brightest "ring") ─────────────────────────────────── -->
  <g>
    <!-- Outer plate body -->
    <rect x="90" y="110" width="1020" height="95"/>
    <!-- Thin internal seam — top edge of the substrate face -->
    <line x1="98" y1="120" x2="1102" y2="120" stroke-opacity="0.4"/>
    <line x1="98" y1="195" x2="1102" y2="195" stroke-opacity="0.4"/>
    <!-- Diagonal scribed hatch — fine, dense (brass reads "bright / ringing") -->
    <g stroke-opacity="0.3">
      <line x1="120" y1="195" x2="195" y2="120"/>
      <line x1="170" y1="195" x2="245" y2="120"/>
      <line x1="220" y1="195" x2="295" y2="120"/>
      <line x1="270" y1="195" x2="345" y2="120"/>
      <line x1="320" y1="195" x2="395" y2="120"/>
      <line x1="370" y1="195" x2="445" y2="120"/>
      <line x1="420" y1="195" x2="495" y2="120"/>
      <line x1="470" y1="195" x2="545" y2="120"/>
      <line x1="520" y1="195" x2="595" y2="120"/>
      <line x1="570" y1="195" x2="645" y2="120"/>
      <line x1="620" y1="195" x2="695" y2="120"/>
      <line x1="670" y1="195" x2="745" y2="120"/>
      <line x1="720" y1="195" x2="795" y2="120"/>
      <line x1="770" y1="195" x2="845" y2="120"/>
      <line x1="820" y1="195" x2="895" y2="120"/>
      <line x1="870" y1="195" x2="945" y2="120"/>
      <line x1="920" y1="195" x2="995" y2="120"/>
      <line x1="970" y1="195" x2="1045" y2="120"/>
      <line x1="1020" y1="195" x2="1080" y2="135"/>
      <line x1="1070" y1="195" x2="1100" y2="165"/>
    </g>
  </g>

  <!-- ── PLATE 2 — ALUMINIUM (clean, flat, the "default" reference) ─────────────────── -->
  <g>
    <rect x="90" y="219" width="1020" height="95"/>
    <!-- Single internal seam — single anodised surface line, no texture -->
    <line x1="98" y1="229" x2="1102" y2="229" stroke-opacity="0.4"/>
    <line x1="98" y1="304" x2="1102" y2="304" stroke-opacity="0.4"/>
    <!-- Two tiny edge-bevel marks at each end, suggesting machined chamfer -->
    <line x1="90" y1="234" x2="100" y2="229" stroke-opacity="0.45"/>
    <line x1="1110" y1="234" x2="1100" y2="229" stroke-opacity="0.45"/>
    <line x1="90" y1="299" x2="100" y2="304" stroke-opacity="0.45"/>
    <line x1="1110" y1="299" x2="1100" y2="304" stroke-opacity="0.45"/>
  </g>

  <!-- ── PLATE 3 — FR4 / FIBREGLASS (focal — terracotta) ─────────────────────────────── -->
  <g>
    <!-- Focal outline: same hue, slightly heavier (2.5 px), as the splash anchor -->
    <rect x="90" y="328" width="1020" height="95" stroke="oklch(0.66 0.13 45)" stroke-width="2.5"/>
    <!-- Coarse cross-hatch suggesting the fibreglass weave / layup -->
    <g stroke="oklch(0.66 0.13 45)" stroke-opacity="0.55" stroke-width="1.5">
      <!-- Diagonal set 1 (NE-SW) -->
      <line x1="120" y1="423" x2="220" y2="328"/>
      <line x1="220" y1="423" x2="320" y2="328"/>
      <line x1="320" y1="423" x2="420" y2="328"/>
      <line x1="420" y1="423" x2="520" y2="328"/>
      <line x1="520" y1="423" x2="620" y2="328"/>
      <line x1="620" y1="423" x2="720" y2="328"/>
      <line x1="720" y1="423" x2="820" y2="328"/>
      <line x1="820" y1="423" x2="920" y2="328"/>
      <line x1="920" y1="423" x2="1020" y2="328"/>
      <line x1="1020" y1="423" x2="1080" y2="363"/>
      <!-- Diagonal set 2 (NW-SE) — the weave -->
      <line x1="120" y1="328" x2="220" y2="423"/>
      <line x1="220" y1="328" x2="320" y2="423"/>
      <line x1="320" y1="328" x2="420" y2="423"/>
      <line x1="420" y1="328" x2="520" y2="423"/>
      <line x1="520" y1="328" x2="620" y2="423"/>
      <line x1="620" y1="328" x2="720" y2="423"/>
      <line x1="720" y1="328" x2="820" y2="423"/>
      <line x1="820" y1="328" x2="920" y2="423"/>
      <line x1="920" y1="328" x2="1020" y2="423"/>
      <line x1="1020" y1="328" x2="1080" y2="388"/>
    </g>
    <!-- Centerline accent in the focal hue -->
    <line x1="100" y1="375.5" x2="1100" y2="375.5" stroke="oklch(0.66 0.13 45)" stroke-opacity="0.85" stroke-width="2"/>
    <!-- Small accent dot anchoring the eye at the plate centre -->
    <circle cx="600" cy="375.5" r="5" fill="oklch(0.66 0.13 45 / 0.95)" stroke="oklch(0.66 0.13 45)"/>
    <circle cx="600" cy="375.5" r="10" stroke="oklch(0.66 0.13 45)" stroke-opacity="0.5" fill="none"/>
  </g>

  <!-- ── PLATE 4 — POM (more compliant — thinner / lighter outline) ──────────────────── -->
  <g stroke-width="1.6">
    <rect x="90" y="437" width="1020" height="95"/>
    <!-- Sparse, soft internal hint — short broken micro-ticks suggesting a smoother polymer -->
    <g stroke-opacity="0.35">
      <line x1="150" y1="484.5" x2="210" y2="484.5"/>
      <line x1="270" y1="484.5" x2="330" y2="484.5"/>
      <line x1="390" y1="484.5" x2="450" y2="484.5"/>
      <line x1="510" y1="484.5" x2="570" y2="484.5"/>
      <line x1="630" y1="484.5" x2="690" y2="484.5"/>
      <line x1="750" y1="484.5" x2="810" y2="484.5"/>
      <line x1="870" y1="484.5" x2="930" y2="484.5"/>
      <line x1="990" y1="484.5" x2="1050" y2="484.5"/>
    </g>
  </g>

  <!-- ── PLATE 5 — POLYCARBONATE (most compliant — thinnest outline, near-empty) ────── -->
  <g stroke-width="1.3">
    <rect x="90" y="546" width="1020" height="95"/>
    <!-- A single very faint internal seam to suggest transparency / no fibre structure -->
    <line x1="100" y1="593.5" x2="1100" y2="593.5" stroke-opacity="0.22" stroke-dasharray="3 6"/>
  </g>

  <!-- ── ANNOTATION — left-margin tick marks suggesting a stiffness gradient ─────────── -->
  <!-- One tick per plate, matching the family convention (left-margin didactic ticks).
       The brass tick is full-length to read as "stiffest end of the gradient", the
       polycarbonate tick is the shortest. -->
  <g stroke-opacity="0.5">
    <!-- Brass — stiffness max -->
    <line x1="40" y1="157.5" x2="68" y2="157.5"/>
    <!-- Aluminium -->
    <line x1="46" y1="266.5" x2="68" y2="266.5"/>
    <!-- FR4 — focal, drawn in splash hue to bind annotation to focal plate -->
    <line x1="40" y1="375.5" x2="68" y2="375.5" stroke="oklch(0.66 0.13 45)" stroke-opacity="0.8"/>
    <!-- POM -->
    <line x1="52" y1="484.5" x2="68" y2="484.5"/>
    <!-- Polycarbonate — most compliant -->
    <line x1="58" y1="593.5" x2="68" y2="593.5"/>
  </g>

  <!-- Vertical axis line tying the left-margin ticks into a "stiffness scale" hint -->
  <line x1="68" y1="148" x2="68" y2="603" stroke-opacity="0.22" stroke-dasharray="2 5"/>
  <!-- Tiny arrowhead at the top of the axis line, pointing up = "stiffer" -->
  <path d="M 63 154 L 68 145 L 73 154" stroke-opacity="0.4"/>

  <!-- Brass-bronze theme dot — family-conventional ornamental anchor, top-right margin -->
  <circle cx="1148" cy="92" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
