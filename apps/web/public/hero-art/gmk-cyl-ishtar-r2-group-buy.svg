  <title>thock hero — GMK CYL Ishtar R2, top-down 75% board silhouette with a lapis-blue splash across the alpha cluster recalling the glazed brickwork of the Ishtar Gate, a sandstone-tinted spacebar nodding to the cream reliefs of the original set, warm-bronze hairlines on top and bottom case edges</title>

  <!-- Editorial hook: the article is the GMK CYL Ishtar R2 group-buy
       companion piece. Ishtar draws from the Ishtar Gate of Babylon —
       glazed brickwork in deep lapis with cream sandstone reliefs of
       lions and aurochs. R2 is the second round; palette unchanged.
       The hero reads as "a CYL companion piece, but lapis-and-sandstone
       instead of coral": lapis splash on a contiguous block of alphas
       and the spacebar tinted sandstone for the secondary cream tone.
       Warm-bronze hairlines hug the top and bottom case edges only.
       Everything else is the project standard warm-grey stroke on a
       transparent canvas. -->

  <!-- ============================================================
       BOARD OUTLINE — 75% top-down silhouette
       Case rectangle 1020 x 410, rounded rx 14, with an inset bezel
       hint at 0.35 stroke opacity.
       ============================================================ -->

