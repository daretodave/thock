  <rect x="90" y="200" width="1020" height="410" rx="14" ry="14"/>

  <!-- Inset bezel hint -->
  <rect x="106" y="216" width="988" height="378" rx="9" ry="9" stroke-opacity="0.35"/>

  <!-- Warm-bronze hairline on TOP case edge (sparing accent) -->
  <line x1="118" y1="206" x2="1082" y2="206"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

  <!-- Warm-bronze hairline on BOTTOM case edge (sparing accent) -->
  <line x1="118" y1="604" x2="1082" y2="604"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

