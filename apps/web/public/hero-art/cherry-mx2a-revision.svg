<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — Cherry MX2A switch cross-section, with factory-grease inset</title>

  <!-- Splash: cherry-red wash centered on the stem column — the focal "what changed" piece -->
  <ellipse cx="500" cy="470" rx="120" ry="190" fill="oklch(0.6 0.19 30 / 0.18)" stroke="none"/>

  <!-- ── DETAIL CALLOUT (top-right): magnified inset showing factory grease ring ─────────── -->
  <g>
    <!-- Trace line from stem-housing interface to inset -->
    <path d="M 525 290 C 700 280, 850 200, 940 175" stroke-opacity="0.5" stroke-dasharray="3 5"/>
    <!-- Tiny tick at origin (stem-housing interface) -->
    <circle cx="525" cy="290" r="3" stroke-opacity="0.7"/>

    <!-- Magnified inset circle -->
    <circle cx="1000" cy="160" r="78"/>
    <!-- Frame ring (slightly inset) -->
    <circle cx="1000" cy="160" r="72" stroke-opacity="0.35"/>

    <!-- Inside the inset: the grease ring itself, splash-colored to call out the new lube -->
    <circle cx="1000" cy="160" r="42" fill="oklch(0.6 0.19 30 / 0.22)" stroke="oklch(0.6 0.19 30)" stroke-opacity="0.7"/>
    <circle cx="1000" cy="160" r="32" stroke-opacity="0.5"/>

    <!-- Lube dots — scattered inside the ring band -->
    <circle cx="982" cy="142" r="2.5" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="1018" cy="148" r="2" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="1024" cy="172" r="2.5" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="1006" cy="184" r="2" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="980" cy="178" r="2.5" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="970" cy="158" r="2" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="996" cy="138" r="2" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>
    <circle cx="1014" cy="170" r="2" fill="oklch(0.6 0.19 30 / 0.7)" stroke="none"/>

    <!-- Tiny "cross-section of stem-pole" indicator: a faint cross at the inset center -->
    <line x1="993" y1="160" x2="1007" y2="160" stroke-opacity="0.45"/>
    <line x1="1000" y1="153" x2="1000" y2="167" stroke-opacity="0.45"/>

    <!-- Magnification glyph — small + arc on the upper-left of inset -->
    <path d="M 950 110 A 22 22 0 0 1 970 100" stroke-opacity="0.45"/>
  </g>

  <!-- ── TOP HOUSING (side-view profile, cut-away half) ────────────────────────────────── -->
  <g>
    <!-- Outer top housing -->
    <path d="
      M 360 215
      L 640 215
      L 660 305
      L 340 305
      Z" />
    <!-- Stem hole at top -->
    <path d="
      M 460 215
      L 540 215
      L 545 248
      L 455 248
      Z" />
    <!-- Inner cavity ribs -->
    <line x1="360" y1="265" x2="450" y2="265" stroke-opacity="0.45"/>
    <line x1="550" y1="265" x2="640" y2="265" stroke-opacity="0.45"/>
    <!-- Mounting clip nubs on the side -->
    <line x1="360" y1="245" x2="350" y2="245" stroke-opacity="0.5"/>
    <line x1="640" y1="245" x2="650" y2="245" stroke-opacity="0.5"/>
  </g>

  <!-- ── HOUSING SEAM LINE (the diagnostic line — top-half meets bottom-half) ──────────── -->
  <line x1="330" y1="305" x2="670" y2="305" stroke-dasharray="4 6" stroke-opacity="0.55"/>
  <!-- Tiny seam labels — small ticks left/right -->
  <line x1="320" y1="305" x2="328" y2="305" stroke-opacity="0.4"/>
  <line x1="672" y1="305" x2="680" y2="305" stroke-opacity="0.4"/>

  <!-- ── STEM (POM, vertical column, with cruciform mount visible at top) ──────────────── -->
  <g>
    <!-- Cruciform mount (the + shape that the keycap mounts onto) — peeking above housing -->
    <path d="
      M 480 188
      L 520 188
      L 520 200
      L 530 200
      L 530 215
      L 470 215
      L 470 200
      L 480 200
      Z"
      fill="oklch(0.6 0.19 30 / 0.45)"
      stroke="oklch(0.6 0.19 30)"/>

    <!-- Stem body (vertical column inside housing) -->
    <path d="
      M 470 248
      L 530 248
      L 530 470
      L 470 470
      Z"
      fill="oklch(0.6 0.19 30 / 0.35)"
      stroke="oklch(0.6 0.19 30)"/>

    <!-- Vertical center line -->
    <line x1="500" y1="255" x2="500" y2="465" stroke="oklch(0.6 0.19 30)" stroke-opacity="0.6"/>

    <!-- Skirt rails on either side of stem (linear ticks) -->
    <line x1="470" y1="290" x2="455" y2="290" stroke-opacity="0.5"/>
    <line x1="470" y1="340" x2="455" y2="340" stroke-opacity="0.5"/>
    <line x1="470" y1="390" x2="455" y2="390" stroke-opacity="0.5"/>
    <line x1="530" y1="290" x2="545" y2="290" stroke-opacity="0.5"/>
    <line x1="530" y1="340" x2="545" y2="340" stroke-opacity="0.5"/>
    <line x1="530" y1="390" x2="545" y2="390" stroke-opacity="0.5"/>

    <!-- Stem pole (where spring slots in) — bottom -->
    <line x1="485" y1="470" x2="485" y2="500" stroke-opacity="0.5"/>
    <line x1="515" y1="470" x2="515" y2="500" stroke-opacity="0.5"/>
  </g>

  <!-- ── SPRING (5 coils, simplified, coiled vertical to right of stem) ────────────────── -->
  <g>
    <!-- Position spring slightly off-axis to the right so it reads as a separate component -->
    <ellipse cx="500" cy="510" rx="34" ry="6"/>
    <ellipse cx="500" cy="528" rx="34" ry="6"/>
    <ellipse cx="500" cy="546" rx="34" ry="6"/>
    <ellipse cx="500" cy="564" rx="34" ry="6"/>
    <ellipse cx="500" cy="582" rx="34" ry="6"/>
    <!-- Spring axis -->
    <line x1="500" y1="504" x2="500" y2="588" stroke-opacity="0.35" stroke-dasharray="2 4"/>
  </g>

  <!-- ── LEAF CONTACT (bent-leaf on left side, stroke-only) ────────────────────────────── -->
  <g>
    <!-- Leaf entering from bottom-left, bending up toward stem -->
    <path d="
      M 380 670
      L 380 600
      C 380 560, 410 545, 430 540
      L 460 535
      C 470 533, 472 528, 470 522
      L 462 506" stroke-opacity="0.85"/>
    <!-- Contact point dimple -->
    <circle cx="463" cy="510" r="3" stroke-opacity="0.7"/>
    <!-- Faint second leaf (the stationary contact it touches) -->
    <path d="
      M 408 670
      L 408 612
      C 408 580, 425 568, 440 562" stroke-opacity="0.45"/>
  </g>

  <!-- ── BOTTOM HOUSING ──────────────────────────────────────────────────────────────── -->
  <g>
    <!-- Outer bottom housing -->
    <path d="M 340 605 L 660 605 L 645 695 L 355 695 Z" />
    <!-- Inner well (where spring seats) -->
    <path d="M 460 605 L 540 605 L 535 645 L 465 645 Z" stroke-opacity="0.6"/>
    <!-- Pin contacts on the underside -->
    <circle cx="395" cy="675" r="5"/>
    <circle cx="605" cy="675" r="5"/>
    <!-- Center mount post -->
    <circle cx="500" cy="675" r="6" stroke-opacity="0.6"/>
    <!-- Side rail mount nubs (5-pin PCB-mount stubs) -->
    <line x1="420" y1="605" x2="420" y2="618" stroke-opacity="0.5"/>
    <line x1="580" y1="605" x2="580" y2="618" stroke-opacity="0.5"/>
  </g>

  <!-- Subtle measurement tick marks, didactic — left margin -->
  <g stroke-opacity="0.3">
    <line x1="280" y1="215" x2="290" y2="215"/>
    <line x1="280" y1="305" x2="290" y2="305"/>
    <line x1="280" y1="470" x2="290" y2="470"/>
    <line x1="280" y1="605" x2="290" y2="605"/>
  </g>
</svg>
