<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — Keychron quiet takeover: 75% keyboard silhouette, top-down layout, paired with an ascending sparkline arc representing brand momentum</title>

  <!-- Muted terracotta wash behind the upper-right sparkline terminus — focal region -->
  <ellipse cx="990" cy="155" rx="200" ry="110" fill="oklch(0.62 0.09 32 / 0.10)" stroke="none"/>

  <!-- ==========================================================
       75% case outline — Keychron family archetype.
       Rectilinear, lightly chamfered corners. Top-down read.
       Canvas: 1200×750. Board occupies left-center band,
       leaving upper-right quadrant for the sparkline terminus.
       Case box: x 80–930, y 310–670.
       ========================================================== -->
  <g>
    <!-- Outer case -->
    <path d="
      M  96 310
      L 912 310
      L 928 326
      L 928 654
      L 912 670
      L  96 670
      L  80 654
      L  80 326
      Z" />
    <!-- Inner bezel -->
    <path d="
      M 112 328
      L 908 328
      L 916 336
      L 916 642
      L 908 650
      L 112 650
      L 104 642
      L 104 336
      Z" stroke-opacity="0.50"/>
    <!-- Warm-bronze accent line on the top case edge -->
    <line x1="96" y1="310" x2="912" y2="310" stroke="oklch(0.80 0.135 75)" stroke-width="2.5" stroke-opacity="0.85"/>
    <!-- Subtle weight separation at base -->
    <line x1="96" y1="656" x2="912" y2="656" stroke-opacity="0.35"/>
  </g>

  <!-- ==========================================================
       75% layout — six rows (function row + 5 main rows).
       Key pitch: 38px keys, 4px gutters (42px step).
       Origin: x=120, y=346.
       16 columns; right-hand nav column on rows 1-2 and 4-5.
       ========================================================== -->

  <!-- Function row — compressed height 28px -->
  <g>
    <rect x="120" y="346" width="38" height="28" rx="3"/>
    <rect x="162" y="346" width="38" height="28" rx="3"/>
    <rect x="204" y="346" width="38" height="28" rx="3"/>
    <rect x="246" y="346" width="38" height="28" rx="3"/>
    <rect x="288" y="346" width="38" height="28" rx="3"/>
    <rect x="330" y="346" width="38" height="28" rx="3"/>
