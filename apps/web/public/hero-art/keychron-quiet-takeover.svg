    <rect x="876" y="346" width="38" height="28" rx="3"/>
  </g>

  <!-- Row 1 — number row, 15 alpha keys + backspace + 2 nav -->
  <g>
    <rect x="120" y="382" width="38" height="38" rx="3"/>
    <rect x="162" y="382" width="38" height="38" rx="3"/>
    <rect x="204" y="382" width="38" height="38" rx="3"/>
    <rect x="246" y="382" width="38" height="38" rx="3"/>
    <rect x="288" y="382" width="38" height="38" rx="3"/>
