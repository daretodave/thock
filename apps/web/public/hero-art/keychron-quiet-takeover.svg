    <rect x="456" y="346" width="38" height="28" rx="3"/>
    <rect x="498" y="346" width="38" height="28" rx="3"/>
    <rect x="540" y="346" width="38" height="28" rx="3"/>
    <rect x="582" y="346" width="38" height="28" rx="3"/>
    <rect x="624" y="346" width="38" height="28" rx="3"/>
    <rect x="666" y="346" width="38" height="28" rx="3"/>
