  </g>

  <!-- Row 5 — bottom row: mods + spacebar + mods + arrows -->
  <g>
    <rect x="120" y="550" width="50" height="38" rx="3"/>
    <rect x="174" y="550" width="50" height="38" rx="3"/>
    <rect x="228" y="550" width="50" height="38" rx="3"/>
    <rect x="282" y="550" width="262" height="38" rx="3"/>
    <rect x="548" y="550" width="50" height="38" rx="3"/>
    <rect x="602" y="550" width="50" height="38" rx="3"/>
    <rect x="656" y="550" width="50" height="38" rx="3"/>
    <rect x="710" y="550" width="38" height="38" rx="3"/>
    <rect x="750" y="550" width="38" height="38" rx="3"/>
    <rect x="792" y="550" width="38" height="38" rx="3"/>
