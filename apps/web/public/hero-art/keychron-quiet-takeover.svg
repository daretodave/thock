    <rect x="876" y="550" width="38" height="38" rx="3"/>
  </g>

  <!-- ==========================================================
       ASCENDING SPARKLINE ARC — the trends thesis.
       A single smooth cubic bezier sweeps from the lower-left
       corner of the canvas up to the upper-right, cresting above
       the keyboard case's top edge.

       Path origin: (60, 660) — just left of the board base.
       Control point 1: (380, 520) — follows the rising left wall.
       Control point 2: (820, 120) — pulls the arc high before terminus.
       Terminus: (1140, 88) — upper-right, well above the board.

       A second, offset path at lower opacity creates a gentle
       shadow thickness, giving the line editorial weight without
       making it feel heavy.
       ========================================================== -->

  <!-- Sparkline shadow (same path, offset slightly, low opacity) -->
  <path d="M 60 668 C 380 528 820 128 1140 96"
        stroke="oklch(0.62 0.09 32)" stroke-width="3.5" stroke-opacity="0.18" fill="none"/>

  <!-- Sparkline main stroke — terracotta splash -->
  <path d="M 60 660 C 380 520 820 120 1140 88"
        stroke="oklch(0.62 0.09 32)" stroke-width="2.5" stroke-opacity="0.92" fill="none"/>

  <!-- Momentum tick marks along the sparkline — six knots suggesting data points.
       Computed roughly along the cubic at t = 0.1, 0.2, 0.4, 0.6, 0.8, 0.95.
       Each knot is a small perpendicular tick; no fill, no dots (keeps it minimal). -->

  <!-- t≈0.10  → approx (153, 622) -->
  <line x1="149" y1="628" x2="157" y2="616" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>
  <!-- t≈0.22  → approx (268, 565) -->
  <line x1="264" y1="571" x2="272" y2="559" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>
  <!-- t≈0.38  → approx (440, 487) -->
  <line x1="436" y1="493" x2="444" y2="481" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>
  <!-- t≈0.56  → approx (640, 368) -->
  <line x1="636" y1="374" x2="644" y2="362" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>
  <!-- t≈0.74  → approx (850, 236) -->
  <line x1="846" y1="242" x2="854" y2="230" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>
  <!-- t≈0.90  → approx (1028, 135) -->
  <line x1="1024" y1="141" x2="1032" y2="129" stroke="oklch(0.62 0.09 32)" stroke-width="2" stroke-opacity="0.65"/>

  <!-- Terminus dot — solid terracotta circle at sparkline end, the visual focal anchor -->
  <circle cx="1140" cy="88" r="7"
          fill="oklch(0.62 0.09 32)" stroke="none"/>
  <!-- Outer halo ring at terminus — reads as "current value" in data-viz grammar -->
  <circle cx="1140" cy="88" r="14"
          stroke="oklch(0.62 0.09 32)" stroke-opacity="0.38" stroke-width="1.5" fill="none"/>

  <!-- ==========================================================
       BRONZE THEME DOT — upper-right margin family ornament.
       Per hero-art spec: small oklch(0.80 0.135 75) circle.
       Positioned to the left of the sparkline terminus, clear
       of overlap.
       ========================================================== -->
  <circle cx="1080" cy="58" r="8"
          fill="oklch(0.80 0.135 75)" fill-opacity="0.88" stroke="none"/>

  <!-- ==========================================================
       SUBTLE HORIZONTAL AXIS GHOST — a faint baseline beneath
       the sparkline, anchoring it in the data-chart grammar.
       Dashed, very low opacity, does not compete with the board.
       ========================================================== -->
  <line x1="40" y1="675" x2="1160" y2="675"
        stroke-dasharray="4 10" stroke-opacity="0.20" fill="none"/>

</svg>
