    <rect x="602" y="424" width="38" height="38" rx="3"/>
    <rect x="644" y="424" width="38" height="38" rx="3"/>
    <rect x="686" y="424" width="60" height="38" rx="3"/>
    <rect x="750" y="424" width="38" height="38" rx="3"/>
    <rect x="792" y="424" width="38" height="38" rx="3"/>
    <rect x="834" y="424" width="38" height="38" rx="3"/>
    <rect x="876" y="424" width="38" height="38" rx="3"/>
  </g>

  <!-- Row 3 — caps row: caps + 12 + enter (iso-ish enter spans 2u), nav col on right only row 3 -->
  <g>
    <rect x="120" y="466" width="68" height="38" rx="3"/>
