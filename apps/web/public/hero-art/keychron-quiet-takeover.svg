    <rect x="372" y="382" width="38" height="38" rx="3"/>
    <rect x="414" y="382" width="38" height="38" rx="3"/>
    <rect x="456" y="382" width="38" height="38" rx="3"/>
    <rect x="498" y="382" width="38" height="38" rx="3"/>
    <rect x="540" y="382" width="38" height="38" rx="3"/>
    <rect x="582" y="382" width="38" height="38" rx="3"/>
    <rect x="624" y="382" width="38" height="38" rx="3"/>
    <rect x="666" y="382" width="80" height="38" rx="3"/>
    <rect x="750" y="382" width="38" height="38" rx="3"/>
    <rect x="792" y="382" width="38" height="38" rx="3"/>
    <rect x="834" y="382" width="38" height="38" rx="3"/>
    <rect x="876" y="382" width="38" height="38" rx="3"/>
  </g>

  <!-- Row 2 — qwerty row: tab + 13 + backslash + nav -->
  <g>
    <rect x="120" y="424" width="58" height="38" rx="3"/>
    <rect x="182" y="424" width="38" height="38" rx="3"/>
    <rect x="224" y="424" width="38" height="38" rx="3"/>
    <rect x="266" y="424" width="38" height="38" rx="3"/>
    <rect x="308" y="424" width="38" height="38" rx="3"/>
