  <g stroke="oklch(0.92 0.025 85)" stroke-opacity="0.45" stroke-width="1.5">
    <!-- Backtick scoop -->
    <path d="M 128 312 Q 148 306 168 312"/>
    <!-- E scoop -->
    <path d="M 352 376 Q 372 370 392 376"/>
    <!-- G scoop -->
    <path d="M 496 440 Q 516 434 536 440"/>
    <!-- Up arrow scoop -->
