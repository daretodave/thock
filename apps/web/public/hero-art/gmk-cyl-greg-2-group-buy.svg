  <rect x="126" y="548" width="60" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- LWin 1.25u -->
  <rect x="198" y="538" width="76" height="56" rx="5" ry="5"/>
  <rect x="206" y="548" width="60" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- LAlt 1.25u (coral accent 5 of 6 — mod accent) -->
