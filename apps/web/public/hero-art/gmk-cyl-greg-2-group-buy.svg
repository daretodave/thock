<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — GMK CYL GREG 2, top-down 75% board silhouette with a full keycap set in CYL profile, six coral accent caps distributed across the layout as the GREG colorway accents, warm-bronze hairlines on top and bottom case edges</title>

  <!-- Editorial hook: the article is the GREG 2 GB companion piece. The visual
       read is "a full set of CYL caps seated in a 75% board, mostly warm-grey,
       with the GREG accent colorway picked out in coral on six distributed
       caps." Warm-bronze hairlines hug the top and bottom case edges only.
       Everything else is the project standard warm-grey stroke on a
       transparent canvas. -->

  <!-- ============================================================
       BOARD OUTLINE - 75% top-down silhouette
       ~15.5u wide x 5 rows tall, centered in the lower 2/3 of canvas.
       Case rectangle 1020 x 410, rounded rx 14, with an inset bezel
       hint at 0.35 stroke opacity.
       ============================================================ -->

  <!-- Outer case profile -->
  <rect x="90" y="200" width="1020" height="410" rx="14" ry="14"/>

  <!-- Inset bezel hint -->
  <rect x="106" y="216" width="988" height="378" rx="9" ry="9" stroke-opacity="0.35"/>

  <!-- Warm-bronze hairline on TOP case edge (sparing accent) -->
  <line x1="118" y1="206" x2="1082" y2="206"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

  <!-- Warm-bronze hairline on BOTTOM case edge (sparing accent) -->
  <line x1="118" y1="604" x2="1082" y2="604"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

  <!-- ============================================================
       KEYCAP GRID - top-down CYL silhouettes
       Five rows: F-row (smaller), number row, top alpha, home,
       bottom row. ~60px square caps with a 6px gap. The cap
       drawing is a rounded rect with a slightly inset inner top
       surface, reading as CYL profile from straight overhead.
       Modifiers on the right take wider footprints.

       Coordinate plan:
         Row 1 (F-row):    y 234, h 36   (smaller F keys)
         Row 2 (number):   y 282, h 56
         Row 3 (top alpha):y 346, h 56
         Row 4 (home):     y 410, h 56
         Row 5 (bottom):   y 474, h 56
         Spacebar gap to bottom of bezel handled by row 6 modifiers.
       Column pitch ~64px starting x 118.
       ============================================================ -->

  <!-- ── ROW 1 — Function row (smaller caps, slightly recessed) ── -->
  <g stroke-opacity="0.85">
    <!-- Esc -->
    <rect x="118" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="124" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <!-- F1..F4 -->
    <rect x="180" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="186" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="242" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="248" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="304" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="310" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="366" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="372" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <!-- F5..F8 -->
    <rect x="446" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="452" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="508" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="514" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="570" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="576" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="632" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="638" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <!-- F9..F12 -->
    <rect x="712" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="718" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="774" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="780" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="836" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="842" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <rect x="898" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="904" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
    <!-- Nav column (75% tell): Del/Home/PgUp-ish -->
    <rect x="978" y="232" width="56" height="36" rx="4" ry="4"/>
    <rect x="984" y="240" width="44" height="20" rx="2" ry="2" stroke-opacity="0.45"/>
  </g>

  <!-- ============================================================
       Standard cap helper geometry (top-down with CYL inset).
       Each cap is two paths:
         - outer rounded-rect footprint (60w x 56h baseline for 1u)
         - inner inset top surface (slightly smaller, lighter stroke)
       Coral splash caps additionally take fill = oklch(0.74 0.16 30 / .82)
       and a slightly stronger coral border, with the inner surface
       drawn lighter coral so the CYL scoop still reads.
       ============================================================ -->

  <!-- ── ROW 2 — Number row ── -->
  <!-- Backtick (coral accent 1 of 6) -->
  <rect x="118" y="282" width="60" height="56" rx="5" ry="5"
        fill="oklch(0.74 0.16 30 / 0.82)" stroke="oklch(0.66 0.17 30)"/>
  <rect x="126" y="292" width="44" height="36" rx="3" ry="3"
        fill="oklch(0.86 0.09 30 / 0.55)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55"/>
  <!-- 1 -->
  <rect x="182" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="190" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 2 -->
  <rect x="246" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="254" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 3 -->
  <rect x="310" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="318" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 4 -->
  <rect x="374" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="382" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 5 -->
  <rect x="438" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="446" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 6 -->
  <rect x="502" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="510" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 7 -->
  <rect x="566" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="574" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 8 -->
  <rect x="630" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="638" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 9 -->
  <rect x="694" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="702" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- 0 -->
  <rect x="758" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="766" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- minus -->
  <rect x="822" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="830" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- equals -->
  <rect x="886" y="282" width="60" height="56" rx="5" ry="5"/>
  <rect x="894" y="292" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- Backspace 2u (124 wide) -->
  <rect x="950" y="282" width="84" height="56" rx="5" ry="5"/>
  <rect x="958" y="292" width="68" height="36" rx="3" ry="3" stroke-opacity="0.5"/>

  <!-- ── ROW 3 — Top alpha (Q row) ── -->
  <!-- Tab 1.5u (92 wide) -->
  <rect x="118" y="346" width="92" height="56" rx="5" ry="5"/>
  <rect x="126" y="356" width="76" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- Q -->
  <rect x="214" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="222" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- W -->
  <rect x="278" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="286" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- E (coral accent 2 of 6) -->
  <rect x="342" y="346" width="60" height="56" rx="5" ry="5"
        fill="oklch(0.74 0.16 30 / 0.82)" stroke="oklch(0.66 0.17 30)"/>
  <rect x="350" y="356" width="44" height="36" rx="3" ry="3"
        fill="oklch(0.86 0.09 30 / 0.55)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55"/>
  <!-- R -->
  <rect x="406" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="414" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- T -->
  <rect x="470" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="478" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- Y -->
  <rect x="534" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="542" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- U -->
  <rect x="598" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="606" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- I -->
  <rect x="662" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="670" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- O -->
  <rect x="726" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="734" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- P -->
  <rect x="790" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="798" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- [ -->
  <rect x="854" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="862" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- ] -->
  <rect x="918" y="346" width="60" height="56" rx="5" ry="5"/>
  <rect x="926" y="356" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- backslash 1.25u (76 wide) -->
  <rect x="982" y="346" width="52" height="56" rx="5" ry="5"/>
  <rect x="990" y="356" width="36" height="36" rx="3" ry="3" stroke-opacity="0.5"/>

  <!-- ── ROW 4 — Home row (A row) ── -->
  <!-- Caps 1.75u (108 wide) -->
  <rect x="118" y="410" width="108" height="56" rx="5" ry="5"/>
  <rect x="126" y="420" width="92" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- A -->
  <rect x="230" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="238" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- S -->
  <rect x="294" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="302" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- D -->
  <rect x="358" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="366" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- F -->
