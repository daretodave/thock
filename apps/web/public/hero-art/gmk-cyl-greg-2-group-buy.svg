  <rect x="574" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- M -->
  <rect x="630" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="638" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- , -->
  <rect x="694" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="702" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- . -->
  <rect x="758" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="766" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- / -->
  <rect x="822" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="830" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- RShift 1.75u (108 wide) -->
