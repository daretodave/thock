  <rect x="494" y="420" width="44" height="36" rx="3" ry="3"
        fill="oklch(0.86 0.09 30 / 0.55)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55"/>
  <!-- H -->
  <rect x="550" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="558" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- J -->
  <rect x="614" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="622" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- K -->
  <rect x="678" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="686" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- L -->
  <rect x="742" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="750" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- ; -->
  <rect x="806" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="814" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- ' -->
  <rect x="870" y="410" width="60" height="56" rx="5" ry="5"/>
  <rect x="878" y="420" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- Enter 2.25u (140 wide) -->
  <rect x="934" y="410" width="100" height="56" rx="5" ry="5"/>
  <rect x="942" y="420" width="84" height="36" rx="3" ry="3" stroke-opacity="0.5"/>

  <!-- ── ROW 5 — Bottom alpha (Z row) ── -->
  <!-- LShift 2.25u (108 -> 124 wide for 75% layout) -->
  <rect x="118" y="474" width="124" height="56" rx="5" ry="5"/>
  <rect x="126" y="484" width="108" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- Z -->
  <rect x="246" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="254" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- X -->
  <rect x="310" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="318" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- C -->
  <rect x="374" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="382" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- V -->
  <rect x="438" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="446" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- B -->
  <rect x="502" y="474" width="60" height="56" rx="5" ry="5"/>
  <rect x="510" y="484" width="44" height="36" rx="3" ry="3" stroke-opacity="0.5"/>
  <!-- N -->
