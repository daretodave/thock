<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — keyboard cross-section with floating gasket-mount plate</title>

  <!-- ===== Background ===== -->
  <rect width="1200" height="750" fill="#0E0E10" stroke="none"/>

  <!-- ===== Warm amber glow wash behind the floating plate gap ===== -->
  <rect x="240" y="316" width="720" height="24" rx="4" fill="oklch(0.80 0.135 75 / 0.07)" stroke="none"/>

  <!-- ===== TOP CASE shell ===== -->
  <!-- Outer top case: a wide shallow trapezoid — taller at back (left), angled down at front (right) -->
  <path d="
    M 200 200
    L 1000 200
    Q 1010 200 1010 210
    L 1010 310
    Q 1010 322 998 322
    L 202 322
    Q 190 322 190 310
    L 190 210
    Q 190 200 200 200
    Z"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.75"/>

  <!-- Inner bezel of top case — recess line -->
  <path d="M 216 218 L 994 218 L 994 308 L 216 308 Z" rx="4"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.30"/>

  <!-- ===== CASE WALLS (side cross-section vertical lines) ===== -->
  <!-- Left wall inner face -->
  <line x1="216" y1="218" x2="216" y2="550" stroke-opacity="0.45"/>
  <!-- Right wall inner face -->
  <line x1="994" y1="218" x2="994" y2="550" stroke-opacity="0.45"/>

  <!-- ===== BOTTOM CASE shell ===== -->
  <path d="
    M 190 530
    Q 190 520 200 520
    L 1000 520
    Q 1010 520 1010 530
    L 1010 570
    Q 1010 580 1000 580
    L 200 580
    Q 190 580 190 570
    Z"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.75"/>

  <!-- Bottom case inner detail line -->
  <line x1="216" y1="545" x2="994" y2="545" stroke-opacity="0.30"/>

  <!-- ===== PCB ===== -->
  <!-- PCB sits on standoffs inside the bottom case -->
  <rect x="250" y="470" width="700" height="36" rx="3"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55"/>
  <!-- PCB component traces hint (three short dashes) -->
  <line x1="310" y1="484" x2="360" y2="484" stroke-opacity="0.28" stroke-dasharray="4 6"/>
  <line x1="580" y1="484" x2="640" y2="484" stroke-opacity="0.28" stroke-dasharray="4 6"/>
  <line x1="830" y1="484" x2="880" y2="484" stroke-opacity="0.28" stroke-dasharray="4 6"/>

  <!-- Standoffs between PCB and bottom case (left, center, right) -->
  <line x1="310" y1="506" x2="310" y2="520" stroke-opacity="0.40"/>
  <line x1="600" y1="506" x2="600" y2="520" stroke-opacity="0.40"/>
  <line x1="890" y1="506" x2="890" y2="520" stroke-opacity="0.40"/>

  <!-- ===== GASKET PADS ===== -->
  <!-- Three gasket pads: left, center-left, right -->
  <!-- Each pad: a thick short rectangle sitting between plate edge and case wall -->

  <!-- Left gasket pad -->
  <rect x="226" y="344" width="22" height="54" rx="4"
    fill="oklch(0.78 0.005 90 / 0.12)"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.70" stroke-width="1.5"/>
  <!-- Left pad compression hatching (light diagonal lines) -->
  <line x1="228" y1="360" x2="246" y2="345" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="228" y1="378" x2="246" y2="363" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="228" y1="396" x2="246" y2="381" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Center gasket pad -->
  <rect x="589" y="344" width="22" height="54" rx="4"
    fill="oklch(0.78 0.005 90 / 0.12)"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.70" stroke-width="1.5"/>
  <line x1="591" y1="360" x2="609" y2="345" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="591" y1="378" x2="609" y2="363" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="591" y1="396" x2="609" y2="381" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Right gasket pad -->
  <rect x="952" y="344" width="22" height="54" rx="4"
    fill="oklch(0.78 0.005 90 / 0.12)"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.70" stroke-width="1.5"/>
  <line x1="954" y1="360" x2="972" y2="345" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="954" y1="378" x2="972" y2="363" stroke-opacity="0.22" stroke-width="1"/>
  <line x1="954" y1="396" x2="972" y2="381" stroke-opacity="0.22" stroke-width="1"/>

  <!-- ===== FLOATING PLATE ===== -->
  <!-- Plate floats on the gasket pads, clear gap above PCB -->
  <rect x="248" y="398" width="704" height="58" rx="3"
    fill="oklch(0.78 0.005 90 / 0.06)"
    stroke="oklch(0.78 0.005 90)" stroke-opacity="0.85" stroke-width="2"/>

  <!-- Plate surface texture hint: two faint horizontal lines -->
  <line x1="260" y1="416" x2="940" y2="416" stroke-opacity="0.18"/>
  <line x1="260" y1="444" x2="940" y2="444" stroke-opacity="0.18"/>

  <!-- Switch stems mounting through plate (four stylized cross-section hints) -->
  <g stroke-opacity="0.38" stroke-width="1.5">
    <rect x="318" y="403" width="28" height="48" rx="2"/>
    <rect x="488" y="403" width="28" height="48" rx="2"/>
    <rect x="684" y="403" width="28" height="48" rx="2"/>
    <rect x="854" y="403" width="28" height="48" rx="2"/>
  </g>

  <!-- ===== AMBER ACCENT LINE tracing the gap between floating plate and top case ===== -->
  <!-- This is the key "flex gap" that defines gasket mount behavior -->
  <path d="M 248 398 L 952 398"
    stroke="#C8722A" stroke-opacity="0.90" stroke-width="2.5"/>

  <!-- Amber glow behind the accent line (soft bloom) -->
  <path d="M 248 398 L 952 398"
    stroke="#C8722A" stroke-opacity="0.18" stroke-width="8"/>

  <!-- Small amber tick marks at each gasket pad position showing flex points -->
  <line x1="248" y1="390" x2="248" y2="408" stroke="#C8722A" stroke-opacity="0.75" stroke-width="2"/>
  <line x1="600" y1="390" x2="600" y2="408" stroke="#C8722A" stroke-opacity="0.75" stroke-width="2"/>
  <line x1="952" y1="390" x2="952" y2="408" stroke="#C8722A" stroke-opacity="0.75" stroke-width="2"/>

  <!-- ===== CALLOUT: annotation pointing to the gasket pad and gap ===== -->
  <!-- Leader line from upper right area to the left gasket pad -->
  <g stroke="oklch(0.80 0.135 75)" stroke-width="1.5">
    <path d="M 108 280 L 180 280 L 230 352" fill="none" stroke-opacity="0.80"/>
    <!-- Arrowhead -->
    <path d="M 230 352 L 218 344 M 230 352 L 222 362" fill="none" stroke-opacity="0.80"/>
  </g>

  <!-- Callout anchor dot -->
  <circle cx="108" cy="280" r="4" fill="oklch(0.80 0.135 75)" stroke="none"/>

  <!-- Callout label: "gasket" in small mono-style lettering -->
  <text x="62" y="266"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13"
    fill="oklch(0.80 0.135 75)"
    fill-opacity="0.90"
    letter-spacing="0.04em"
    text-anchor="middle">gasket</text>
  <text x="62" y="282"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13"
    fill="oklch(0.80 0.135 75)"
    fill-opacity="0.90"
    letter-spacing="0.04em"
    text-anchor="middle">pad</text>

  <!-- Second annotation: the amber flex gap line itself -->
  <g stroke="oklch(0.80 0.135 75)" stroke-width="1.5">
    <path d="M 1092 370 L 1040 370 L 970 398" fill="none" stroke-opacity="0.80"/>
    <path d="M 970 398 L 982 390 M 970 398 L 978 408" fill="none" stroke-opacity="0.80"/>
  </g>
  <circle cx="1092" cy="370" r="4" fill="oklch(0.80 0.135 75)" stroke="none"/>
  <text x="1138" y="366"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13"
    fill="oklch(0.80 0.135 75)"
    fill-opacity="0.90"
    letter-spacing="0.04em"
    text-anchor="middle">flex</text>
  <text x="1138" y="382"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="13"
    fill="oklch(0.80 0.135 75)"
    fill-opacity="0.90"
    letter-spacing="0.04em"
    text-anchor="middle">gap</text>

  <!-- ===== KEYCAP ROW (side profile silhouettes on top of case) ===== -->
  <!-- Ten simplified keycap tops visible above the case upper edge -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55" stroke-width="1.5">
    <rect x="276" y="162" width="38" height="38" rx="5"/>
    <rect x="326" y="162" width="38" height="38" rx="5"/>
    <rect x="376" y="162" width="38" height="38" rx="5"/>
    <rect x="426" y="160" width="38" height="40" rx="5"/>
    <rect x="476" y="162" width="38" height="38" rx="5"/>
    <rect x="526" y="162" width="38" height="38" rx="5"/>
    <rect x="576" y="162" width="38" height="38" rx="5"/>
    <rect x="626" y="160" width="38" height="40" rx="5"/>
    <rect x="676" y="162" width="38" height="38" rx="5"/>
    <rect x="726" y="162" width="38" height="38" rx="5"/>
    <rect x="776" y="162" width="38" height="38" rx="5"/>
    <rect x="826" y="162" width="38" height="38" rx="5"/>
    <rect x="876" y="160" width="38" height="40" rx="5"/>
  </g>

  <!-- Switch stems: connecting keycaps to the plate (faint vertical lines) -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.22" stroke-width="1">
    <line x1="295" y1="200" x2="295" y2="403"/>
    <line x1="345" y1="200" x2="345" y2="403"/>
    <line x1="395" y1="200" x2="395" y2="403"/>
    <line x1="445" y1="200" x2="445" y2="403"/>
    <line x1="495" y1="200" x2="495" y2="403"/>
    <line x1="545" y1="200" x2="545" y2="403"/>
    <line x1="595" y1="200" x2="595" y2="403"/>
    <line x1="645" y1="200" x2="645" y2="403"/>
    <line x1="695" y1="200" x2="695" y2="403"/>
    <line x1="745" y1="200" x2="745" y2="403"/>
    <line x1="795" y1="200" x2="795" y2="403"/>
    <line x1="845" y1="200" x2="845" y2="403"/>
    <line x1="895" y1="200" x2="895" y2="403"/>
  </g>

  <!-- ===== SECTION LABELS ===== -->
  <!-- Faint label: "PCB" -->
  <text x="176" y="494"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">PCB</text>

  <!-- Faint label: "plate" -->
  <text x="176" y="430"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">plate</text>

  <!-- Faint label: "top case" -->
  <text x="176" y="268"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">top</text>
  <text x="176" y="282"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">case</text>

  <!-- Faint label: "bottom" -->
  <text x="176" y="552"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">btm</text>
  <text x="176" y="566"
    font-family="'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace"
    font-size="11"
    fill="oklch(0.78 0.005 90)"
    fill-opacity="0.35"
    text-anchor="end"
    letter-spacing="0.04em">case</text>
</svg>
