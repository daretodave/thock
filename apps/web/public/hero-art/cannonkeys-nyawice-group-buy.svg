<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — CannonKeys Nyawice, Alice top-down with coral cat-ear accents</title>

  <!-- Editorial hook: the cat ears + nose in coral are the only saturated color.
       Warm-bronze hairlines hug the top and bottom case edges. Everything else
       is the project standard warm-grey stroke on a transparent canvas. -->

  <!-- ── Ear shapes drawn BEHIND the case so the case edge crisply caps them.
       Triangular, friction-fit posture, slightly inward-leaning. -->
  <g>
    <!-- Left ear: outer slope, inner slope, base hidden behind case -->
    <path d="M 280 268 L 322 192 L 372 254 Z"
          fill="oklch(0.74 0.16 30 / 0.92)"
          stroke="oklch(0.66 0.17 30)"
          stroke-width="2"/>
    <!-- Inner-ear notch, paler coral — gives the ear a hint of dimension -->
    <path d="M 306 244 L 322 210 L 348 244 Z"
          fill="oklch(0.86 0.09 30 / 0.55)"
          stroke="none"/>

    <!-- Right ear: mirror -->
    <path d="M 828 254 L 878 192 L 920 268 Z"
          fill="oklch(0.74 0.16 30 / 0.92)"
          stroke="oklch(0.66 0.17 30)"
          stroke-width="2"/>
    <path d="M 852 244 L 878 210 L 894 244 Z"
          fill="oklch(0.86 0.09 30 / 0.55)"
          stroke="none"/>
  </g>

  <!-- ── Alice case outline.
       Top edge angles outward from a small center channel; left half tilts left,
       right half tilts right. -->
  <g>
    <path d="
      M 230 270
      L 580 230
      L 595 232
      L 595 268
      L 605 268
      L 605 232
      L 620 230
      L 970 270
      L 1000 290
      L 1000 470
      L 970 510
      L 230 510
      L 200 470
      L 200 290
      Z" />

    <!-- Inner bezel inset (top plate edge), slightly muted -->
    <path d="
      M 250 295
      L 585 258
      L 595 260
      L 595 290
      L 605 290
      L 605 260
      L 615 258
      L 950 295
      L 970 308
      L 970 460
      L 950 488
      L 250 488
      L 230 460
      L 230 308
      Z" stroke-opacity="0.55"/>

    <!-- Center split-channel hairlines -->
    <line x1="595" y1="268" x2="595" y2="488" stroke-opacity="0.45"/>
    <line x1="605" y1="268" x2="605" y2="488" stroke-opacity="0.45"/>
  </g>

  <!-- ── Warm-bronze accents on top + bottom case edges only.
       These are theme-accent hairlines that ride just inside the case lip. -->
  <g stroke="oklch(0.80 0.135 75)" stroke-opacity="0.85" stroke-width="2">
    <!-- Top edge — left flank -->
    <path d="M 234 275 L 582 236 L 593 237"/>
    <!-- Top edge — right flank -->
    <path d="M 607 237 L 618 236 L 966 275"/>
    <!-- Bottom edge — one continuous hairline -->
    <line x1="234" y1="506" x2="966" y2="506"/>
  </g>

  <!-- ── Nose accent: small coral wedge between the ears, sitting on the case top -->
  <path d="M 590 252 L 600 244 L 610 252 Z"
        fill="oklch(0.74 0.16 30 / 0.95)"
        stroke="oklch(0.66 0.17 30)"
        stroke-width="1.5"/>

  <!-- ── Left cluster — 5 rows, top two rows angled per Alice convention -->
  <g>
    <!-- Row 1 (numbers) -->
    <g>
      <rect x="282" y="285" width="42" height="42" rx="4" transform="rotate(-9 303 306)"/>
      <rect x="332" y="277" width="42" height="42" rx="4" transform="rotate(-9 353 298)"/>
      <rect x="382" y="269" width="42" height="42" rx="4" transform="rotate(-9 403 290)"/>
      <rect x="432" y="261" width="42" height="42" rx="4" transform="rotate(-9 453 282)"/>
      <rect x="482" y="253" width="42" height="42" rx="4" transform="rotate(-9 503 274)"/>
      <rect x="532" y="245" width="42" height="42" rx="4" transform="rotate(-9 553 266)"/>
    </g>
    <!-- Row 2 (qwerty) -->
    <g>
      <rect x="290" y="335" width="42" height="42" rx="4" transform="rotate(-9 311 356)"/>
      <rect x="340" y="327" width="42" height="42" rx="4" transform="rotate(-9 361 348)"/>
      <rect x="390" y="319" width="42" height="42" rx="4" transform="rotate(-9 411 340)"/>
      <rect x="440" y="311" width="42" height="42" rx="4" transform="rotate(-9 461 332)"/>
      <rect x="490" y="303" width="42" height="42" rx="4" transform="rotate(-9 511 324)"/>
      <rect x="540" y="295" width="42" height="42" rx="4" transform="rotate(-9 561 316)"/>
    </g>
    <!-- Row 3 (home) — flatter angle -->
    <g>
      <rect x="298" y="385" width="42" height="42" rx="4" transform="rotate(-5 319 406)"/>
      <rect x="348" y="381" width="42" height="42" rx="4" transform="rotate(-5 369 402)"/>
      <rect x="398" y="377" width="42" height="42" rx="4" transform="rotate(-5 419 398)"/>
      <rect x="448" y="373" width="42" height="42" rx="4" transform="rotate(-5 469 394)"/>
      <rect x="498" y="369" width="42" height="42" rx="4" transform="rotate(-5 519 390)"/>
      <rect x="548" y="365" width="42" height="42" rx="4" transform="rotate(-5 569 386)"/>
    </g>
    <!-- Row 4 -->
    <g>
      <rect x="306" y="430" width="42" height="42" rx="4"/>
      <rect x="356" y="430" width="42" height="42" rx="4"/>
      <rect x="406" y="430" width="42" height="42" rx="4"/>
      <rect x="456" y="430" width="42" height="42" rx="4"/>
      <rect x="506" y="430" width="42" height="42" rx="4"/>
      <rect x="556" y="430" width="42" height="42" rx="4"/>
    </g>
    <!-- Row 5: left split spacebar -->
    <rect x="380" y="478" width="160" height="38" rx="4"/>
  </g>

  <!-- ── Right cluster — mirror of left -->
  <g>
    <!-- Row 1 (numbers) -->
    <g>
      <rect x="626" y="245" width="42" height="42" rx="4" transform="rotate(9 647 266)"/>
      <rect x="676" y="253" width="42" height="42" rx="4" transform="rotate(9 697 274)"/>
      <rect x="726" y="261" width="42" height="42" rx="4" transform="rotate(9 747 282)"/>
      <rect x="776" y="269" width="42" height="42" rx="4" transform="rotate(9 797 290)"/>
      <rect x="826" y="277" width="42" height="42" rx="4" transform="rotate(9 847 298)"/>
      <rect x="876" y="285" width="42" height="42" rx="4" transform="rotate(9 897 306)"/>
    </g>
    <!-- Row 2 (qwerty) -->
    <g>
      <rect x="618" y="295" width="42" height="42" rx="4" transform="rotate(9 639 316)"/>
      <rect x="668" y="303" width="42" height="42" rx="4" transform="rotate(9 689 324)"/>
      <rect x="718" y="311" width="42" height="42" rx="4" transform="rotate(9 739 332)"/>
      <rect x="768" y="319" width="42" height="42" rx="4" transform="rotate(9 789 340)"/>
      <rect x="818" y="327" width="42" height="42" rx="4" transform="rotate(9 839 348)"/>
      <rect x="868" y="335" width="42" height="42" rx="4" transform="rotate(9 889 356)"/>
    </g>
    <!-- Row 3 (home) -->
    <g>
      <rect x="610" y="365" width="42" height="42" rx="4" transform="rotate(5 631 386)"/>
      <rect x="660" y="369" width="42" height="42" rx="4" transform="rotate(5 681 390)"/>
      <rect x="710" y="373" width="42" height="42" rx="4" transform="rotate(5 731 394)"/>
      <rect x="760" y="377" width="42" height="42" rx="4" transform="rotate(5 781 398)"/>
      <rect x="810" y="381" width="42" height="42" rx="4" transform="rotate(5 831 402)"/>
      <rect x="860" y="385" width="42" height="42" rx="4" transform="rotate(5 881 406)"/>
    </g>
    <!-- Row 4 -->
    <g>
      <rect x="602" y="430" width="42" height="42" rx="4"/>
      <rect x="652" y="430" width="42" height="42" rx="4"/>
      <rect x="702" y="430" width="42" height="42" rx="4"/>
      <rect x="752" y="430" width="42" height="42" rx="4"/>
      <rect x="802" y="430" width="42" height="42" rx="4"/>
      <rect x="852" y="430" width="42" height="42" rx="4"/>
    </g>
    <!-- Row 5: right split spacebar -->
    <rect x="660" y="478" width="160" height="38" rx="4"/>
  </g>
</svg>
