    <rect x="894" y="482" width="42" height="42" rx="3"/>
    <rect x="940" y="482" width="42" height="42" rx="3"/>
  </g>

  <!-- ============================================================
       Wireless / battery indicator — focal accent painted in the
       splash hue. Sits as a small badge above the upper-right of
       the case, slightly outside the bezel like an antenna pip.
       Composition: a horizontal battery silhouette with three
       fill segments, plus a small Bluetooth glyph cradled to its
       left. The whole graphic carries the splash; the board stays
       stroke-only.
       ============================================================ -->
  <g>
    <!-- Soft halo behind the indicator cluster -->
    <ellipse cx="930" cy="170" rx="120" ry="44" fill="oklch(0.7 0.13 240 / 0.18)" stroke="none"/>

    <!-- Bluetooth glyph (left of battery) -->
    <!-- Classic BT rune: a vertical bar crossed by two diagonals forming bow-tie -->
    <g stroke="oklch(0.7 0.13 240)" stroke-width="2.5">
      <path d="M 858 152 L 882 172 L 870 182 L 870 158 L 882 168 L 858 188" fill="none" stroke-linejoin="round"/>
    </g>
    <!-- BT glyph fill ring -->
    <circle cx="870" cy="170" r="22" stroke="oklch(0.7 0.13 240 / 0.85)" stroke-width="2" fill="oklch(0.7 0.13 240 / 0.12)"/>

    <!-- Battery body — horizontal pill -->
    <rect x="906" y="150" width="100" height="40" rx="6"
          fill="oklch(0.7 0.13 240 / 0.10)" stroke="oklch(0.7 0.13 240)" stroke-width="2.5"/>
    <!-- Battery terminal (positive nub) -->
    <rect x="1006" y="160" width="8" height="20" rx="2"
          fill="oklch(0.7 0.13 240 / 0.85)" stroke="oklch(0.7 0.13 240)"/>
    <!-- Battery fill segments — three bars, full charge read for the 660h headline -->
    <rect x="912" y="156" width="28" height="28" rx="2"
          fill="oklch(0.7 0.13 240 / 0.85)" stroke="none"/>
    <rect x="944" y="156" width="28" height="28" rx="2"
          fill="oklch(0.7 0.13 240 / 0.85)" stroke="none"/>
    <rect x="976" y="156" width="24" height="28" rx="2"
          fill="oklch(0.7 0.13 240 / 0.85)" stroke="none"/>
  </g>

  <!-- Single splash-hue dot accent on the case lower-right —
       same conceptual move as the brass dot on the Sonnet hero
       and the alert-pip on the Prussian Alert hero. Reads as the
       indicator LED on the Q Ultra. -->
  <circle cx="985" cy="615" r="9" fill="oklch(0.7 0.13 240 / 0.95)" stroke="oklch(0.7 0.13 240)"/>
  <circle cx="985" cy="615" r="14" stroke-opacity="0.5" stroke="oklch(0.7 0.13 240)" fill="none"/>
</svg>
