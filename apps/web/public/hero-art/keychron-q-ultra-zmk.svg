<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — Keychron Q Ultra ZMK, 75% top-down silhouette with a wireless / battery indicator in vivid blue at the upper-right</title>

  <!-- Splash: a soft vivid-blue wash framing the case (the article's subject is wireless ZMK + 660h battery) -->
  <ellipse cx="600" cy="395" rx="500" ry="210" fill="oklch(0.7 0.13 240 / 0.16)" stroke="none"/>

  <!-- ============================================================
       75% case outline (Keychron Q3 / Q5 family — Ultra line).
       A 75% is essentially a TKL-without-numpad: function row,
       arrow cluster integrated, navigation column on the right.
       Shape: rectilinear with very lightly chamfered corners,
       reading like a CNC'd aluminum block top-down.
       ============================================================ -->
  <g>
    <!-- Outer case -->
    <path d="
      M 168 220
      L 1018 220
      L 1032 234
      L 1032 566
      L 1018 580
      L 168 580
      L 154 566
      L 154 234
      Z" />
    <!-- Inner bezel -->
    <path d="
      M 184 240
      L 1012 240
      L 1020 248
      L 1020 552
      L 1012 560
      L 184 560
      L 176 552
      L 176 248
      Z" stroke-opacity="0.5"/>
    <!-- Side weight separation lines — hint at the Ultra's CNC profile -->
    <line x1="168" y1="566" x2="1018" y2="566" stroke-opacity="0.4"/>
    <line x1="168" y1="574" x2="1018" y2="574" stroke-opacity="0.3"/>
  </g>

  <!-- ============================================================
       75% layout — six rows, 16 columns at the widest.
       Function row (smaller height) + 5 main rows.
       Row pitch: 42px keys with 4px gutters.
       Origin: x=204, y=258.
       ============================================================ -->

  <!-- Function row (compressed height: 30px) -->
  <g>
    <rect x="204" y="258" width="42" height="30" rx="3"/>
    <rect x="250" y="258" width="42" height="30" rx="3"/>
    <rect x="296" y="258" width="42" height="30" rx="3"/>
    <rect x="342" y="258" width="42" height="30" rx="3"/>
    <rect x="388" y="258" width="42" height="30" rx="3"/>
    <rect x="434" y="258" width="42" height="30" rx="3"/>
    <rect x="480" y="258" width="42" height="30" rx="3"/>
    <rect x="526" y="258" width="42" height="30" rx="3"/>
    <rect x="572" y="258" width="42" height="30" rx="3"/>
    <rect x="618" y="258" width="42" height="30" rx="3"/>
    <rect x="664" y="258" width="42" height="30" rx="3"/>
    <rect x="710" y="258" width="42" height="30" rx="3"/>
    <rect x="756" y="258" width="42" height="30" rx="3"/>
    <rect x="802" y="258" width="42" height="30" rx="3"/>
    <rect x="848" y="258" width="42" height="30" rx="3"/>
    <rect x="894" y="258" width="42" height="30" rx="3"/>
    <rect x="940" y="258" width="42" height="30" rx="3"/>
  </g>

  <!-- Row 1 — number row (15 keys + 2 nav col) -->
  <g>
    <rect x="204" y="298" width="42" height="42" rx="3"/>
    <rect x="250" y="298" width="42" height="42" rx="3"/>
    <rect x="296" y="298" width="42" height="42" rx="3"/>
    <rect x="342" y="298" width="42" height="42" rx="3"/>
    <rect x="388" y="298" width="42" height="42" rx="3"/>
    <rect x="434" y="298" width="42" height="42" rx="3"/>
    <rect x="480" y="298" width="42" height="42" rx="3"/>
    <rect x="526" y="298" width="42" height="42" rx="3"/>
    <rect x="572" y="298" width="42" height="42" rx="3"/>
    <rect x="618" y="298" width="42" height="42" rx="3"/>
    <rect x="664" y="298" width="42" height="42" rx="3"/>
    <rect x="710" y="298" width="42" height="42" rx="3"/>
    <rect x="756" y="298" width="42" height="42" rx="3"/>
    <rect x="802" y="298" width="88" height="42" rx="3"/>
    <rect x="894" y="298" width="42" height="42" rx="3"/>
    <rect x="940" y="298" width="42" height="42" rx="3"/>
  </g>

  <!-- Row 2 — qwerty row (tab + 13 + nav) -->
  <g>
    <rect x="204" y="344" width="64" height="42" rx="3"/>
    <rect x="272" y="344" width="42" height="42" rx="3"/>
    <rect x="318" y="344" width="42" height="42" rx="3"/>
    <rect x="364" y="344" width="42" height="42" rx="3"/>
    <rect x="410" y="344" width="42" height="42" rx="3"/>
