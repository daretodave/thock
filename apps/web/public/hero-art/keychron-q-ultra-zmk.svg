    <rect x="640" y="344" width="42" height="42" rx="3"/>
    <rect x="686" y="344" width="42" height="42" rx="3"/>
    <rect x="732" y="344" width="42" height="42" rx="3"/>
    <rect x="778" y="344" width="42" height="42" rx="3"/>
    <rect x="824" y="344" width="66" height="42" rx="3"/>
    <rect x="894" y="344" width="42" height="42" rx="3"/>
    <rect x="940" y="344" width="42" height="42" rx="3"/>
  </g>

  <!-- Row 3 — caps row (caps + 12 + enter, no nav col on this row) -->
  <g>
    <rect x="204" y="390" width="76" height="42" rx="3"/>
    <rect x="284" y="390" width="42" height="42" rx="3"/>
    <rect x="330" y="390" width="42" height="42" rx="3"/>
    <rect x="376" y="390" width="42" height="42" rx="3"/>
