    <rect x="836" y="390" width="100" height="42" rx="3"/>
    <rect x="940" y="390" width="42" height="42" rx="3"/>
  </g>

  <!-- Row 4 — shift row (shift + 11 + shift + up arrow + nav) -->
  <g>
    <rect x="204" y="436" width="98" height="42" rx="3"/>
    <rect x="306" y="436" width="42" height="42" rx="3"/>
    <rect x="352" y="436" width="42" height="42" rx="3"/>
    <rect x="398" y="436" width="42" height="42" rx="3"/>
