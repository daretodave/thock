<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — GMK CYL King of the Seas, top-down 75% board silhouette with two distinct clusters of coral accent caps (one on the left half, one on the right half) representing the dual Sovereign and Mutation colorways via structural separation rather than literal color, warm-bronze hairlines on top and bottom case edges, tiny coral anchor glyph above the board for the nautical nod</title>

  <!-- Editorial hook: GMK CYL King of the Seas ships TWO colorways
       concurrently (Sovereign deep-ocean blues, Mutation electric pink).
       The bearings hero-art rule mandates a single coral splash, so the
       dual-palette idea is conveyed STRUCTURALLY through two distinct
       coral clusters separated across the board left/right halves. Same
       coral hue throughout. A tiny coral anchor sits above the top case
       edge as the nautical nod to King of the Seas. Warm-bronze hairlines
       hug the top and bottom case edges only. Transparent canvas. -->

  <!-- ============================================================
       BOARD OUTLINE - 75% top-down silhouette
       Case rectangle 1020 x 410, rounded rx 14, with an inset bezel
       hint at 0.35 stroke opacity.
       ============================================================ -->

  <!-- Outer case profile -->
  <rect x="90" y="220" width="1020" height="410" rx="14" ry="14"/>

  <!-- Inset bezel hint -->
  <rect x="106" y="236" width="988" height="378" rx="9" ry="9" stroke-opacity="0.35"/>

  <!-- Warm-bronze hairline on TOP case edge (sparing accent) -->
  <line x1="118" y1="226" x2="1082" y2="226"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

  <!-- Warm-bronze hairline on BOTTOM case edge (sparing accent) -->
  <line x1="118" y1="624" x2="1082" y2="624"
        stroke="oklch(0.80 0.135 75)" stroke-opacity="0.65" stroke-width="1.5"/>

  <!-- ============================================================
       NAUTICAL NOD - tiny coral anchor glyph centered above the
       board, well inside the canvas but above the top case edge.
       Small enough not to dominate. Same coral as the cluster caps.
       ============================================================ -->
  <g transform="translate(600 150)" stroke="oklch(0.66 0.17 30)" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Anchor ring -->
    <circle cx="0" cy="-22" r="7"/>
    <!-- Vertical shank -->
    <line x1="0" y1="-15" x2="0" y2="24"/>
    <!-- Crossbar (stock) -->
    <line x1="-12" y1="-6" x2="12" y2="-6"/>
    <!-- Lower arms (flukes) curving up at the ends -->
    <path d="M -22 14 Q -22 30 0 30 Q 22 30 22 14"/>
    <!-- Fluke tip ticks -->
    <line x1="-22" y1="14" x2="-28" y2="8"/>
    <line x1="22" y1="14" x2="28" y2="8"/>
  </g>

