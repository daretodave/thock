<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="#4A4540" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — keyboard case cross-section with a brass weight plate seated in a routed cavity beneath the PCB</title>

  <!-- ================================================================
       Canvas:  1200 × 750   Stroke: 2px warm charcoal on warm paper
       Background   #F9F4EF  warm paper (light-mode safe)
       Stroke       #4A4540  warm charcoal
       Splash       muted terracotta  #B76849  (oklch 0.60 0.11 42)
       Bronze theme oklch(0.80 0.135 75)  — upper-right ornament dot
       Subject: full keyboard cross-section (keycaps → top case → plate
       → PCB → standoffs → bottom case) with a routed cavity in the
       bottom case holding a dense brass/steel/copper weight plate.
       The plate reads as solid mass — diagonal hatch fill, thicker
       stroke — distinct from the lighter, hollow case shell around it.
       Faint concentric arcs above the plate suggest damped resonance
       radiating up through the case body.
       ================================================================ -->

  <defs>
    <pattern id="massHatch" width="7" height="7" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="7" stroke="#8C4A32" stroke-width="1.5" stroke-opacity="0.42"/>
    </pattern>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="750" fill="#F9F4EF" stroke="none"/>

  <!-- Faint technical-sheet guide lines -->
  <g stroke="#4A4540" stroke-opacity="0.04" stroke-width="1">
    <line x1="0" y1="375" x2="1200" y2="375"/>
    <line x1="600" y1="0" x2="600" y2="750"/>
  </g>

  <!-- Terracotta wash behind the weight cavity zone -->
  <rect x="300" y="520" width="620" height="100" rx="8" fill="#B76849" fill-opacity="0.06" stroke="none"/>

  <!-- ================================================================
       KEYCAP ROW (context, above top case)
       ================================================================ -->
  <g stroke="#4A4540" stroke-opacity="0.55" stroke-width="1.5">
    <rect x="262" y="140" width="38" height="38" rx="5"/>
    <rect x="308" y="140" width="38" height="38" rx="5"/>
    <rect x="354" y="140" width="38" height="38" rx="5"/>
    <rect x="400" y="138" width="38" height="40" rx="5"/>
    <rect x="446" y="140" width="38" height="38" rx="5"/>
    <rect x="492" y="140" width="38" height="38" rx="5"/>
    <rect x="538" y="140" width="38" height="38" rx="5"/>
    <rect x="584" y="138" width="38" height="40" rx="5"/>
    <rect x="630" y="140" width="38" height="38" rx="5"/>
    <rect x="676" y="140" width="38" height="38" rx="5"/>
    <rect x="722" y="140" width="38" height="38" rx="5"/>
    <rect x="768" y="140" width="38" height="38" rx="5"/>
    <rect x="814" y="138" width="38" height="40" rx="5"/>
    <rect x="860" y="140" width="38" height="38" rx="5"/>
    <rect x="906" y="140" width="38" height="38" rx="5"/>
  </g>

  <!-- ================================================================
       TOP CASE shell
       ================================================================ -->
  <path d="
    M 200 178
    L 1000 178
    Q 1012 178 1012 190
    L 1012 294
    Q 1012 306 1000 306
    L 200 306
    Q 188 306 188 294
    L 188 190
    Q 188 178 200 178
    Z"
    stroke="#4A4540" stroke-opacity="0.72"/>

  <!-- Inner bezel of top case -->
  <rect x="214" y="196" width="772" height="96" rx="3" stroke="#4A4540" stroke-opacity="0.28"/>

  <!-- Case side walls (inner faces, run the full height of the assembly) -->
  <line x1="214" y1="196" x2="214" y2="650" stroke-opacity="0.42"/>
  <line x1="986" y1="196" x2="986" y2="650" stroke-opacity="0.42"/>

  <!-- Switch stems descending to the plate -->
  <g stroke="#4A4540" stroke-opacity="0.18" stroke-width="1">
    <line x1="281" y1="178" x2="281" y2="390"/>
    <line x1="327" y1="178" x2="327" y2="390"/>
    <line x1="373" y1="178" x2="373" y2="390"/>
    <line x1="419" y1="178" x2="419" y2="390"/>
    <line x1="465" y1="178" x2="465" y2="390"/>
    <line x1="511" y1="178" x2="511" y2="390"/>
    <line x1="557" y1="178" x2="557" y2="390"/>
    <line x1="603" y1="178" x2="603" y2="390"/>
    <line x1="649" y1="178" x2="649" y2="390"/>
    <line x1="695" y1="178" x2="695" y2="390"/>
    <line x1="741" y1="178" x2="741" y2="390"/>
    <line x1="787" y1="178" x2="787" y2="390"/>
    <line x1="833" y1="178" x2="833" y2="390"/>
    <line x1="879" y1="178" x2="879" y2="390"/>
    <line x1="925" y1="178" x2="925" y2="390"/>
  </g>

  <!-- ================================================================
       PLATE
       ================================================================ -->
  <rect x="234" y="372" width="732" height="52" rx="3" fill="#4A4540" fill-opacity="0.03" stroke="#4A4540" stroke-opacity="0.80" stroke-width="2"/>
  <line x1="248" y1="390" x2="952" y2="390" stroke-opacity="0.15"/>
  <line x1="248" y1="412" x2="952" y2="412" stroke-opacity="0.15"/>
  <g stroke="#4A4540" stroke-opacity="0.32" stroke-width="1.5">
    <rect x="268" y="377" width="26" height="42" rx="2"/>
    <rect x="406" y="377" width="26" height="42" rx="2"/>
    <rect x="544" y="377" width="26" height="42" rx="2"/>
    <rect x="682" y="377" width="26" height="42" rx="2"/>
    <rect x="820" y="377" width="26" height="42" rx="2"/>
    <rect x="910" y="377" width="26" height="42" rx="2"/>
  </g>

  <!-- ================================================================
       PCB
       ================================================================ -->
  <rect x="234" y="470" width="732" height="38" rx="3" stroke="#4A4540" stroke-opacity="0.55"/>
  <line x1="290" y1="485" x2="350" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>
  <line x1="560" y1="485" x2="630" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>
  <line x1="840" y1="485" x2="900" y2="485" stroke-opacity="0.24" stroke-dasharray="5 7"/>
  <g stroke="#4A4540" stroke-opacity="0.30" stroke-width="1">
    <rect x="420" y="479" width="8" height="6" rx="1"/>
    <rect x="590" y="479" width="8" height="6" rx="1"/>
    <rect x="760" y="479" width="8" height="6" rx="1"/>
  </g>

  <!-- Standoffs, PCB down to bottom case -->
  <line x1="300" y1="508" x2="300" y2="540" stroke-opacity="0.40"/>
  <line x1="600" y1="508" x2="600" y2="540" stroke-opacity="0.40"/>
  <line x1="900" y1="508" x2="900" y2="540" stroke-opacity="0.40"/>

  <!-- ================================================================
       RESONANCE — faint concentric arcs rising from the weight plate,
       contained within the case body (conceptual, not measured data)
       ================================================================ -->
  <g stroke="#B76849" stroke-opacity="0.16" stroke-width="1.5" stroke-dasharray="2 7" fill="none">
    <path d="M 470 520 Q 611 470 752 520"/>
    <path d="M 440 528 Q 611 448 782 528"/>
    <path d="M 410 536 Q 611 424 812 536"/>
  </g>

  <!-- ================================================================
       BOTTOM CASE shell — with routed cavity for the weight plate
       ================================================================ -->
  <path d="
    M 188 540
    L 380 540
    L 380 548
    L 840 548
    L 840 540
    L 1012 540
    L 1012 634
    Q 1012 650 996 650
    L 204 650
    Q 188 650 188 634
    Z"
    stroke="#4A4540" stroke-opacity="0.75"/>

  <!-- Cavity side walls (routed pocket, 40px deep) -->
  <line x1="380" y1="548" x2="380" y2="588" stroke-opacity="0.55"/>
  <line x1="840" y1="548" x2="840" y2="588" stroke-opacity="0.55"/>

  <!-- Cavity floor sliver (visible either side of the seated plate) -->
  <line x1="380" y1="588" x2="404" y2="588" stroke-opacity="0.45"/>
  <line x1="818" y1="588" x2="840" y2="588" stroke-opacity="0.45"/>

  <!-- Case floor below the cavity -->
  <line x1="214" y1="634" x2="986" y2="634" stroke-opacity="0.28"/>

  <!-- ================================================================
       WEIGHT PLATE — seated flush in the cavity, dense hatch fill,
       heavier stroke than the surrounding case to read as solid mass
       ================================================================ -->
  <rect x="404" y="550" width="414" height="38" rx="3"
    fill="#B76849" fill-opacity="0.24" stroke="none"/>
  <rect x="404" y="550" width="414" height="38" rx="3"
    fill="url(#massHatch)" stroke="none"/>
  <rect x="404" y="550" width="414" height="38" rx="3"
    fill="none" stroke="#8C4A32" stroke-width="3"/>

  <!-- Top-edge highlight + glow bloom (family convention) -->
  <line x1="404" y1="550" x2="818" y2="550" stroke="#8C4A32" stroke-opacity="0.85" stroke-width="2.5"/>
  <line x1="404" y1="550" x2="818" y2="550" stroke="#B76849" stroke-opacity="0.18" stroke-width="9"/>

  <!-- ================================================================
       CALLOUT — leader to the weight plate
       ================================================================ -->
  <g stroke="#8C4A32" stroke-width="1.5" stroke-opacity="0.88" fill="none">
    <path d="M 1090 460 L 1040 460 L 900 550"/>
    <path d="M 900 550 L 908 538 M 900 550 L 913 546"/>
  </g>
  <circle cx="1090" cy="460" r="3.5" fill="#8C4A32" stroke="none"/>
  <text x="1094" y="446" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="13" fill="#8C4A32" fill-opacity="0.92" letter-spacing="0.04em" text-anchor="start" stroke="none">weight</text>
  <text x="1094" y="462" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="13" fill="#8C4A32" fill-opacity="0.92" letter-spacing="0.04em" text-anchor="start" stroke="none">plate</text>
  <text x="1034" y="529" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="12" fill="#B76849" fill-opacity="0.85" letter-spacing="0.03em" text-anchor="start" stroke="none">brass · steel · copper</text>

  <!-- Left-margin bracket showing the cavity depth -->
  <g stroke="#8C4A32" stroke-width="1.5" stroke-opacity="0.50" fill="none">
    <line x1="148" y1="548" x2="172" y2="548"/>
    <line x1="148" y1="588" x2="172" y2="588"/>
    <line x1="148" y1="548" x2="148" y2="588"/>
    <line x1="148" y1="568" x2="164" y2="568"/>
  </g>
  <text x="134" y="572" font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="11" fill="#8C4A32" fill-opacity="0.75" text-anchor="end" letter-spacing="0.04em" stroke="none">cavity</text>

  <!-- ================================================================
       MARGIN SECTION LABELS (left, faint)
       ================================================================ -->
  <g font-family="'JetBrains Mono','IBM Plex Mono',ui-monospace,monospace" font-size="11" fill="#4A4540" fill-opacity="0.32" text-anchor="end" letter-spacing="0.04em" stroke="none">
    <text x="162" y="252">top</text>
    <text x="162" y="266">case</text>
    <text x="162" y="402">plate</text>
    <text x="162" y="492">PCB</text>
    <text x="162" y="646">btm</text>
    <text x="162" y="660">case</text>
  </g>

  <!-- ================================================================
       ARTICLE TITLE (restrained, matches family footer convention)
       ================================================================ -->
  <text x="600" y="700" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="#4A4540" stroke="none" text-anchor="middle" opacity="0.78">the brass weight mod</text>
  <text x="600" y="726" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="#4A4540" stroke="none" text-anchor="middle" opacity="0.48">added mass · case ring · desk stability</text>

  <!-- Bronze theme dot — upper-right ornamental anchor -->
  <circle cx="1158" cy="42" r="4" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
