<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="#9c9286" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — mixing keycap profiles on a single build, four mismatched cap silhouettes seated on one keyboard case</title>

  <!-- ================================================================
       Canvas: 1200 × 750   Stroke: 2px warm taupe (#9c9286)
       Splash: muted terracotta  #c06b4c  (oklch ≈ 0.62 0.10 40)
       Bronze theme dot: #b88a2e (thock family ornamental anchor,
         approx kh-accent light-mode oklch(0.55 0.13 60))
       Background: transparent / warm-paper safe

       Concept: unlike a sorted height-comparison, this shows profiles
       deliberately MIXED across one case — the row order is NOT
       ascending. Left-to-right: MT3, Cherry, SA, KAT. Terracotta
       calipers/brackets between each adjacent pair call out the height
       delta a builder has to reconcile when mixing on one board.
       ================================================================ -->

  <!-- Terracotta wash behind the row — anchors the mixed cluster -->
  <ellipse cx="600" cy="470" rx="460" ry="150" fill="#c06b4c" fill-opacity="0.09" stroke="none"/>

  <!-- ── KEYBOARD CASE (side-profile, single build) ─────────────────────
       A simple wedge case in side view — low front, higher rear, the
       shape reads instantly as "one keyboard" and grounds the caps as
       sitting on a real build rather than a floating comparison chart. -->
  <g stroke-opacity="0.6">
    <path d="
      M 130 640
      L 1070 640
      L 1070 600
      L 1010 560
      L 190 560
      L 130 600
      Z"/>
    <!-- Plate line -->
    <line x1="190" y1="560" x2="1010" y2="560" stroke-opacity="0.4"/>
    <!-- Front face seam -->
    <line x1="130" y1="600" x2="1070" y2="600" stroke-opacity="0.3"/>
    <!-- Feet -->
    <line x1="230" y1="640" x2="230" y2="654"/>
    <line x1="970" y1="640" x2="970" y2="654"/>
  </g>

  <!-- Switch stem stubs poking through the plate, one per cap position —
       reinforces "these caps are actually mounted on switches" -->
  <g stroke-opacity="0.4">
    <line x1="285" y1="560" x2="285" y2="540"/>
    <line x1="480" y1="560" x2="480" y2="540"/>
    <line x1="670" y1="560" x2="670" y2="540"/>
    <line x1="865" y1="560" x2="865" y2="540"/>
  </g>

  <!-- ── MT3 (position 1, x≈285) ──────────────────────────────────────
       Tall, deep concave dish, angular slab sides. -->
  <g>
    <path d="
      M 225 540
      L 245 425
      L 325 425
      L 345 540
      Z"/>
    <path d="
      M 245 425
      L 258 422
      L 312 422
      L 325 425" stroke="#9c9286"/>
    <path d="
      M 253 427
      Q 285 462 317 427" stroke="#9c9286"/>
    <path d="
      M 259 431
      Q 285 460 311 431" stroke="#c06b4c" stroke-width="2.5"/>
    <line x1="225" y1="540" x2="231" y2="536" stroke-opacity="0.4"/>
    <line x1="345" y1="540" x2="339" y2="536" stroke-opacity="0.4"/>
  </g>

  <!-- ── CHERRY (position 2, x≈480) ───────────────────────────────────
       Shortest, gentle scoop, low dome. -->
  <g>
    <path d="
      M 420 540
      L 434 480
      L 526 480
      L 540 540
      Z"/>
    <path d="
      M 434 480
      Q 452 474 480 474
      Q 508 474 526 480" stroke="#9c9286"/>
    <path d="
      M 447 477
      Q 480 468 513 477" stroke="#c06b4c" stroke-width="2.5"/>
    <line x1="420" y1="540" x2="426" y2="536" stroke-opacity="0.4"/>
    <line x1="540" y1="540" x2="534" y2="536" stroke-opacity="0.4"/>
  </g>

  <!-- ── SA (position 3, x≈670) ───────────────────────────────────────
       Tallest, spherical dome, steep sculpted sides. -->
  <g>
    <path d="
      M 605 540
      L 628 405
      L 712 405
      L 735 540
      Z"/>
    <path d="
      M 628 405
      Q 648 382 670 379
      Q 692 382 712 405" stroke="#9c9286"/>
    <path d="
      M 640 400
      Q 670 390 700 400" stroke="#9c9286" stroke-opacity="0.5"/>
    <path d="
      M 636 393
      Q 670 366 704 393" stroke="#c06b4c" stroke-width="2.5"/>
    <line x1="605" y1="540" x2="612" y2="535" stroke-opacity="0.4"/>
    <line x1="735" y1="540" x2="728" y2="535" stroke-opacity="0.4"/>
  </g>

  <!-- ── KAT (position 4, x≈865) ──────────────────────────────────────
       Cylindrical, uniform low-profile dish — shorter than SA/MT3,
       a touch taller than Cherry, minimal sculpt. -->
  <g>
    <path d="
      M 805 540
      L 818 460
      L 912 460
      L 925 540
      Z"/>
    <path d="
      M 818 460
      Q 840 452 865 452
      Q 890 452 912 460" stroke="#9c9286"/>
    <path d="
      M 831 456
      Q 865 448 899 456" stroke="#c06b4c" stroke-width="2.5"/>
    <line x1="805" y1="540" x2="811" y2="536" stroke-opacity="0.4"/>
    <line x1="925" y1="540" x2="919" y2="536" stroke-opacity="0.4"/>
  </g>

  <!-- ── TERRACOTTA CALIPER BRACKETS — the "mix" callout ────────────────
       Small bracket + dot between each adjacent pair, marking the height
       delta a builder reconciles when mixing profiles on one board. -->
  <g stroke="#c06b4c" stroke-width="1.6" stroke-opacity="0.8">
    <!-- MT3 -> Cherry -->
    <path d="M 375 500 L 390 500 L 390 505 M 390 500 L 405 500"/>
    <circle cx="397" cy="500" r="2.5" fill="#c06b4c" stroke="none"/>
    <!-- Cherry -> SA -->
    <path d="M 570 460 L 585 460 L 585 465 M 585 460 L 600 460"/>
    <circle cx="592" cy="460" r="2.5" fill="#c06b4c" stroke="none"/>
    <!-- SA -> KAT -->
    <path d="M 765 480 L 780 480 L 780 485 M 780 480 L 795 480"/>
    <circle cx="787" cy="480" r="2.5" fill="#c06b4c" stroke="none"/>
  </g>

  <!-- ── LABELS ─────────────────────────────────────────────────────── -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="17" fill="#9c9286" stroke="none" letter-spacing="2.5" text-anchor="middle">
    <text x="285" y="570">MT3</text>
    <text x="480" y="570">CHERRY</text>
    <text x="670" y="570">SA</text>
    <text x="865" y="570">KAT</text>
  </g>

  <!-- Small "mixed build" caption, mono, muted -->
  <g font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="13" fill="#9c9286" fill-opacity="0.55" stroke="none" letter-spacing="0.08em">
    <text x="600" y="700" text-anchor="middle">one board — four profiles</text>
  </g>

  <!-- Focal accent — terracotta cursor at the SA crown, the tallest point
       in the mixed row, where the height mismatch is most visible -->
  <circle cx="670" cy="379" r="6" fill="#c06b4c" fill-opacity="0.9" stroke="#c06b4c"/>
  <circle cx="670" cy="379" r="11" stroke="#c06b4c" stroke-opacity="0.4"/>

  <!-- Brass-bronze theme dot — family ornamental anchor, upper-right margin -->
  <circle cx="1148" cy="120" r="3" fill="#b88a2e" stroke="#b88a2e"/>
</svg>
