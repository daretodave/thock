<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <title>thock hero — PCB-mount stabilizer cross-section: wire, stems, and housings</title>

  <!-- ================================================================
       Canvas:   1200 × 750
       Subject:  PCB-mount stabilizer — symmetric cross-section,
                 side view, two housings bridged by a wire.
       Layout:
         PCB baseline    y = 590
         Housing left    x = 260–360, housing right x = 840–940
         Stem (left)     centered x = 310
         Stem (right)    centered x = 890
         Wire            y = 420, spanning x = 310 → 890
         Keycap row      rests on stems, y = 200 – 280
       Stroke:  warm charcoal  #3A3530  2px
       Splash:  ochre          #C9823A  (muted terracotta-ochre)
       Bronze:  theme accent   #C8974A
       Bg:      warm paper     #FAF6F0  (light-mode safe)
       ================================================================ -->

  <!-- ── BACKGROUND ── -->
  <rect width="1200" height="750" fill="#FAF6F0" stroke="none"/>

  <!-- ── SUBTLE GRID HINT — very faint horizontal rules at PCB / wire levels ── -->
  <g stroke="#3A3530" stroke-opacity="0.04" stroke-width="1">
    <line x1="100" y1="590" x2="1100" y2="590"/>
    <line x1="100" y1="420" x2="1100" y2="420"/>
    <line x1="100" y1="260" x2="1100" y2="260"/>
  </g>

  <!-- ================================================================
       PCB LAYER
       Two PCB mount pads (for the two housing legs) + a thin PCB board
       spanning the full bottom.
       ================================================================ -->

  <!-- PCB board slab -->
  <rect x="160" y="590" width="880" height="28" rx="3"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.45" stroke-width="2"/>
  <!-- PCB inner trace line suggestion -->
  <line x1="164" y1="602" x2="1036" y2="602"
    stroke="#3A3530" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Left PCB mount through-hole (the housing clips into the PCB here) -->
  <g stroke="#3A3530" stroke-opacity="0.55" stroke-width="1.5" fill="none">
    <rect x="295" y="590" width="30" height="14" rx="2"
      fill="#C9823A" fill-opacity="0.14" stroke="#C9823A" stroke-opacity="0.70" stroke-width="1.5"/>
    <line x1="310" y1="590" x2="310" y2="604"/>
  </g>
  <!-- Right PCB mount through-hole -->
  <g stroke="#3A3530" stroke-opacity="0.55" stroke-width="1.5" fill="none">
    <rect x="875" y="590" width="30" height="14" rx="2"
      fill="#C9823A" fill-opacity="0.14" stroke="#C9823A" stroke-opacity="0.70" stroke-width="1.5"/>
    <line x1="890" y1="590" x2="890" y2="604"/>
  </g>

  <!-- ================================================================
       LEFT HOUSING BODY
       PCB-mount stab housing — a tall rectangular shell with:
         - outer wall
         - inner stem channel (the slot the stem slides in)
         - bottom locking tab (PCB clip foot)
         - wire entrance slot on the inner face
       x center = 310, housing body x = 260 – 360, y = 320 – 590
       ================================================================ -->

  <!-- Left housing outer shell -->
  <rect x="258" y="318" width="104" height="272" rx="5"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.68" stroke-width="2"/>

  <!-- Left housing inner stem channel (raised inner well, inner rect) -->
  <rect x="280" y="330" width="60" height="220" rx="3"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- Left housing top cap (the lid that traps the stem) -->
  <rect x="258" y="318" width="104" height="22" rx="5"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.68" stroke-width="2"/>
  <!-- Stem entrance slot in the top cap — the keycap mount hole -->
  <rect x="288" y="318" width="44" height="8" rx="2"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.50" stroke-width="1.5"/>

  <!-- Left housing bottom clip foot (PCB locking tab) -->
  <rect x="276" y="564" width="68" height="26" rx="3"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.55" stroke-width="1.5"/>
  <!-- Clip foot center notch -->
  <line x1="310" y1="564" x2="310" y2="590"
    stroke="#3A3530" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Left housing wire exit slot — inner right face (the wire enters here) -->
  <rect x="358" y="408" width="8" height="24" rx="2"
    fill="#C9823A" fill-opacity="0.25"
    stroke="#C9823A" stroke-opacity="0.80" stroke-width="1.5"/>

  <!-- ================================================================
       RIGHT HOUSING BODY (mirror of left)
       x center = 890, housing body x = 840 – 940, y = 320 – 590
       ================================================================ -->

  <!-- Right housing outer shell -->
  <rect x="838" y="318" width="104" height="272" rx="5"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.68" stroke-width="2"/>

  <!-- Right housing inner stem channel -->
  <rect x="860" y="330" width="60" height="220" rx="3"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.30" stroke-width="1.5"/>

  <!-- Right housing top cap -->
  <rect x="838" y="318" width="104" height="22" rx="5"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.68" stroke-width="2"/>
  <!-- Stem entrance slot in the right top cap -->
  <rect x="868" y="318" width="44" height="8" rx="2"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.50" stroke-width="1.5"/>

  <!-- Right housing bottom clip foot -->
  <rect x="856" y="564" width="68" height="26" rx="3"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.55" stroke-width="1.5"/>
  <line x1="890" y1="564" x2="890" y2="590"
    stroke="#3A3530" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Right housing wire exit slot — inner left face -->
  <rect x="834" y="408" width="8" height="24" rx="2"
    fill="#C9823A" fill-opacity="0.25"
    stroke="#C9823A" stroke-opacity="0.80" stroke-width="1.5"/>

  <!-- ================================================================
       STABILIZER STEMS (the inserts that slide inside the housings)
       Left stem: x=288–332, rides from y=340 at rest to y=550 depressed
       Stem body visible, with the wire-hook arm extending outward.
       Render at mid-stroke position for visual interest.
       ================================================================ -->

  <!-- Left stem body (inside housing channel) -->
  <rect x="284" y="350" width="52" height="180" rx="3"
    fill="#C9823A" fill-opacity="0.11"
    stroke="#C9823A" stroke-opacity="0.78" stroke-width="2"/>

  <!-- Left stem cross-bar (the horizontal that the wire hooks onto) -->
  <rect x="262" y="412" width="30" height="16" rx="3"
    fill="#C9823A" fill-opacity="0.22"
    stroke="#C9823A" stroke-opacity="0.90" stroke-width="2"/>

  <!-- Left stem top (the post that connects to keycap mount) -->
  <rect x="295" y="330" width="30" height="26" rx="2"
    fill="#FAF6F0"
    stroke="#3A3530" stroke-opacity="0.52" stroke-width="1.5"/>

  <!-- Right stem body -->
  <rect x="864" y="350" width="52" height="180" rx="3"
    fill="#C9823A" fill-opacity="0.11"
    stroke="#C9823A" stroke-opacity="0.78" stroke-width="2"/>

  <!-- Right stem cross-bar (wire hooks here) -->
  <rect x="908" y="412" width="30" height="16" rx="3"
    fill="#C9823A" fill-opacity="0.22"
    stroke="#C9823A" stroke-opacity="0.90" stroke-width="2"/>

  <!-- Right stem top post -->
  <rect x="875" y="330" width="30" height="26" rx="2"
    fill="#FAF6F0"
    stroke="#3A3530" stroke-opacity="0.52" stroke-width="1.5"/>

  <!-- ================================================================
       STABILIZER WIRE — THE FOCAL ELEMENT
       The wire is the key mechanism: it forces both stems to travel in
       unison. Rendered as:
         - A straight horizontal shaft (ochre, thick) from x=262 to x=938
         - Wire hooks at each end (downward bends into the stem cross-bars)
         - A subtle low-opacity wash under the full wire span
       Wire y-center = 420 (center of the stem cross-bars)
       ================================================================ -->

  <!-- Ochre atmospheric wash behind the wire span -->
  <rect x="260" y="405" width="680" height="30" rx="4"
    fill="#C9823A" fill-opacity="0.06" stroke="none"/>

  <!-- Wire left hook — descends from the main shaft into the stem cross-bar -->
  <!-- Vertical drop on the left: x=278, from y=420 down to y=428, then curves right -->
  <path d="M 278 408 L 278 420 Q 278 432 290 432 L 292 432"
    stroke="#C9823A" stroke-opacity="0.92" stroke-width="3" fill="none"/>

  <!-- Main wire shaft -->
  <line x1="278" y1="420" x2="922" y2="420"
    stroke="#C9823A" stroke-opacity="0.90" stroke-width="3"/>

  <!-- Wire right hook — mirror of left -->
  <path d="M 922 408 L 922 420 Q 922 432 910 432 L 908 432"
    stroke="#C9823A" stroke-opacity="0.92" stroke-width="3" fill="none"/>

  <!-- Wire end termination dots (the bent wire tips, slightly enlarged) -->
  <circle cx="278" cy="420" r="4.5"
    fill="#C9823A" fill-opacity="0.88" stroke="none"/>
  <circle cx="922" cy="420" r="4.5"
    fill="#C9823A" fill-opacity="0.88" stroke="none"/>

  <!-- Wire center marker — a small vertical tick indicating the center-span -->
  <line x1="600" y1="413" x2="600" y2="427"
    stroke="#C9823A" stroke-opacity="0.40" stroke-width="1.5"/>

  <!-- ================================================================
       KEYCAP SILHOUETTE (the key that rides on top of the two stems)
       Represents a long modifier key (like Shift or Backspace) spanning
       the full stabilizer spread.
       Keycap top face: y = 210 – 260, x = 196 – 1004
       Keycap profile: OEM-style — angled back face, curved top.
       ================================================================ -->

  <!-- Keycap wash (warm paper fill, no stark white) -->
  <rect x="198" y="212" width="804" height="100" rx="8"
    fill="#FAF6F0" stroke="none"/>

  <!-- Keycap top surface (front face, the typing surface) -->
  <rect x="198" y="212" width="804" height="80" rx="8"
    fill="#FAF6F0"
    stroke="#3A3530" stroke-opacity="0.60" stroke-width="2"/>

  <!-- Keycap legend area suggestion (very faint inner chamfer) -->
  <rect x="212" y="224" width="776" height="56" rx="5"
    fill="none"
    stroke="#3A3530" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Keycap side walls (the vertical depth, angled slightly for OEM profile feel) -->
  <!-- Left wall -->
  <path d="M 198 288 L 218 312 L 218 320 L 198 312 Z"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.50" stroke-width="2"/>
  <!-- Right wall (mirror) -->
  <path d="M 1002 288 L 982 312 L 982 320 L 1002 312 Z"
    fill="#FAF6F0" stroke="#3A3530" stroke-opacity="0.50" stroke-width="2"/>
  <!-- Bottom face (underside of keycap, hidden) -->
  <line x1="218" y1="320" x2="982" y2="320"
    stroke="#3A3530" stroke-opacity="0.42" stroke-width="2"/>

  <!-- Keycap inner mount posts (where stems connect) — left and right -->
  <!-- Left mount sleeve -->
  <rect x="295" y="312" width="30" height="18" rx="2"
    fill="#FAF6F0"
    stroke="#3A3530" stroke-opacity="0.48" stroke-width="1.5"/>
  <!-- Right mount sleeve -->
  <rect x="875" y="312" width="30" height="18" rx="2"
    fill="#FAF6F0"
    stroke="#3A3530" stroke-opacity="0.48" stroke-width="1.5"/>

  <!-- ================================================================
       MOTION ARROWS — suggesting the key's travel path
       Small vertical arrows to left and right of the keycap, pointing
       downward. Ochre. Communicates "the key travels, and the wire
       forces both ends to move together."
       ================================================================ -->
  <g stroke="#C9823A" stroke-opacity="0.55" stroke-width="1.8" fill="none">
    <!-- Left travel arrow -->
    <line x1="172" y1="230" x2="172" y2="290"/>
    <path d="M 164 280 L 172 292 L 180 280"/>
    <!-- Right travel arrow (mirror) -->
    <line x1="1028" y1="230" x2="1028" y2="290"/>
    <path d="M 1020 280 L 1028 292 L 1036 280"/>
  </g>

  <!-- ================================================================
       TENSION ANNOTATION — subtle arc over the wire midpoint
       A gentle dotted arc above the wire suggesting tension / tension curve.
       ================================================================ -->
  <path d="M 400 420 Q 600 370 800 420"
    stroke="#C9823A" stroke-opacity="0.22" stroke-width="1.5"
    stroke-dasharray="5 7" fill="none"/>

  <!-- ================================================================
       GROUND PLANE SUGGESTION (PCB traces below the PCB slab)
       Three short trace-style lines suggesting the board is live.
       ================================================================ -->
  <g stroke="#3A3530" stroke-opacity="0.10" stroke-width="1">
    <line x1="240" y1="626" x2="340" y2="626"/>
    <line x1="860" y1="626" x2="960" y2="626"/>
    <line x1="580" y1="626" x2="620" y2="626"/>
  </g>

  <!-- ================================================================
       BRONZE FAMILY THEME DOT — upper right margin, ornamental anchor.
       Per family spec: small oklch(0.80 0.135 75) = #C8974A circle.
       ================================================================ -->
  <circle cx="1122" cy="80" r="8"
    fill="#C8974A" stroke="none"/>
  <!-- Outer ring glow -->
  <circle cx="1122" cy="80" r="14"
    fill="none" stroke="#C8974A" stroke-opacity="0.22" stroke-width="1.5"/>

  <!-- ================================================================
       LEVEL INDICATOR LINES (margin structure, very faint)
       Three horizontal hairlines at left margin marking:
         keycap top, wire level, PCB level
       ================================================================ -->
  <g stroke="#3A3530" stroke-opacity="0.12" stroke-width="1">
    <!-- Keycap top level -->
    <line x1="104" y1="212" x2="130" y2="212"/>
    <line x1="104" y1="212" x2="104" y2="590"/>
    <!-- Wire level -->
    <line x1="104" y1="420" x2="130" y2="420"/>
    <!-- PCB level -->
    <line x1="104" y1="590" x2="130" y2="590"/>
    <!-- Tick at housing top -->
    <line x1="104" y1="318" x2="118" y2="318"/>
  </g>

  <!-- ================================================================
       OCHRE WASH — atmospheric halo behind each housing, unifying
       the composition and establishing the splash color anchor.
       ================================================================ -->
  <ellipse cx="310" cy="450" rx="95" ry="130"
    fill="#C9823A" fill-opacity="0.05" stroke="none"/>
  <ellipse cx="890" cy="450" rx="95" ry="130"
    fill="#C9823A" fill-opacity="0.05" stroke="none"/>

</svg>
