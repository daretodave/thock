<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Cross-section of ABS plastic showing bromine flame-retardant compounds oxidizing to yellow under UV and oxygen, then being chemically reduced back toward colorless under peroxide and UV during retrobrighting</title>

  <text x="600" y="70" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">the same molecule, run in two directions</text>

  <!-- LEFT: forward yellowing over decades -->
  <text x="290" y="120" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">decades of UV + O2</text>

  <rect x="120" y="150" width="340" height="180" rx="10" stroke-opacity="0.85"/>
  <text x="290" y="145" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">off-white ABS, cross-section</text>

  <!-- bromine dots, sparse, colorless -->
  <g fill="oklch(0.78 0.005 90)" fill-opacity="0.4" stroke="none">
    <circle cx="160" cy="190" r="5"/>
    <circle cx="220" cy="230" r="5"/>
    <circle cx="280" cy="200" r="5"/>
    <circle cx="340" cy="260" r="5"/>
    <circle cx="400" cy="220" r="5"/>
    <circle cx="180" cy="290" r="5"/>
    <circle cx="380" cy="290" r="5"/>
  </g>
  <text x="290" y="345" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">Br compounds, unoxidized — molded-in flame retardant</text>

  <!-- arrow down/right into the yellowed panel -->
  <path d="M 470 240 L 560 240" stroke-opacity="0.7"/>
  <path d="M 545 228 L 560 240 L 545 252" stroke-opacity="0.7"/>

  <!-- MIDDLE: yellowed state -->
  <rect x="580" y="150" width="340" height="180" rx="10" fill="oklch(0.68 0.165 28 / 0.14)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.9"/>
  <text x="750" y="145" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">yellowed / amber</text>

  <g fill="oklch(0.68 0.165 28)" fill-opacity="0.75" stroke="none">
    <circle cx="620" cy="190" r="6"/>
    <circle cx="680" cy="230" r="6"/>
    <circle cx="740" cy="200" r="6"/>
    <circle cx="800" cy="260" r="6"/>
    <circle cx="860" cy="220" r="6"/>
    <circle cx="640" cy="290" r="6"/>
    <circle cx="840" cy="290" r="6"/>
  </g>
  <text x="750" y="345" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">oxidized Br byproducts — carry the amber tint</text>

  <!-- reverse arrow, bottom, back toward left, labeled peroxide + UV -->
  <path d="M 860 390 C 700 440, 400 440, 260 390" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-dasharray="6 6"/>
  <path d="M 275 400 L 260 390 L 278 380" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85"/>

  <text x="560" y="470" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">H2O2 + UV — reduces oxidized Br back toward colorless</text>
  <text x="560" y="495" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">chemical reversal, not a surface coating</text>

  <text x="600" y="535" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">the color layer is a reaction throughout the plastic, not a film on top of it</text>

  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
