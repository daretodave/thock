<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Bar chart comparing three GMK CYL tracker scores from the same week: OG Extensions interest check at 55, Masterpiece R2 group buy at 46, Pandemonium group buy at 33</title>

  <!-- Title -->
  <text x="600" y="48" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Same tracker week — an IC ahead of two live group buys</text>

  <!-- Baseline -->
  <line x1="120" y1="350" x2="1080" y2="350" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.4" stroke-width="1.5"/>

  <!-- Bar 1: OG Extensions IC — score 55, terracotta, focal -->
  <!-- height = 55/60*250 = 229.2, top y = 350-229.2 = 120.8 -->
  <rect x="150" y="120.8" width="220" height="229.2" rx="4" fill="#B5603F" fill-opacity="0.22" stroke="#B5603F" stroke-width="2"/>
  <text x="260" y="105" font-family="JetBrains Mono, monospace" font-size="26" fill="#B5603F" stroke="none" text-anchor="middle" font-weight="600">55</text>
  <text x="260" y="372" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="#B5603F" stroke="none" text-anchor="middle" opacity="0.95">GMK CYL OG Extensions</text>
  <text x="260" y="391" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">interest check — no GB yet</text>

  <!-- Bar 2: Masterpiece R2 — score 46, neutral -->
  <!-- height = 46/60*250 = 191.7, top y = 158.3 -->
  <rect x="530" y="158.3" width="220" height="191.7" rx="4" fill="oklch(0.78 0.005 90)" fill-opacity="0.08" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="640" y="143" font-family="JetBrains Mono, monospace" font-size="26" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">46</text>
  <text x="640" y="372" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Masterpiece R2</text>
  <text x="640" y="391" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">GB closing that week</text>

  <!-- Bar 3: Pandemonium — score 33, neutral -->
  <!-- height = 33/60*250 = 137.5, top y = 212.5 -->
  <rect x="910" y="212.5" width="220" height="137.5" rx="4" fill="oklch(0.78 0.005 90)" fill-opacity="0.08" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.5" stroke-width="1.5"/>
  <text x="1020" y="197" font-family="JetBrains Mono, monospace" font-size="26" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">33</text>
  <text x="1020" y="372" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Pandemonium</text>
  <text x="1020" y="391" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">GB mid-window</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="36" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
