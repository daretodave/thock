<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Four-stage process strip: interest check posted and climbing, group buy window opens July 15 2026, group buy window closes August 12 2026, and an unconfirmed production stage marked as dependent on MOQ</title>

  <!-- Title -->
  <text x="600" y="46" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">From interest check to a possible group buy</text>

  <!-- Connecting arrows (drawn first, under boxes) -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.35" stroke-width="2">
    <line x1="316" y1="220" x2="374" y2="220"/>
    <line x1="606" y1="220" x2="664" y2="220"/>
    <line x1="896" y1="220" x2="954" y2="220"/>
  </g>
  <g fill="oklch(0.78 0.005 90)" fill-opacity="0.5" stroke="none">
    <path d="M 374 220 L 362 213 L 362 227 Z"/>
    <path d="M 664 220 L 652 213 L 652 227 Z"/>
    <path d="M 954 220 L 942 213 L 942 227 Z"/>
  </g>

  <!-- Box 1: Interest check — terracotta, current stage -->
  <rect x="40" y="150" width="276" height="140" rx="6" fill="#B5603F" fill-opacity="0.18" stroke="#B5603F" stroke-width="2"/>
  <text x="178" y="205" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="#B5603F" stroke="none" text-anchor="middle">Interest check</text>
  <text x="178" y="228" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#B5603F" stroke="none" text-anchor="middle" opacity="0.8">posted on Geekhack,</text>
  <text x="178" y="246" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="#B5603F" stroke="none" text-anchor="middle" opacity="0.8">tracker score climbing</text>
  <text x="178" y="270" font-family="Newsreader, serif" font-size="11" font-style="italic" fill="#B5603F" stroke="none" text-anchor="middle" opacity="0.65">where OG Extensions sits</text>

  <!-- Box 2: GB opens -->
  <rect x="330" y="150" width="276" height="140" rx="6" fill="oklch(0.78 0.005 90)" fill-opacity="0.05" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.4" stroke-dasharray="6 5"/>
  <text x="468" y="205" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">GB window opens</text>
  <text x="468" y="230" font-family="JetBrains Mono, monospace" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">July 15, 2026</text>
  <text x="468" y="258" font-family="Newsreader, serif" font-size="11" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">announced, not yet open</text>

  <!-- Box 3: GB closes -->
  <rect x="620" y="150" width="276" height="140" rx="6" fill="oklch(0.78 0.005 90)" fill-opacity="0.05" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.4" stroke-dasharray="6 5"/>
  <text x="758" y="205" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">GB window closes</text>
  <text x="758" y="230" font-family="JetBrains Mono, monospace" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">Aug 12, 2026</text>
  <text x="758" y="258" font-family="Newsreader, serif" font-size="11" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">four-week window</text>

  <!-- Box 4: Production — hedged/unconfirmed -->
  <rect x="910" y="150" width="250" height="140" rx="6" fill="oklch(0.78 0.005 90)" fill-opacity="0.04" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.28" stroke-dasharray="3 5"/>
  <text x="1035" y="205" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">Production</text>
  <text x="1035" y="228" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">if MOQ clears —</text>
  <text x="1035" y="244" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">unconfirmed</text>

  <!-- Caption -->
  <text x="600" y="345" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">two of four stages are dates on a calendar; the other two are not guaranteed</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="36" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
