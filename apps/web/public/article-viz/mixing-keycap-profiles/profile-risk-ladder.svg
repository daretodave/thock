<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Vertical ladder ranking four profile-mixing combinations from low to high risk, each rung with a one-line reason</title>

  <!-- Vertical spine -->
  <line x1="140" y1="90" x2="140" y2="560" stroke-opacity="0.35"/>

  <!-- Risk axis labels -->
  <text x="140" y="65" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">LOW RISK</text>
  <text x="140" y="595" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.8">HIGH RISK</text>
  <path d="M 140 75 L 140 585" stroke-opacity="0"/>

  <!-- Rung 1: lowest risk -->
  <g>
    <circle cx="140" cy="115" r="8" fill="oklch(0.68 0.165 28)" stroke="none"/>
    <line x1="140" y1="115" x2="220" y2="115" stroke-opacity="0.4"/>
    <rect x="230" y="88" width="820" height="60" rx="8" stroke="oklch(0.68 0.165 28)" stroke-width="2" stroke-opacity="0.85"/>
    <text x="255" y="112" font-family="Newsreader, serif" font-size="16" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none">Domikey WOB base + KAT Drifter accent</text>
    <text x="255" y="134" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">uniform profile, matched PBT — no row sculpt to break</text>
  </g>

  <!-- Rung 2 -->
  <g>
    <circle cx="140" cy="222" r="8" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.85"/>
    <line x1="140" y1="222" x2="220" y2="222" stroke-opacity="0.4"/>
    <rect x="230" y="195" width="820" height="60" rx="8" stroke="oklch(0.68 0.165 28)" stroke-width="2" stroke-opacity="0.7"/>
    <text x="255" y="219" font-family="Newsreader, serif" font-size="16" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none">MT3 Dasher base + MT3 /dev/tty spacebar</text>
    <text x="255" y="241" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">same profile and material — colorway swap only</text>
  </g>

  <!-- Rung 3 -->
  <g>
    <circle cx="140" cy="329" r="8" fill="oklch(0.72 0.09 50)" stroke="none" opacity="0.85"/>
    <line x1="140" y1="329" x2="220" y2="329" stroke-opacity="0.4"/>
    <rect x="230" y="302" width="820" height="60" rx="8" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-opacity="0.55"/>
    <text x="255" y="326" font-family="Newsreader, serif" font-size="16" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none">Domikey WOB base + SA Godspeed modifier row</text>
    <text x="255" y="348" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">height gap is smallest here, but ABS-on-PBT finish drifts over time</text>
  </g>

  <!-- Rung 4: highest risk -->
  <g>
    <circle cx="140" cy="436" r="8" fill="oklch(0.62 0.13 25)" stroke="none"/>
    <line x1="140" y1="436" x2="220" y2="436" stroke-opacity="0.4"/>
    <rect x="230" y="409" width="820" height="60" rx="8" stroke="oklch(0.62 0.13 25)" stroke-width="2.5" stroke-dasharray="6 6"/>
    <text x="255" y="433" font-family="Newsreader, serif" font-size="16" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none">Domikey WOB base + SA Godspeed single top-row key</text>
    <text x="255" y="455" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.85">largest height gap on the board — easiest one to get wrong</text>
  </g>

  <!-- Diagonal risk indicator connecting the rungs -->
  <path d="M 140 115 L 140 222 L 140 329 L 140 436" stroke-opacity="0" />

  <!-- Caption -->
  <text x="600" y="530" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">risk climbs with height difference and row specificity, not with boldness</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
