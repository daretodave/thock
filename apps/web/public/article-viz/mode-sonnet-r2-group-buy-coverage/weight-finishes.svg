<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Mode Sonnet R2 brass weight finishes — polished, black PVD, and the new bronze PVD added for R2</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">the chassis is the same — the accent weight is the headline change</text>

  <!-- Three weight options -->
  <g>
    <rect x="120" y="170" width="300" height="180" rx="10" stroke-opacity="0.6"/>
    <text x="270" y="200" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">returning from R1</text>
    <text x="270" y="235" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">polished</text>
    <!-- Mini weight rectangle -->
    <rect x="200" y="260" width="140" height="60" rx="4" fill="oklch(0.78 0.10 80 / 0.30)" stroke-opacity="0.7"/>
    <text x="270" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">brass · classic finish</text>
  </g>

  <g>
    <rect x="450" y="170" width="300" height="180" rx="10" stroke-opacity="0.6"/>
    <text x="600" y="200" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">returning from R1</text>
    <text x="600" y="235" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">black PVD</text>
    <rect x="530" y="260" width="140" height="60" rx="4" fill="oklch(0.20 0.02 80 / 0.50)" stroke-opacity="0.7"/>
    <text x="600" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">deepest contrast pick</text>
  </g>

  <g>
    <rect x="780" y="170" width="300" height="180" rx="10" fill="oklch(0.80 0.135 75 / 0.12)" stroke="oklch(0.80 0.135 75)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="930" y="200" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.80 0.135 75)" stroke="none" text-anchor="middle" opacity="0.95">new in R2</text>
    <text x="930" y="235" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">bronze PVD</text>
    <rect x="860" y="260" width="140" height="60" rx="4" fill="oklch(0.60 0.135 75 / 0.55)" stroke="oklch(0.80 0.135 75)" stroke-opacity="0.85" stroke-width="2"/>
    <text x="930" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.80 0.135 75)" stroke="none" text-anchor="middle" opacity="0.95">paired with silver + graphite cases</text>
  </g>

  <!-- Caption -->
  <text x="600" y="410" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">R1 buyers can pick up the new weight as a standalone accessory</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
