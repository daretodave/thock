<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Where lube goes and where it doesn't — switch cross-section annotated with the canonical do-lube and never-lube surfaces</title>

  <!-- Faint baseline + family rhythm -->
  <line x1="90" y1="670" x2="1110" y2="670" stroke-opacity="0.45"/>
  <g stroke-opacity="0.3">
    <line x1="90"   y1="670" x2="90"   y2="678"/>
    <line x1="345"  y1="670" x2="345"  y2="678"/>
    <line x1="600"  y1="670" x2="600"  y2="678"/>
    <line x1="855"  y1="670" x2="855"  y2="678"/>
    <line x1="1110" y1="670" x2="1110" y2="678"/>
  </g>

  <!-- Soft amber wash behind the switch interior — visual anchor -->
  <ellipse cx="600" cy="410" rx="220" ry="180" fill="oklch(0.78 0.10 80 / 0.10)" stroke="none"/>

  <!-- ── KEYCAP MOUNT POST (top) ──────────────────────────────────────── -->
  <g>
    <path d="M 580 175 L 620 175 L 620 205 L 580 205 Z" stroke-opacity="0.85"/>
    <line x1="600" y1="175" x2="600" y2="195" stroke-opacity="0.4"/>
  </g>

  <!-- ── TOP HOUSING ──────────────────────────────────────────────────── -->
  <g>
    <path d="M 470 205 L 730 205 L 730 230 L 760 320 L 440 320 L 470 230 Z"/>
    <path d="M 565 205 L 635 205 L 635 225 L 565 225 Z" stroke-opacity="0.55"/>
    <path d="M 480 240 L 480 312 M 720 240 L 720 312" stroke-dasharray="3 5" stroke-opacity="0.4"/>
  </g>

  <!-- ── STEM ─────────────────────────────────────────────────────────── -->
  <g>
    <path d="M 565 225 L 635 225 L 635 450 L 565 450 Z"/>
    <line x1="600" y1="245" x2="600" y2="435" stroke-opacity="0.4"/>
    <!-- Tactile-bump shape on left flank of stem (for the 'don't lube the bump' annotation) -->
    <path d="M 565 320 C 555 325 555 345 565 350" stroke-opacity="0.8"/>
    <!-- Stem skirt at bottom -->
    <path d="M 565 430 L 545 458 L 545 490 L 655 490 L 655 458 L 635 430" stroke-opacity="0.85"/>
  </g>

  <!-- ══ DO-LUBE SURFACE 1: STEM RAILS (amber dotted) ══════════════════ -->
  <g stroke="oklch(0.78 0.10 80)" stroke-width="2.5" stroke-dasharray="1 4" stroke-opacity="0.95">
    <line x1="565" y1="240" x2="565" y2="425"/>
    <line x1="635" y1="240" x2="635" y2="425"/>
  </g>

  <!-- ── SPRING ───────────────────────────────────────────────────────── -->
  <g stroke-opacity="0.7">
    <ellipse cx="600" cy="505" rx="32" ry="6"/>
    <ellipse cx="600" cy="518" rx="32" ry="6"/>
    <ellipse cx="600" cy="531" rx="32" ry="6"/>
    <ellipse cx="600" cy="544" rx="32" ry="6"/>
    <ellipse cx="600" cy="557" rx="32" ry="6"/>
    <ellipse cx="600" cy="570" rx="32" ry="6"/>
  </g>

  <!-- ══ DO-LUBE SURFACE 2: SPRING (amber tint on coil hashes) ═════════ -->
  <g stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55" stroke-width="2">
    <line x1="572" y1="498" x2="628" y2="498"/>
    <line x1="572" y1="578" x2="628" y2="578"/>
  </g>

  <!-- ── LOWER HOUSING ────────────────────────────────────────────────── -->
  <g>
    <path d="M 440 490 L 760 490 L 745 625 L 455 625 Z"/>
    <path d="M 545 490 L 655 490 L 650 585 L 550 585 Z" stroke-opacity="0.55"/>
    <!-- Contact leaves — two small inset L-shapes inside the lower housing (the 'never lube' surface) -->
    <g stroke-opacity="0.9" stroke-width="2.5">
      <path d="M 480 525 L 495 525 L 495 575"/>
      <path d="M 720 525 L 705 525 L 705 575"/>
    </g>
    <!-- PCB pins -->
    <line x1="490" y1="625" x2="490" y2="650" stroke-opacity="0.6"/>
    <line x1="710" y1="625" x2="710" y2="650" stroke-opacity="0.6"/>
    <line x1="600" y1="625" x2="600" y2="655" stroke-opacity="0.6"/>
  </g>

  <!-- ══ DO-LUBE SURFACE 3: LOWER HOUSING RIM ═════════════════════════ -->
  <g stroke="oklch(0.78 0.10 80)" stroke-width="2.5" stroke-dasharray="1 4" stroke-opacity="0.95">
    <line x1="545" y1="490" x2="655" y2="490"/>
    <line x1="545" y1="490" x2="550" y2="520"/>
    <line x1="655" y1="490" x2="650" y2="520"/>
  </g>

  <!-- ══ NEVER-LUBE MARKERS ════════════════════════════════════════════
       Two red-cross / X markers indicating leaves + tactile bump.
       The "down" token (oklch(0.62 0.13 25)) gives a warm red that
       reads as caution without being neon. -->

  <!-- X over the bump face (left flank of stem) -->
  <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.9" stroke-width="2.5" stroke-linecap="round">
    <line x1="552" y1="328" x2="568" y2="344"/>
    <line x1="568" y1="328" x2="552" y2="344"/>
  </g>

  <!-- Xs over the two contact leaves -->
  <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.9" stroke-width="2.5" stroke-linecap="round">
    <line x1="479" y1="544" x2="495" y2="560"/>
    <line x1="495" y1="544" x2="479" y2="560"/>
    <line x1="705" y1="544" x2="721" y2="560"/>
    <line x1="721" y1="544" x2="705" y2="560"/>
  </g>

  <!-- ── LABELS ───────────────────────────────────────────────────────── -->
  <!-- Left margin: DO LUBE column -->
  <text x="120" y="100" font-family="IBM Plex Sans, sans-serif" font-size="18" fill="oklch(0.78 0.10 80)" stroke="none" font-weight="600" letter-spacing="0.05em">DO LUBE</text>
  <line x1="120" y1="110" x2="220" y2="110" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.7" stroke-width="2"/>

  <text x="120" y="345" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none">stem rails</text>
  <g stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55">
    <line x1="220" y1="340" x2="555" y2="340"/>
    <path d="M 548 334 L 555 340 L 548 346"/>
  </g>

  <text x="120" y="538" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none">spring (bag-shake)</text>
  <g stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55">
    <line x1="280" y1="533" x2="555" y2="533"/>
    <path d="M 548 527 L 555 533 L 548 539"/>
  </g>

  <text x="120" y="490" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none">housing rails</text>
  <g stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55">
    <line x1="265" y1="485" x2="535" y2="485"/>
    <path d="M 528 479 L 535 485 L 528 491"/>
  </g>

  <!-- Right margin: NEVER LUBE column -->
  <text x="980" y="100" font-family="IBM Plex Sans, sans-serif" font-size="18" fill="oklch(0.62 0.13 25)" stroke="none" font-weight="600" letter-spacing="0.05em">NEVER LUBE</text>
  <line x1="980" y1="110" x2="1115" y2="110" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.7" stroke-width="2"/>

  <text x="980" y="336" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none">tactile bump face</text>
  <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.55">
    <line x1="975" y1="331" x2="620" y2="331"/>
    <path d="M 627 325 L 620 331 L 627 337"/>
  </g>

  <text x="980" y="552" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none">contact leaves</text>
  <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.55">
    <line x1="975" y1="547" x2="725" y2="547"/>
    <path d="M 732 541 L 725 547 L 732 553"/>
  </g>

  <!-- Brass-bronze theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
