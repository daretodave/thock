<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The minimum lube protocol — open the switch, brush stem rails, lay film on lower housing rails, bag-shake the spring</title>

  <!-- Faint baseline + tick rhythm running across all four panels -->
  <line x1="80" y1="380" x2="1120" y2="380" stroke-opacity="0.4"/>
  <g stroke-opacity="0.3">
    <line x1="80"   y1="380" x2="80"   y2="388"/>
    <line x1="340"  y1="380" x2="340"  y2="388"/>
    <line x1="600"  y1="380" x2="600"  y2="388"/>
    <line x1="860"  y1="380" x2="860"  y2="388"/>
    <line x1="1120" y1="380" x2="1120" y2="388"/>
  </g>

  <!-- ══════ STEP 1: OPEN THE SWITCH ════════════════════════════════════ -->
  <g>
    <!-- Top housing being lifted off — a small trapezoid hovering above the lower body -->
    <path d="M 130 130 L 240 130 L 250 165 L 120 165 Z" stroke-opacity="0.75"/>
    <!-- Two small arrows pointing up from the lower body to the lifted top -->
    <g stroke-opacity="0.55">
      <line x1="155" y1="195" x2="155" y2="175"/>
      <path d="M 150 180 L 155 175 L 160 180"/>
      <line x1="215" y1="195" x2="215" y2="175"/>
      <path d="M 210 180 L 215 175 L 220 180"/>
    </g>
    <!-- Lower housing body (stays put) -->
    <path d="M 130 215 L 240 215 L 230 285 L 140 285 Z"/>
    <!-- Stem visible inside, top exposed -->
    <path d="M 165 215 L 205 215 L 205 270 L 165 270 Z" stroke-opacity="0.65"/>
  </g>
  <!-- Numbered chip for step 1 -->
  <circle cx="185" cy="80" r="22" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="185" y="89" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle">1</text>
  <text x="185" y="330" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">open · pull stem</text>

  <!-- Connector arrow → step 2 -->
  <g stroke-opacity="0.4">
    <line x1="265" y1="230" x2="305" y2="230"/>
    <path d="M 297 224 L 305 230 L 297 236"/>
  </g>

  <!-- ══════ STEP 2: BRUSH STEM RAILS ═══════════════════════════════════ -->
  <g>
    <!-- Isolated stem (cross-section), enlarged so the rails read -->
    <path d="M 410 165 L 470 165 L 470 285 L 410 285 Z" stroke-opacity="0.85"/>
    <!-- Centerline -->
    <line x1="440" y1="175" x2="440" y2="275" stroke-opacity="0.4"/>
    <!-- Amber dotted rail highlight on both flanks -->
    <g stroke="oklch(0.78 0.10 80)" stroke-dasharray="1 4" stroke-opacity="0.95" stroke-width="2.5">
      <line x1="410" y1="180" x2="410" y2="270"/>
      <line x1="470" y1="180" x2="470" y2="270"/>
    </g>
    <!-- Brush coming from upper left, suggested by a tapered shape -->
    <g stroke-opacity="0.7">
      <path d="M 355 130 L 390 165 L 405 185 L 390 200 L 370 175 Z"/>
      <line x1="355" y1="130" x2="345" y2="115"/>
    </g>
  </g>
  <circle cx="440" cy="80" r="22" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="440" y="89" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle">2</text>
  <text x="440" y="330" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">stem rails — 205g0</text>

  <!-- Connector arrow → step 3 -->
  <g stroke-opacity="0.4">
    <line x1="520" y1="230" x2="560" y2="230"/>
    <path d="M 552 224 L 560 230 L 552 236"/>
  </g>

  <!-- ══════ STEP 3: BRUSH LOWER-HOUSING RIM ════════════════════════════ -->
  <g>
    <!-- Lower housing cross-section -->
    <path d="M 640 165 L 770 165 L 760 285 L 650 285 Z" stroke-opacity="0.85"/>
    <!-- Central well opening -->
    <path d="M 678 165 L 732 165 L 728 245 L 682 245 Z" stroke-opacity="0.55"/>
    <!-- Amber dotted rim highlight on the well-opening edges -->
    <g stroke="oklch(0.78 0.10 80)" stroke-dasharray="1 4" stroke-opacity="0.95" stroke-width="2.5">
      <line x1="678" y1="165" x2="732" y2="165"/>
      <line x1="678" y1="170" x2="682" y2="200"/>
      <line x1="732" y1="170" x2="728" y2="200"/>
    </g>
    <!-- Brush -->
    <g stroke-opacity="0.7">
      <path d="M 590 120 L 625 155 L 640 175 L 625 190 L 605 165 Z"/>
      <line x1="590" y1="120" x2="580" y2="105"/>
    </g>
  </g>
  <circle cx="705" cy="80" r="22" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="705" y="89" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle">3</text>
  <text x="705" y="330" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">housing rails — film</text>

  <!-- Connector arrow → step 4 -->
  <g stroke-opacity="0.4">
    <line x1="790" y1="230" x2="830" y2="230"/>
    <path d="M 822 224 L 830 230 L 822 236"/>
  </g>

  <!-- ══════ STEP 4: BAG-SHAKE THE SPRING ═══════════════════════════════ -->
  <g>
    <!-- Baggie outline (zipper top + body) -->
    <path d="M 905 140 L 1035 140 L 1045 290 L 895 290 Z" stroke-opacity="0.85"/>
    <line x1="905" y1="155" x2="1035" y2="155" stroke-opacity="0.55"/>
    <!-- Two springs (coil cross-sections) inside the baggie, tumbling -->
    <g stroke-opacity="0.7">
      <ellipse cx="945" cy="200" rx="18" ry="4"/>
      <ellipse cx="945" cy="210" rx="18" ry="4"/>
      <ellipse cx="945" cy="220" rx="18" ry="4"/>
      <ellipse cx="945" cy="230" rx="18" ry="4"/>
      <ellipse cx="945" cy="240" rx="18" ry="4"/>
    </g>
    <g stroke-opacity="0.55">
      <ellipse cx="1000" cy="225" rx="14" ry="3.5" transform="rotate(28 1000 225)"/>
      <ellipse cx="1000" cy="234" rx="14" ry="3.5" transform="rotate(28 1000 234)"/>
      <ellipse cx="1000" cy="243" rx="14" ry="3.5" transform="rotate(28 1000 243)"/>
      <ellipse cx="1000" cy="252" rx="14" ry="3.5" transform="rotate(28 1000 252)"/>
    </g>
    <!-- A few amber droplets in the baggie air — GPL 105 -->
    <g fill="oklch(0.78 0.10 80 / 0.85)" stroke="oklch(0.78 0.10 80)">
      <circle cx="925" cy="175" r="2.5"/>
      <circle cx="985" cy="180" r="2.5"/>
      <circle cx="1015" cy="195" r="2.5"/>
      <circle cx="960" cy="270" r="2.5"/>
    </g>
  </g>
  <circle cx="970" cy="80" r="22" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="970" y="89" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle">4</text>
  <text x="970" y="330" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">spring — bag &amp; shake</text>

  <!-- Brass-bronze theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
