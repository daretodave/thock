<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>How the demand floor built — DIY-wireless products on ZMK from 2021 through 2025 — before vendors crossed the line at CES 2026</title>

  <!-- Year axis -->
  <line x1="100" y1="440" x2="1100" y2="440" stroke-opacity="0.5"/>
  <g stroke-opacity="0.25">
    <line x1="180" y1="436" x2="180" y2="444"/>
    <line x1="380" y1="436" x2="380" y2="444"/>
    <line x1="580" y1="436" x2="580" y2="444"/>
    <line x1="780" y1="436" x2="780" y2="444"/>
    <line x1="980" y1="436" x2="980" y2="444"/>
  </g>
  <text x="180" y="465" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2021</text>
  <text x="380" y="465" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2022</text>
  <text x="580" y="465" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2024</text>
  <text x="780" y="465" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2025</text>
  <text x="980" y="465" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">CES 2026</text>

  <!-- DIY products stacked over time -->
  <g>
    <!-- Voyager 2022 -->
    <rect x="320" y="380" width="120" height="36" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
    <text x="380" y="403" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">ZSA Voyager</text>

    <!-- Glove80 ~2023 -->
    <rect x="450" y="335" width="120" height="36" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
    <text x="510" y="358" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Glove80</text>

    <!-- Corne wireless ~2023 -->
    <rect x="520" y="290" width="160" height="36" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
    <text x="600" y="313" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Corne wireless</text>

    <!-- Sweep family -->
    <rect x="610" y="245" width="160" height="36" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
    <text x="690" y="268" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Sweep family</text>

    <!-- Demand floor band -->
    <rect x="320" y="200" width="540" height="220" stroke-opacity="0.35" stroke-dasharray="4 6" fill="oklch(0.68 0.165 28 / 0.04)"/>
    <text x="590" y="195" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">a demand floor — installed base, docs, working hardware</text>
  </g>

  <!-- Vendor crossing the line at CES 2026 -->
  <g>
    <line x1="980" y1="150" x2="980" y2="430" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2.5"/>
    <rect x="900" y="115" width="180" height="60" rx="8" fill="oklch(0.68 0.165 28 / 0.18)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="990" y="138" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">Keychron Q Ultra</text>
    <text x="990" y="158" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">five-board flagship</text>
  </g>

  <!-- Section header -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">the vendor side moves last — the cohort moved first</text>

  <!-- Caption -->
  <text x="600" y="525" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">five years of DIY-wireless adoption made the Q Ultra decision financeable</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
