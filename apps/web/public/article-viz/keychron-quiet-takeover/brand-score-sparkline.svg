<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Coral line chart showing Keychron brand tracker scores rising from 30 in W19 to 55 in W25 2026, with a dashed threshold line at score 50 marking the point where the brand appears in more than half of weekly tracker roundups</title>

  <!-- Chart area -->
  <!-- Y axis -->
  <line x1="140" y1="60" x2="140" y2="330" stroke-opacity="0.30"/>
  <!-- X axis -->
  <line x1="140" y1="330" x2="1100" y2="330" stroke-opacity="0.30"/>

  <!-- Y axis ticks and labels -->
  <!-- Score 60 -->
  <line x1="136" y1="105" x2="1100" y2="105" stroke-opacity="0.10" stroke-width="1"/>
  <text x="118" y="109" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.45">60</text>
  <!-- Score 50 threshold -->
  <line x1="136" y1="168" x2="1100" y2="168" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="8 5"/>
  <text x="118" y="172" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.60">50</text>
  <text x="1110" y="165" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="start" opacity="0.50">cited in &gt;50% of roundups</text>
  <!-- Score 40 -->
  <line x1="136" y1="231" x2="1100" y2="231" stroke-opacity="0.10" stroke-width="1"/>
  <text x="118" y="235" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.45">40</text>
  <!-- Score 30 -->
  <text x="118" y="331" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.45">30</text>

  <!--
    Data points mapping:
    W19 = 30, W20 = 35, W21 = 40, W22 = 44, W23 = 48, W24 = 52, W25 = 55

    Y range: 30 at y=330, 60 at y=105 → 225px for 30 score units → 7.5px per score unit
    X range: 7 weeks across 960px → 160px per week

    x positions: W19=160, W20=320, W21=480, W22=640, W23=800, W24=960, W25=1080 (adjusted to 1085)
    y = 330 - (score - 30) * 7.5
    W19 score=30 → y=330
    W20 score=35 → y=292.5
    W21 score=40 → y=255
    W22 score=44 → y=225
    W23 score=48 → y=195
    W24 score=52 → y=165
    W25 score=55 → y=142.5
  -->

  <!-- X axis week labels -->
  <text x="160" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W19</text>
  <text x="320" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W20</text>
  <text x="480" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W21</text>
  <text x="640" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W22</text>
  <text x="800" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W23</text>
  <text x="960" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">W24</text>
  <text x="1085" y="355" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">W25</text>
  <text x="620" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">2026</text>

  <!-- Coral sparkline -->
  <polyline
    points="160,330 320,292.5 480,255 640,225 800,195 960,165 1085,142.5"
    stroke="oklch(0.68 0.165 28)"
    stroke-width="2.5"
    stroke-opacity="0.95"
    fill="none"
  />

  <!-- Start point: open circle W19 score=30 -->
  <circle cx="160" cy="330" r="5" stroke="oklch(0.68 0.165 28)" stroke-width="2" fill="oklch(0.14 0.01 90)" opacity="0.90"/>
  <text x="160" y="318" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">30</text>

  <!-- Intermediate dots, smaller -->
  <circle cx="320" cy="292.5" r="3" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.65"/>
  <circle cx="480" cy="255" r="3" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.65"/>
  <circle cx="640" cy="225" r="3" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.65"/>
  <circle cx="800" cy="195" r="3" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.65"/>

  <!-- W24 threshold-crossing dot -->
  <circle cx="960" cy="165" r="4.5" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.90"/>
  <text x="978" y="155" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="start" opacity="0.75">threshold crossed</text>

  <!-- Terminal point: filled coral circle W25 score=55 -->
  <circle cx="1085" cy="142.5" r="7" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.95"/>
  <text x="1085" y="127" font-family="JetBrains Mono, monospace" font-size="16" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" font-weight="600">55</text>

  <!-- Chart title -->
  <text x="600" y="42" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">Keychron brand tracker — W19 through W25 2026</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="30" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
