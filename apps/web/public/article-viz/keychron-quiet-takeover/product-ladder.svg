<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Keychron three-tier product ladder: K Series at entry, V Series at mid, Q Series at premium — connected by a buyer-progression arrow</title>

  <!-- Vertical spine connecting tiers -->
  <line x1="600" y1="100" x2="600" y2="430" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="4 6"/>

  <!-- Q Series — top tier -->
  <rect x="300" y="85" width="600" height="110" rx="10" fill="oklch(0.68 0.165 28 / 0.13)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="420" y="118" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">Q Series</text>
  <text x="420" y="142" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">$100–$180 · aluminum gasket-mount · QMK/VIA</text>
  <text x="420" y="162" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">premium switches · hotswap · south-facing LEDs</text>
  <!-- Price label right -->
  <text x="840" y="130" font-family="JetBrains Mono, monospace" font-size="20" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">$100–$180</text>
  <text x="840" y="155" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">enthusiast-prebuilt tier</text>

  <!-- V Series — mid tier -->
  <rect x="300" y="225" width="600" height="110" rx="10" fill="oklch(0.68 0.165 28 / 0.07)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.70" stroke-width="2.5"/>
  <text x="420" y="258" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">V Series</text>
  <text x="420" y="282" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">$80–$100 · QMK/VIA · PBT keycaps · gasket entry</text>
  <text x="420" y="302" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">value-spec · polycarbonate option · hotswap</text>
  <text x="840" y="270" font-family="JetBrains Mono, monospace" font-size="20" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">$80–$100</text>
  <text x="840" y="295" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">value mid-range tier</text>

  <!-- K Series — entry tier -->
  <rect x="300" y="365" width="600" height="110" rx="10" fill="oklch(0.68 0.165 28 / 0.03)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.45" stroke-width="2"/>
  <text x="420" y="398" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">K Series</text>
  <text x="420" y="422" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">$35–$80 · Bluetooth · ABS keycaps · hotswap</text>
  <text x="420" y="442" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">first-keyboard tier · wireless as default</text>
  <text x="840" y="410" font-family="JetBrains Mono, monospace" font-size="20" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">$35–$80</text>
  <text x="840" y="435" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">entry · beginner tier</text>

  <!-- Buyer progression arrow on left -->
  <line x1="240" y1="440" x2="240" y2="130" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.75" stroke-width="2"/>
  <polygon points="240,105 232,128 248,128" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.75"/>
  <text x="195" y="290" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85" transform="rotate(-90 195 290)">buyer progression</text>

  <!-- Section label -->
  <text x="600" y="55" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">three rungs, one brand — a buyer can ascend without switching allegiances</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
