<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Dolch colorway palette — WS1 dark grey alphas, WS2 medium grey mods, WS3 light grey accent legends, shown as labeled swatches</title>

  <!-- Title -->
  <text x="600" y="52" font-family="Newsreader, 'Iowan Old Style', Georgia, serif" font-size="19" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.90">the Dolch colorway — three-tone palette</text>

  <!-- ── Swatch layout: three swatches centered, equal width, generous gap.
       Total width: 3 × 240 + 2 × 40 = 800px. Offset x = (1200-800)/2 = 200.
       Each swatch: x positions 200, 480, 760. Width 240, height 180. ── -->

  <!-- ── WS1 — dark grey alphas ─────────────────────────────────────────── -->
  <g>
    <!-- Swatch block -->
    <rect x="200" y="90" width="240" height="180" rx="4" fill="#3d3d3d" stroke="#c87941" stroke-width="1.5"/>
    <!-- Inner tonal ring — subtle -->
    <rect x="212" y="102" width="216" height="156" rx="2" fill="none" stroke="#7a7065" stroke-width="0.75" stroke-opacity="0.35"/>

    <!-- Designation label inside swatch -->
    <text x="320" y="166" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500" fill="#7a7065" stroke="none" text-anchor="middle" opacity="0.55">WS1</text>
    <!-- Hex below designation -->
    <text x="320" y="192" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#7a7065" stroke="none" text-anchor="middle" opacity="0.40">#3d3d3d</text>

    <!-- Label below swatch -->
    <text x="320" y="295" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="14" font-weight="500" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">alphas</text>
    <text x="320" y="315" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">dark grey</text>
    <text x="320" y="333" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="11" fill="#c87941" stroke="none" text-anchor="middle" opacity="0.70">letter keys · main cluster</text>
  </g>

  <!-- ── WS2 — medium grey mods ──────────────────────────────────────────── -->
  <g>
    <!-- Swatch block -->
    <rect x="480" y="90" width="240" height="180" rx="4" fill="#7a7065" stroke="#c87941" stroke-width="1.5"/>
    <rect x="492" y="102" width="216" height="156" rx="2" fill="none" stroke="#3d3d3d" stroke-width="0.75" stroke-opacity="0.30"/>

    <text x="600" y="166" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500" fill="#b5b0ac" stroke="none" text-anchor="middle" opacity="0.55">WS2</text>
    <text x="600" y="192" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#b5b0ac" stroke="none" text-anchor="middle" opacity="0.40">#7a7065</text>

    <text x="600" y="295" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="14" font-weight="500" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">mods</text>
    <text x="600" y="315" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">medium grey</text>
    <text x="600" y="333" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="11" fill="#c87941" stroke="none" text-anchor="middle" opacity="0.70">Shift, Ctrl, Alt, Enter…</text>
  </g>

  <!-- ── WS3 — light grey accent legends ────────────────────────────────── -->
  <g>
    <!-- Swatch block -->
    <rect x="760" y="90" width="240" height="180" rx="4" fill="#b5b0ac" stroke="#c87941" stroke-width="1.5"/>
    <rect x="772" y="102" width="216" height="156" rx="2" fill="none" stroke="#7a7065" stroke-width="0.75" stroke-opacity="0.35"/>

    <text x="880" y="166" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="22" font-weight="500" fill="#3d3d3d" stroke="none" text-anchor="middle" opacity="0.55">WS3</text>
    <text x="880" y="192" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="13" fill="#3d3d3d" stroke="none" text-anchor="middle" opacity="0.40">#b5b0ac</text>

    <text x="880" y="295" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="14" font-weight="500" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">accent legends</text>
    <text x="880" y="315" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">light grey</text>
    <text x="880" y="333" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="11" fill="#c87941" stroke="none" text-anchor="middle" opacity="0.70">legends on mods · spacebar</text>
  </g>

  <!-- ── Baseline caption ─────────────────────────────────────────────────── -->
  <text x="600" y="366" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.48">Signature Plastics WS-series colorway — standardized since the 1980s · no dye-sublimation bleed between tones</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="38" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
