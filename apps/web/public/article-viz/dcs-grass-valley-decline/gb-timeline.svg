<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <!-- Timeline axis rule -->
  <line x1="80" y1="140" x2="720" y2="140" stroke="#d4cfc8" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- GROUP BUY BARS (y=120, height=40, so y2=160)                -->
  <!-- ============================================================ -->

  <!-- 1. DCS Olivetti: x=143 to x=232 -->
  <rect x="143" y="120" width="89" height="40"
    fill="rgba(156,146,134,0.25)" stroke="#9c9286" stroke-width="1.5" rx="2"/>
  <!-- Label above -->
  <text x="187" y="114" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#6b6560">DCS Olivetti</text>
  <!-- Label below -->
  <text x="187" y="174" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#6b6560">Mar 27&#x2013;Apr 13</text>

  <!-- 2. DCS Grass Valley: x=327 to x=490 -->
  <rect x="327" y="120" width="163" height="40"
    fill="rgba(176,122,58,0.25)" stroke="#B07A3A" stroke-width="2" rx="2"/>
  <!-- Label above -->
  <text x="408" y="114" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#B07A3A">DCS Grass Valley</text>
  <!-- Label below -->
  <text x="408" y="174" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#6b6560">May 1&#x2013;Jun 1</text>

  <!-- 3. DCS Dolch: x=490 to x=647 -->
  <rect x="490" y="120" width="157" height="40"
    fill="rgba(60,55,50,0.2)" stroke="#5c5652" stroke-width="1.5" rx="2"/>
  <!-- Label above -->
  <text x="568" y="114" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="11" fill="#6b6560">DCS Dolch</text>
  <!-- Label below -->
  <text x="568" y="174" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#6b6560">Jun 1&#x2013;Jul 1</text>

  <!-- ============================================================ -->
  <!-- HANDOFF ACCENT LINE at x=490                                 -->
  <!-- ============================================================ -->
  <line x1="490" y1="100" x2="490" y2="170"
    stroke="#B07A3A" stroke-width="1.5"/>
  <text x="490" y="183" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#B07A3A">Jun 1 handoff</text>

  <!-- ============================================================ -->
  <!-- MONTH TICK MARKS                                             -->
  <!-- Apr 1: x=169, May 1: x=327, Jun 1: x=490, Jul 1: x=647     -->
  <!-- ============================================================ -->
  <!-- Apr 1 -->
  <line x1="169" y1="155" x2="169" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="169" y="176" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">Apr</text>

  <!-- May 1 -->
  <line x1="327" y1="155" x2="327" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="327" y="200" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">May</text>

  <!-- Jun 1 (tick only — label is the handoff label above) -->
  <line x1="490" y1="155" x2="490" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="490" y="200" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">Jun</text>

  <!-- Jul 1 -->
  <line x1="647" y1="155" x2="647" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="647" y="176" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">Jul</text>

  <!-- Mar 15 start cap tick -->
  <line x1="80" y1="155" x2="80" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="80" y="176" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">Mar 15</text>

  <!-- Jul 15 end cap tick -->
  <line x1="720" y1="155" x2="720" y2="165" stroke="#9c9286" stroke-width="1"/>
  <text x="720" y="176" text-anchor="middle"
    font-family="'Courier New', Courier, monospace"
    font-size="10" fill="#a09a94">Jul 15</text>
</svg>
