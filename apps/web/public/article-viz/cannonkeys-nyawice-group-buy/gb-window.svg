    <line x1="960" y1="200" x2="960" y2="280" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
    <circle cx="960" cy="240" r="10" fill="oklch(0.68 0.165 28 / 0.25)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="960" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">closes</text>
    <text x="960" y="310" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">2026-05-17</text>
  </g>

  <!-- Three feature chips below -->
  <g>
    <rect x="180" y="360" width="240" height="50" rx="6" stroke-opacity="0.6"/>
    <text x="300" y="380" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">mount</text>
    <text x="300" y="398" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">leaf-spring F1</text>
    <rect x="480" y="360" width="240" height="50" rx="6" stroke-opacity="0.6"/>
    <text x="600" y="380" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">angle</text>
    <text x="600" y="398" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">9° typing angle</text>
    <rect x="780" y="360" width="240" height="50" rx="6" stroke-opacity="0.6"/>
    <text x="900" y="380" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">decoration</text>
    <text x="900" y="398" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">cat ears · 4 colorways</text>
  </g>

