<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Nyawice group buy window — open at CannonKeys from 2026-04-17 through 2026-05-17, global through one checkout</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">4-week buy · global · one checkout</text>

  <!-- Timeline axis -->
  <line x1="100" y1="240" x2="1100" y2="240" stroke-opacity="0.55"/>

  <!-- Open marker -->
  <g>
    <line x1="240" y1="200" x2="240" y2="280" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
    <circle cx="240" cy="240" r="10" fill="oklch(0.68 0.165 28 / 0.25)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="240" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">opens</text>
    <text x="240" y="310" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">2026-04-17</text>
  </g>

  <!-- Open window bar -->
  <rect x="240" y="232" width="720" height="16" fill="oklch(0.68 0.165 28 / 0.20)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="600" y="220" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">window open · CannonKeys configurator</text>

  <!-- Close marker -->
