<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Where the four sound-dampening layers sit inside a keyboard case — from plate to bottom shell</title>

  <!-- Outer case shell -->
  <path d="M 200 130 L 1000 130 L 1000 510 L 200 510 Z" stroke-opacity="0.85"/>
  <!-- internal cavity outline -->
  <path d="M 240 170 L 960 170 L 960 470 L 240 470 Z" stroke-opacity="0.45" stroke-dasharray="6 6"/>

  <!-- 1. Plate -->
  <rect x="260" y="195" width="680" height="14" stroke-opacity="0.85"/>
  <text x="600" y="207" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">plate</text>

  <!-- 2. Plate foam (terracotta) — between plate and PCB -->
  <rect x="260" y="215" width="680" height="14" fill="oklch(0.62 0.13 25 / 0.30)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2"/>
  <!-- switch cutouts indicated as small gaps -->
  <g fill="oklch(0.10 0 0)" stroke="none">
    <rect x="305" y="217" width="10" height="10"/>
    <rect x="385" y="217" width="10" height="10"/>
    <rect x="465" y="217" width="10" height="10"/>
    <rect x="545" y="217" width="10" height="10"/>
    <rect x="625" y="217" width="10" height="10"/>
    <rect x="705" y="217" width="10" height="10"/>
    <rect x="785" y="217" width="10" height="10"/>
    <rect x="865" y="217" width="10" height="10"/>
  </g>

  <!-- 3. PCB -->
  <rect x="260" y="235" width="680" height="14" stroke-opacity="0.85"/>
  <text x="600" y="247" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">PCB</text>

  <!-- 4. PE foam (terracotta) — under PCB -->
  <rect x="260" y="255" width="680" height="10" fill="oklch(0.62 0.13 25 / 0.30)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2"/>

  <!-- 5. Tape mod (back of PCB) — drawn as strips on the bottom face of the PCB -->
  <rect x="260" y="270" width="680" height="6" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.75" stroke-width="1.5" stroke-dasharray="20 4"/>

  <!-- 6. Case foam (terracotta) — at bottom of case interior -->
  <rect x="260" y="395" width="680" height="60" fill="oklch(0.62 0.13 25 / 0.20)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2"/>

  <!-- Air cavity between PCB-stack and case foam -->
  <text x="600" y="335" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">empty interior volume</text>

  <!-- Right-side callouts pointing to each layer -->
  <g stroke-opacity="0.55">
    <!-- plate foam -->
    <line x1="970" y1="222" x2="1070" y2="222"/>
    <!-- PE foam -->
    <line x1="970" y1="260" x2="1070" y2="260"/>
    <!-- tape mod -->
    <line x1="970" y1="273" x2="1070" y2="290"/>
    <!-- case foam -->
    <line x1="970" y1="425" x2="1070" y2="425"/>
  </g>
  <text x="1080" y="226" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">plate foam</text>
  <text x="1080" y="264" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">PE foam</text>
  <text x="1080" y="294" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">tape mod</text>
  <text x="1080" y="429" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">case foam</text>

  <!-- Left-side band descriptors -->
  <text x="190" y="226" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">cuts high ring</text>
  <text x="190" y="264" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">adds "poppy"</text>
  <text x="190" y="294" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">warms low-mid</text>
  <text x="190" y="429" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">absorbs reverb</text>

  <!-- Caption -->
  <text x="600" y="555" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">four layers, four different jobs — each at a different position in the stack</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
