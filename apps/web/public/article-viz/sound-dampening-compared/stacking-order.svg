<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The order most builders converge on — case foam, then tape, then PE, with plate foam optional</title>

  <!-- Timeline / progression axis -->
  <line x1="100" y1="280" x2="1100" y2="280" stroke-opacity="0.5"/>
  <!-- arrow head -->
  <path d="M 1092 272 L 1100 280 L 1092 288" stroke-opacity="0.5"/>
  <text x="1110" y="285" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55">test &amp; iterate</text>

  <!-- Step 1: case foam (filled, most builders) -->
  <g>
    <rect x="130" y="180" width="180" height="120" rx="8" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="220" y="160" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">step 1</text>
    <text x="220" y="220" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">case foam</text>
    <text x="220" y="248" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">baseline · already in</text>
    <text x="220" y="266" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">most prebuilts</text>
    <circle cx="220" cy="320" r="6" fill="oklch(0.62 0.13 25)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95"/>
  </g>

  <!-- Step 2: tape mod -->
  <g>
    <rect x="350" y="180" width="180" height="120" rx="8" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="440" y="160" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">step 2</text>
    <text x="440" y="220" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">tape mod</text>
    <text x="440" y="248" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">cheapest test ·</text>
    <text x="440" y="266" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">2 strips usually</text>
    <circle cx="440" cy="320" r="6" fill="oklch(0.62 0.13 25)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95"/>
  </g>

  <!-- Step 3: PE foam -->
  <g>
    <rect x="570" y="180" width="180" height="120" rx="8" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="660" y="160" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">step 3</text>
    <text x="660" y="220" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">PE foam</text>
    <text x="660" y="248" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">highest ROI ·</text>
    <text x="660" y="266" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">poppy character</text>
    <circle cx="660" cy="320" r="6" fill="oklch(0.62 0.13 25)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95"/>
  </g>

  <!-- Step 4: plate foam — drawn dashed because divisive/optional -->
  <g>
    <rect x="790" y="180" width="180" height="120" rx="8" fill="none" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.7" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="880" y="160" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.7">step 4 · optional</text>
    <text x="880" y="220" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">plate foam</text>
    <text x="880" y="248" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">if more dampening</text>
    <text x="880" y="266" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">is still wanted</text>
    <circle cx="880" cy="320" r="6" fill="none" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.7" stroke-width="2"/>
  </g>

  <!-- Caption -->
  <text x="600" y="400" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">most builds end at two — "case foam + PE foam" is the modal modern stack</text>
  <text x="600" y="425" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.85">the mod that fails the test is the one to skip</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
