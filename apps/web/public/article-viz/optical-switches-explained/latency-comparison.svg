<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" preserveAspectRatio="xMidYMid meet" fill="none" stroke="#3a3530" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <title>Latency comparison — contact switch vs optical switch</title>

  <!-- Warm-paper background -->
  <rect width="900" height="300" fill="#faf8f5" stroke="none"/>

  <!--
    Horizontal bar chart comparing total keypress latency.
    Chart area: x 170–870, y 60–260.
    Row 1 (contact switch): bar top y 90, bar height 56.
    Row 2 (optical switch): bar top y 190, bar height 56.
    Bar scale: 1px = 1ms, origin at x=170.
    Segments for contact switch (total ~11ms at worst):
      bounce 1–5ms → draw at 5ms wide = 5px per ms → 25px for 5ms
      debounce window 5ms → 25px
      polling 1ms → 5px
    Scale: to keep bars readable within 700px, use 1px = ~1.5ms → scale factor ~46px/ms is too wide.
    Let's use visual proportions instead, with labeled totals.
    Proportional: contact bar at 640px wide total (representing ~11ms), optical at ~60px wide (representing ~1ms).
    Segment widths (proportional to ms, scaled to 640px / 11ms = ~58px/ms):
      bounce: 5ms * 58 = 290px (terracotta fill)
      debounce: 5ms * 58 = 290px (warm grey fill)
      polling: 1ms * 58 = 60px (dark fill)
      Total = 640px
    Optical: polling only 1ms * 58 = 58px → round to 60px (dark fill)
    Bars start at x=170.
  -->

  <!-- ── ROW LABELS ──────────────────────────────────────────────────────── -->
  <text x="160" y="118"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="11" fill="#3a3530" text-anchor="end" dominant-baseline="middle"
        letter-spacing="0.02em">contact</text>
  <text x="160" y="218"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="11" fill="#3a3530" text-anchor="end" dominant-baseline="middle"
        letter-spacing="0.02em">optical</text>

  <!-- ── TOP BAR: contact switch ─────────────────────────────────────────── -->
  <!-- Segment A: bounce (1–5ms) — terracotta fill -->
  <rect x="170" y="90" width="290" height="56" rx="3"
        fill="#c2694b" fill-opacity="0.82" stroke="none"/>
  <!-- Segment B: debounce window (5ms) — warm grey fill -->
  <rect x="460" y="90" width="290" height="56" rx="3"
        fill="#8a7e74" fill-opacity="0.45" stroke="none"/>
  <!-- Segment C: polling (1ms) — dark fill -->
  <rect x="750" y="90" width="60" height="56" rx="3"
        fill="#3a3530" fill-opacity="0.72" stroke="none"/>
  <!-- Bar outline -->
  <rect x="170" y="90" width="640" height="56" rx="3" stroke="#3a3530" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Segment labels inside the bars -->
  <text x="315" y="120"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="10" fill="#faf8f5" text-anchor="middle" dominant-baseline="middle"
        fill-opacity="0.92" letter-spacing="0.02em">bounce (1–5ms)</text>
  <text x="605" y="120"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="10" fill="#3a3530" text-anchor="middle" dominant-baseline="middle"
        fill-opacity="0.82" letter-spacing="0.02em">debounce (5ms)</text>
  <text x="780" y="120"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#faf8f5" text-anchor="middle" dominant-baseline="middle"
        fill-opacity="0.88" letter-spacing="0.01em">poll</text>

  <!-- Total label to the right of the bar -->
  <text x="820" y="118"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="11" fill="#3a3530" text-anchor="start" dominant-baseline="middle"
        letter-spacing="0.02em">~6–11ms</text>

  <!-- ── BOTTOM BAR: optical switch ─────────────────────────────────────── -->
  <!-- Segment: polling only (1ms) — dark fill -->
  <rect x="170" y="190" width="60" height="56" rx="3"
        fill="#3a3530" fill-opacity="0.72" stroke="none"/>
  <!-- Bar outline (full bar same width as polling segment) -->
  <rect x="170" y="190" width="60" height="56" rx="3" stroke="#3a3530" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Ghost of the contact bar extent — faint outline so the eye can compare -->
  <rect x="170" y="190" width="640" height="56" rx="3"
        stroke="#3a3530" stroke-opacity="0.1" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- Polling label -->
  <text x="200" y="220"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#faf8f5" text-anchor="middle" dominant-baseline="middle"
        fill-opacity="0.88" letter-spacing="0.01em">poll</text>

  <!-- Total label to the right -->
  <text x="240" y="218"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="11" fill="#3a3530" text-anchor="start" dominant-baseline="middle"
        letter-spacing="0.02em">~1ms</text>

  <!-- ── AXIS LINE ──────────────────────────────────────────────────────── -->
  <line x1="170" y1="260" x2="810" y2="260" stroke-opacity="0.22" stroke-width="1"/>
  <!-- Tick at origin -->
  <line x1="170" y1="256" x2="170" y2="264" stroke-opacity="0.3" stroke-width="1"/>
  <!-- Tick at end of optical bar -->
  <line x1="230" y1="256" x2="230" y2="264" stroke-opacity="0.22" stroke-width="1"/>
  <!-- Axis micro-label -->
  <text x="170" y="275"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#3a3530" text-anchor="middle"
        fill-opacity="0.4" letter-spacing="0.02em">0ms</text>

  <!-- Legend strip below the chart -->
  <!-- Bounce swatch -->
  <rect x="170" y="282" width="10" height="10" rx="1" fill="#c2694b" fill-opacity="0.82" stroke="none"/>
  <text x="186" y="289"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#3a3530" fill-opacity="0.6" dominant-baseline="middle"
        letter-spacing="0.02em">bounce</text>
  <!-- Debounce swatch -->
  <rect x="265" y="282" width="10" height="10" rx="1" fill="#8a7e74" fill-opacity="0.45" stroke="none"/>
  <text x="281" y="289"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#3a3530" fill-opacity="0.6" dominant-baseline="middle"
        letter-spacing="0.02em">debounce window</text>
  <!-- Polling swatch -->
  <rect x="420" y="282" width="10" height="10" rx="1" fill="#3a3530" fill-opacity="0.72" stroke="none"/>
  <text x="436" y="289"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="9" fill="#3a3530" fill-opacity="0.6" dominant-baseline="middle"
        letter-spacing="0.02em">polling</text>

  <!-- Chart title -->
  <text x="490" y="46"
        font-family="'JetBrains Mono','IBM Plex Mono',monospace"
        font-size="11" fill="#3a3530" text-anchor="middle" dominant-baseline="middle"
        fill-opacity="0.55" letter-spacing="0.04em">keypress latency budget</text>

  <!-- Brass-bronze ornamental theme dot — top-right margin -->
  <circle cx="876" cy="28" r="2.5" fill="#c8a96e" stroke="#c8a96e"/>
</svg>
