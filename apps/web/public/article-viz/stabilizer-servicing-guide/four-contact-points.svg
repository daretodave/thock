<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The four lubrication contact points on a stabilizer — wire barrel, stem bore, wire hook, and housing feet — with the housing feet emphasized as the commonly skipped step</title>

  <!-- PCB baseline -->
  <line x1="100" y1="430" x2="1100" y2="430" stroke-opacity="0.85"/>
  <text x="100" y="455" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">PCB</text>

  <!-- Left stabilizer housing (cross-section view) -->
  <g>
    <!-- Housing body -->
    <path d="M 350 280 L 510 280 L 510 410 L 350 410 Z" stroke-opacity="0.85"/>
    <!-- Foot 1 -->
    <path d="M 360 410 L 360 430 L 380 430 L 380 410 Z" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5" fill="oklch(0.68 0.165 28 / 0.20)"/>
    <!-- Foot 2 -->
    <path d="M 480 410 L 480 430 L 500 430 L 500 410 Z" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5" fill="oklch(0.68 0.165 28 / 0.20)"/>
    <!-- Stem in bore -->
    <rect x="395" y="240" width="70" height="160" stroke-opacity="0.7"/>
    <line x1="395" y1="240" x2="395" y2="400" stroke-opacity="0.6"/>
    <line x1="465" y1="240" x2="465" y2="400" stroke-opacity="0.6"/>
    <!-- Wire barrel hole -->
    <circle cx="430" cy="340" r="6" fill="oklch(0.68 0.165 28 / 0.18)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
    <!-- Wire hook in slot -->
    <line x1="430" y1="395" x2="430" y2="412" stroke-opacity="0.5"/>
    <path d="M 425 410 Q 430 418 435 410" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
  </g>

  <!-- Wire span (horizontal) -->
  <line x1="430" y1="395" x2="770" y2="395" stroke-opacity="0.65"/>

  <!-- Right stabilizer housing mirrored -->
  <g>
    <path d="M 690 280 L 850 280 L 850 410 L 690 410 Z" stroke-opacity="0.85"/>
    <path d="M 700 410 L 700 430 L 720 430 L 720 410 Z" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5" fill="oklch(0.68 0.165 28 / 0.20)"/>
    <path d="M 820 410 L 820 430 L 840 430 L 840 410 Z" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5" fill="oklch(0.68 0.165 28 / 0.20)"/>
    <rect x="735" y="240" width="70" height="160" stroke-opacity="0.7"/>
    <line x1="735" y1="240" x2="735" y2="400" stroke-opacity="0.6"/>
    <line x1="805" y1="240" x2="805" y2="400" stroke-opacity="0.6"/>
    <circle cx="770" cy="340" r="6" fill="oklch(0.68 0.165 28 / 0.18)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2"/>
  </g>

  <!-- Numbered callouts -->
  <!-- 1 wire barrel -->
  <g stroke-opacity="0.45">
    <line x1="430" y1="340" x2="280" y2="190"/>
  </g>
  <text x="270" y="180" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.85">① wire barrel</text>
  <text x="270" y="198" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">dielectric grease · match-head</text>

  <!-- 2 stem bore -->
  <g stroke-opacity="0.45">
    <line x1="430" y1="280" x2="220" y2="280"/>
  </g>
  <text x="210" y="280" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.85">② stem bore</text>
  <text x="210" y="298" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">GPL-205 G0 · thin film</text>

  <!-- 3 wire hook -->
  <g stroke-opacity="0.45">
    <line x1="430" y1="412" x2="290" y2="500"/>
  </g>
  <text x="280" y="503" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.85">③ wire hook-in-slot</text>
  <text x="280" y="521" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">dielectric grease · small dab</text>

  <!-- 4 housing feet — emphasized -->
  <g stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2.5">
    <line x1="490" y1="430" x2="990" y2="500"/>
  </g>
  <text x="1000" y="497" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.95">④ housing feet — the step most builders skip</text>
  <text x="1000" y="517" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">thin smear · acoustic coupling, not lubrication</text>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">four contact points · three are obvious · one isn't</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
