<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Tactile bump comparison ladder — Gateron Lanes vs Durock T1 vs Gazzew Boba U4T vs Drop Holy Panda X, showing bump geometry and character per switch</title>

  <!-- Divider lines between rows, faint -->
  <g stroke-opacity="0.12">
    <line x1="80" y1="170" x2="1120" y2="170"/>
    <line x1="80" y1="270" x2="1120" y2="270"/>
    <line x1="80" y1="370" x2="1120" y2="370"/>
  </g>

  <!-- Left border axis -->
  <line x1="80" y1="70" x2="80" y2="430" stroke-opacity="0.3"/>

  <!-- Header row labels -->
  <text x="86" y="60" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.45">switch</text>
  <text x="440" y="60" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">bump profile (travel L→R)</text>
  <text x="900" y="60" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.45">character</text>

  <!-- ======================== -->
  <!-- ROW 1: Gateron Lanes    -->
  <!-- ======================== -->

  <!-- Row name -->
  <text x="86" y="118" font-family="IBM Plex Sans, sans-serif" font-size="17" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.95">Gateron Lanes</text>

  <!-- Bump glyph: sharp spike near left of travel, immediate decay — CORAL -->
  <!-- Baseline for row 1 at y=140 -->
  <line x1="210" y1="140" x2="680" y2="140" stroke-opacity="0.25"/>
  <!-- Left flat -->
  <path d="M 215 140 L 290 140" stroke-opacity="0.6"/>
  <!-- Sharp spike -->
  <path d="M 290 140 L 304 82 L 318 140" stroke="oklch(0.68 0.165 28)" stroke-width="3" stroke-opacity="0.95"/>
  <!-- Fill under spike -->
  <path d="M 290 140 L 304 82 L 318 140 Z" fill="oklch(0.68 0.165 28 / 0.12)" stroke="none"/>
  <!-- Focal dot at peak -->
  <circle cx="304" cy="82" r="5" fill="oklch(0.68 0.165 28)" stroke="none"/>
  <!-- Right flat after spike, travels to bottom-out -->
  <path d="M 318 140 L 675 140" stroke-opacity="0.6"/>

  <!-- Character label -->
  <text x="900" y="112" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.9">sharp, dry, front-loaded</text>
  <text x="900" y="132" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55">immediate decay · Alps-adjacent</text>

  <!-- ==================== -->
  <!-- ROW 2: Durock T1    -->
  <!-- ==================== -->

  <text x="86" y="218" font-family="IBM Plex Sans, sans-serif" font-size="17" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.85">Durock T1</text>

  <!-- Baseline for row 2 at y=240 -->
  <line x1="210" y1="240" x2="680" y2="240" stroke-opacity="0.25"/>
  <!-- Left flat -->
  <path d="M 215 240 L 295 240" stroke-opacity="0.6"/>
  <!-- Slightly broader spike, moderate descent -->
  <path d="M 295 240 L 312 170 L 342 240" stroke-opacity="0.8" stroke-width="2.5"/>
  <path d="M 295 240 L 312 170 L 342 240 Z" fill="oklch(0.78 0.005 90 / 0.07)" stroke="none"/>
  <circle cx="312" cy="170" r="4" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65"/>
  <!-- Right flat -->
  <path d="M 342 240 L 675 240" stroke-opacity="0.6"/>

  <!-- Character label -->
  <text x="900" y="212" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.8">sharp, slightly longer dwell</text>
  <text x="900" y="232" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">crisp lead edge · mid-range weight</text>

  <!-- ======================== -->
  <!-- ROW 3: Gazzew Boba U4T  -->
  <!-- ======================== -->

  <text x="86" y="318" font-family="IBM Plex Sans, sans-serif" font-size="17" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.85">Gazzew Boba U4T</text>

  <!-- Baseline for row 3 at y=340 -->
  <line x1="210" y1="340" x2="680" y2="340" stroke-opacity="0.25"/>
  <!-- Left flat -->
  <path d="M 215 340 L 280 340" stroke-opacity="0.6"/>
  <!-- D-shape: steep climb, flat plateau, steep drop -->
  <path d="M 280 340 L 300 258 L 400 258 L 418 340" stroke-opacity="0.8" stroke-width="2.5"/>
  <path d="M 280 340 L 300 258 L 400 258 L 418 340 Z" fill="oklch(0.78 0.005 90 / 0.07)" stroke="none"/>
  <!-- Right flat -->
  <path d="M 418 340 L 675 340" stroke-opacity="0.6"/>

  <!-- Character label -->
  <text x="900" y="312" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.8">heavy, plateau, D-shaped</text>
  <text x="900" y="332" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">unmissable at any cadence · "in the bump"</text>

  <!-- ========================= -->
  <!-- ROW 4: Drop Holy Panda X  -->
  <!-- ========================= -->

  <text x="86" y="418" font-family="IBM Plex Sans, sans-serif" font-size="17" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.85">Drop Holy Panda X</text>

  <!-- Baseline for row 4 at y=440 -->
  <line x1="210" y1="440" x2="680" y2="440" stroke-opacity="0.25"/>
  <!-- Left flat -->
  <path d="M 215 440 L 290 440" stroke-opacity="0.6"/>
  <!-- Smooth arc, peak then long rounded decay into bottom-out -->
  <path d="M 290 440 C 310 440 330 365 370 365 C 410 365 440 410 480 430 L 675 440"
    stroke-opacity="0.8" stroke-width="2.5"/>
  <path d="M 290 440 C 310 440 330 365 370 365 C 410 365 440 410 480 430 L 675 440 L 675 440 Z"
    fill="oklch(0.78 0.005 90 / 0.07)" stroke="none"/>
  <circle cx="370" cy="365" r="4" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6"/>

  <!-- Character label -->
  <text x="900" y="412" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.8">rounded, blends into bottom-out</text>
  <text x="900" y="432" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">smooth arc · bump and landing as one gesture</text>

  <!-- Bottom baseline -->
  <line x1="80" y1="458" x2="1120" y2="458" stroke-opacity="0.3"/>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
