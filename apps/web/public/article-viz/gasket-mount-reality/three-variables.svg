<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Three variables that determine how a gasket mount actually behaves — plate material, gasket durometer/thickness, and attachment point count</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">what the spec sheet does not say</text>

  <!-- Three variable cards -->
  <g>
    <rect x="80" y="160" width="320" height="280" rx="10" fill="oklch(0.78 0.10 80 / 0.08)" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="240" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">variable 1</text>
    <text x="240" y="230" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">plate material</text>
    <!-- mini bars showing material character -->
    <g>
      <text x="100" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">PC</text>
      <rect x="130" y="266" width="120" height="10" fill="oklch(0.78 0.10 80 / 0.35)" stroke-opacity="0.6"/>
      <text x="100" y="305" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">POM</text>
      <rect x="130" y="296" width="100" height="10" fill="oklch(0.78 0.10 80 / 0.30)" stroke-opacity="0.6"/>
      <text x="100" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">FR4</text>
      <rect x="130" y="326" width="160" height="10" fill="oklch(0.78 0.10 80 / 0.45)" stroke-opacity="0.7"/>
      <text x="100" y="365" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">brass</text>
      <rect x="130" y="356" width="220" height="10" fill="oklch(0.78 0.10 80 / 0.65)" stroke-opacity="0.85"/>
    </g>
    <text x="240" y="400" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">stiffer = brighter</text>
    <text x="240" y="418" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">the actual lever</text>
  </g>

  <g>
    <rect x="440" y="160" width="320" height="280" rx="10" fill="oklch(0.78 0.10 80 / 0.08)" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="600" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">variable 2</text>
    <text x="600" y="230" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">gasket durometer × thickness</text>
    <!-- soft vs stiff comparison -->
    <g>
      <text x="500" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">40A · thick</text>
      <rect x="580" y="265" width="130" height="14" stroke-opacity="0.6"/>
      <line x1="580" y1="282" x2="580" y2="296" stroke-opacity="0.5"/>
      <line x1="710" y1="282" x2="710" y2="296" stroke-opacity="0.5"/>
      <text x="645" y="307" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">deflects more</text>

      <text x="500" y="350" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">70A · thin</text>
      <rect x="580" y="342" width="100" height="8" stroke-opacity="0.6"/>
      <line x1="580" y1="354" x2="580" y2="364" stroke-opacity="0.5"/>
      <line x1="680" y1="354" x2="680" y2="364" stroke-opacity="0.5"/>
      <text x="630" y="375" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">near-top-mount feel</text>
    </g>
    <text x="600" y="418" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">rarely on the storefront</text>
  </g>

  <g>
    <rect x="800" y="160" width="320" height="280" rx="10" fill="oklch(0.78 0.10 80 / 0.08)" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="960" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">variable 3</text>
    <text x="960" y="230" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">attachment count</text>
    <!-- 4-point vs 8-point plate diagrams -->
    <g>
      <text x="840" y="280" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">4 pts</text>
      <rect x="820" y="290" width="50" height="50" stroke-opacity="0.6"/>
      <circle cx="825" cy="295" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="865" cy="295" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="825" cy="335" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="865" cy="335" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <text x="845" y="362" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">springy · less even</text>
    </g>
    <g>
      <text x="1010" y="280" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">8 pts</text>
      <rect x="990" y="290" width="50" height="50" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85" stroke-width="2"/>
      <circle cx="995" cy="295" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="1015" cy="295" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="1035" cy="295" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="995" cy="335" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="1015" cy="335" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="1035" cy="335" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="985" cy="315" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <circle cx="1045" cy="315" r="4" fill="oklch(0.78 0.10 80)" stroke="none"/>
      <text x="1015" y="362" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">even response</text>
    </g>
    <text x="960" y="418" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">budget designs compress here first</text>
  </g>

  <!-- Caption -->
  <text x="600" y="490" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">two boards, identical "gasket mount" label — three variables apart</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
