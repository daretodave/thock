<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 580" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Mount style mapped on two axes — feel firmness and sound pitch — showing where the four canonical styles land</title>

  <!-- Axes box -->
  <rect x="220" y="120" width="800" height="380" stroke-opacity="0.35"/>

  <!-- Quadrant gridlines -->
  <line x1="620" y1="120" x2="620" y2="500" stroke-opacity="0.18" stroke-dasharray="4 6"/>
  <line x1="220" y1="310" x2="1020" y2="310" stroke-opacity="0.18" stroke-dasharray="4 6"/>

  <!-- Axis labels -->
  <text x="620" y="100" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">FEEL →</text>
  <text x="320" y="100" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">softer · gives</text>
  <text x="920" y="100" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">firmer · zero give</text>

  <text x="200" y="310" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.8">SOUND</text>
  <text x="200" y="200" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">higher ↑</text>
  <text x="200" y="430" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">deeper ↓</text>

  <!-- Plotted styles — bordeaux filled circles -->
  <!-- Gasket: soft + deep -->
  <circle cx="340" cy="420" r="14" fill="oklch(0.62 0.13 25 / 0.20)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="340" y="455" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">gasket</text>
  <text x="340" y="472" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">2024-26 default</text>

  <!-- Top-mount: firmer + a bit higher -->
  <circle cx="790" cy="265" r="13" fill="oklch(0.62 0.13 25 / 0.20)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="790" y="300" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">top-mount</text>
  <text x="790" y="317" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">classic · case rings</text>

  <!-- Tray-mount: middle, with a halo indicating high variance -->
  <circle cx="540" cy="340" r="22" fill="none" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.35" stroke-width="2" stroke-dasharray="4 4"/>
  <circle cx="540" cy="340" r="11" fill="oklch(0.62 0.13 25 / 0.15)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="540" y="380" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">tray-mount</text>
  <text x="540" y="397" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">varies across layout</text>

  <!-- Integrated: firmest + brightest -->
  <circle cx="940" cy="180" r="14" fill="oklch(0.62 0.13 25 / 0.20)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="940" y="215" font-family="Newsreader, serif" font-size="16" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">integrated</text>
  <text x="940" y="232" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">rigid · tight at $200</text>

  <!-- Recommendation strip -->
  <text x="600" y="540" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">pick the mount that matches the typing feel wanted, not the sound</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
