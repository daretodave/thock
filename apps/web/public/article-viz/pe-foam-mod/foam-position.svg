<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Where PE foam sits in the stack — between the PCB and the case bottom — interrupting the resonant air cavity</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">before and after — the air cavity that was ringing</text>

  <!-- BEFORE panel -->
  <text x="320" y="145" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">before · empty cavity</text>

  <!-- Case outline left -->
  <path d="M 140 180 L 500 180 L 500 400 L 140 400 Z" stroke-opacity="0.85"/>
  <!-- Plate -->
  <rect x="170" y="200" width="300" height="14" stroke-opacity="0.85"/>
  <text x="160" y="212" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">plate</text>
  <!-- PCB -->
  <rect x="170" y="225" width="300" height="14" stroke-opacity="0.85"/>
  <text x="160" y="237" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">PCB</text>
  <!-- Air cavity with ringing waves -->
  <g stroke="oklch(0.68 0.165 28)" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round">
    <path d="M 200 290 Q 220 280 240 290 T 280 290 T 320 290 T 360 290 T 400 290 T 440 290"/>
    <path d="M 200 320 Q 220 310 240 320 T 280 320 T 320 320 T 360 320 T 400 320 T 440 320"/>
    <path d="M 200 350 Q 220 340 240 350 T 280 350 T 320 350 T 360 350 T 400 350 T 440 350"/>
  </g>
  <text x="320" y="280" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">cavity rings</text>

  <!-- AFTER panel -->
  <text x="880" y="145" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">after · PE foam interrupts the path</text>

  <path d="M 700 180 L 1060 180 L 1060 400 L 700 400 Z" stroke-opacity="0.85"/>
  <rect x="730" y="200" width="300" height="14" stroke-opacity="0.85"/>
  <text x="720" y="212" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">plate</text>
  <rect x="730" y="225" width="300" height="14" stroke-opacity="0.85"/>
  <text x="720" y="237" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.6">PCB</text>
  <!-- PE foam fills the cavity -->
  <rect x="730" y="245" width="300" height="150" fill="oklch(0.68 0.165 28 / 0.20)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="880" y="325" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">PE foam (1–2mm)</text>
  <text x="880" y="345" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">closed-cell · absorbs cavity energy</text>

  <!-- Bottom strip -->
  <text x="600" y="445" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">a sheet of packaging foam, a pair of scissors, and two dollars</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
