  <!-- Source note -->
  <text x="600" y="395" font-family="'IBM Plex Sans', ui-sans-serif, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.38">source: thock tracker W25–W26 · scores are weekly tracker readings, direction=up both weeks</text>

