  <!-- 10 at y=280 -->
  <line x1="200" y1="280" x2="1000" y2="280" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="188" y="284" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">10</text>
