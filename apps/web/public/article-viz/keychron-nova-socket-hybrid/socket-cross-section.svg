<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Annotated cross-section of the Nova Socket footprint on a PCB. Left half shows a standard mechanical switch seated with four contact legs meeting copper pads. Right half shows a TMR magnetic switch seated in the same footprint outline, with a stem-mounted magnet positioned over a sensor pad wired to the same four-pin socket. A coral bracket spans both halves labelled "one socket, one PCB, buyer chooses per key."</title>

  <!-- Title -->
  <text x="600" y="42" font-family="Newsreader, serif" font-style="italic" font-size="19" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">Nova Socket cross-section — same footprint, two switch families</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="30" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>

  <!-- Column labels -->
  <text x="350" y="90" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">Standard mechanical switch</text>
  <text x="850" y="90" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.9">TMR magnetic switch</text>

  <!-- Left: mechanical switch housing + stem -->
  <rect x="270" y="108" width="160" height="100" rx="10" opacity="0.85"/>
  <rect x="328" y="208" width="44" height="90" rx="4" opacity="0.85"/>
  <!-- Left: four contact legs fanning down to copper pads -->
  <line x1="336" y1="298" x2="308" y2="332"/>
  <line x1="344" y1="298" x2="330" y2="332"/>
  <line x1="356" y1="298" x2="370" y2="332"/>
  <line x1="364" y1="298" x2="392" y2="332"/>

  <!-- Right: TMR switch housing + stem -->
  <rect x="770" y="108" width="160" height="100" rx="10" opacity="0.85"/>
  <rect x="828" y="208" width="44" height="70" rx="4" opacity="0.85"/>
  <!-- Right: magnet embedded at the stem base -->
  <rect x="833" y="278" width="34" height="18" rx="2" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" opacity="0.9"/>
  <text x="850" y="291" font-family="JetBrains Mono, monospace" font-size="10" fill="oklch(0.14 0.01 90)" stroke="none" text-anchor="middle" opacity="0.9">N S</text>

  <!-- PCB slab spanning both halves -->
  <rect x="140" y="332" width="920" height="50" opacity="0.8"/>
  <text x="130" y="362" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">PCB</text>

  <!-- Left: dashed socket footprint outline + copper pads -->
  <rect x="278" y="322" width="144" height="30" stroke="oklch(0.68 0.165 28)" stroke-dasharray="6 4" opacity="0.7" fill="none"/>
  <rect x="298" y="330" width="16" height="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.55"/>
  <rect x="322" y="330" width="16" height="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.55"/>
  <rect x="362" y="330" width="16" height="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.55"/>
  <rect x="386" y="330" width="16" height="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.55"/>

  <!-- Right: dashed socket footprint outline, identical shape, + sensor pad -->
  <rect x="778" y="322" width="144" height="30" stroke="oklch(0.68 0.165 28)" stroke-dasharray="6 4" opacity="0.7" fill="none"/>
  <rect x="818" y="330" width="64" height="14" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.35"/>

  <!-- Annotation labels -->
  <text x="350" y="410" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">contact legs → copper pads</text>
  <text x="850" y="410" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.8">magnet over sensor pad (TMR)</text>

  <!-- Connecting note across both footprints -->
  <line x1="422" y1="337" x2="778" y2="337" stroke-dasharray="4 5" opacity="0.35"/>
  <text x="600" y="300" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">identical four-pin footprint</text>

  <!-- Bracket spanning both halves -->
  <path d="M200,440 L200,455 L1000,455 L1000,440" stroke="oklch(0.68 0.165 28)" opacity="0.85" fill="none"/>
  <line x1="600" y1="455" x2="600" y2="468" stroke="oklch(0.68 0.165 28)" opacity="0.85"/>
  <text x="600" y="495" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.9">one socket, one PCB, buyer chooses per key</text>
</svg>
