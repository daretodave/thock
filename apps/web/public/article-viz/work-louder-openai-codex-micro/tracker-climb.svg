<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Coral line chart plotting the Work Louder x OpenAI Codex Micro Trends Tracker score across three weeks: 58 the week of the June 29 teaser (W27), 68 the following week (W28), and 94 the week of July 13 (W29), with a dashed marker past the last data point labeled July 15, Codex Micro ships</title>

  <!-- Title -->
  <text x="600" y="48" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Work Louder x OpenAI Codex Micro — Trends Tracker W27 → W29</text>

  <!-- Chart area: x 180-1150, y 100 (score 100) to 360 (score 0) -->
  <!-- Scale: 260px for 100 points = 2.6px/point -->
  <!-- W27 score 58 -> y = 360 - 150.8 = 209 -->
  <!-- W28 score 68 -> y = 360 - 176.8 = 183 -->
  <!-- W29 score 94 -> y = 360 - 244.4 = 116 -->

  <!-- Horizontal grid lines -->
  <line x1="180" y1="360" x2="1150" y2="360" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.35" stroke-width="1.5"/>
  <line x1="180" y1="308" x2="1150" y2="308" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="256" x2="1150" y2="256" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="204" x2="1150" y2="204" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="152" x2="1150" y2="152" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="100" x2="1150" y2="100" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>

  <!-- Y-axis labels -->
  <text x="168" y="364" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">0</text>
  <text x="168" y="312" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">20</text>
  <text x="168" y="260" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">40</text>
  <text x="168" y="208" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">60</text>
  <text x="168" y="156" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">80</text>
  <text x="168" y="104" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">100</text>

  <!-- Subtle fill below line (actual data only) -->
  <polygon
    points="280,209 650,183 1000,116 1000,360 280,360"
    fill="oklch(0.68 0.165 28 / 0.07)"
    stroke="none"
  />

  <!-- Coral data line -->
  <polyline
    points="280,209 650,183 1000,116"
    stroke="oklch(0.68 0.165 28)"
    stroke-width="3"
    stroke-opacity="0.92"
    fill="none"
  />

  <!-- Dashed forward projection toward launch marker (no value implied, direction only) -->
  <line x1="1000" y1="116" x2="1110" y2="80" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.35" stroke-dasharray="4 5"/>

  <!-- Data dots -->
  <circle cx="280" cy="209" r="5" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.55"/>
  <circle cx="650" cy="183" r="5.5" fill="oklch(0.68 0.165 28 / 0.45)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85"/>
  <circle cx="1000" cy="116" r="10" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.92"/>

  <!-- Score labels -->
  <text x="280" y="196" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">58</text>
  <text x="650" y="170" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">68</text>
  <text x="1020" y="112" font-family="IBM Plex Sans, sans-serif" font-size="18" font-weight="700" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.95">94</text>

  <!-- X-axis labels: week + date -->
  <text x="280" y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">W27</text>
  <text x="280" y="400" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">teased Jun 29</text>
  <text x="650" y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W28</text>
  <text x="650" y="400" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">Jul 6</text>
  <text x="1000" y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">W29</text>
  <text x="1000" y="400" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.75">Jul 13</text>

  <!-- Launch marker -->
  <line x1="1115" y1="70" x2="1115" y2="360" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.25" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="1115" y="60" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.80">Jul 15</text>
  <text x="1115" y="74" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Codex Micro ships</text>

  <!-- Footer annotation -->
  <text x="600" y="412" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">a discussion spike, not a slow build — three weeks, teaser to launch week</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="36" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
