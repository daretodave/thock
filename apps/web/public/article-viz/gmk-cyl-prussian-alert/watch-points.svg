<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Three things to watch on Prussian Alert when the GB closes — fulfillment SKU, modifier-kit count, and deskmat/novelty handling</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">three things to watch when the GB closes</text>

  <!-- Three watch-cards -->
  <g>
    <rect x="80" y="160" width="340" height="180" rx="10" fill="oklch(0.50 0.18 25 / 0.08)" stroke="oklch(0.50 0.18 25)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="250" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.50 0.18 25)" stroke="none" text-anchor="middle" opacity="0.95">watch 1</text>
    <text x="250" y="230" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">single SKU vs. split</text>
    <text x="250" y="265" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">single = tighter allocation</text>
    <text x="250" y="285" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">+ earlier close</text>
  </g>

  <g>
    <rect x="430" y="160" width="340" height="180" rx="10" fill="oklch(0.50 0.18 25 / 0.08)" stroke="oklch(0.50 0.18 25)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="600" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.50 0.18 25)" stroke="none" text-anchor="middle" opacity="0.95">watch 2</text>
    <text x="600" y="230" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">modifier-kit count</text>
    <text x="600" y="265" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">3 or fewer = tight pricing</text>
    <text x="600" y="285" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">sprawl = restock discounts</text>
  </g>

  <g>
    <rect x="780" y="160" width="340" height="180" rx="10" fill="oklch(0.50 0.18 25 / 0.08)" stroke="oklch(0.50 0.18 25)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="950" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.50 0.18 25)" stroke="none" text-anchor="middle" opacity="0.95">watch 3</text>
    <text x="950" y="230" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">deskmat &amp; novelty</text>
    <text x="950" y="265" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">in-base or future round?</text>
    <text x="950" y="285" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">signals the run shape</text>
  </g>

  <!-- Caption -->
  <text x="600" y="395" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">does GMK CYL sustain a second strong year?</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
