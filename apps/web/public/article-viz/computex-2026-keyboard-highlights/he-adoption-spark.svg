<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Hall Effect / Rapid Trigger Trends Tracker scores from W21 through W25 — values 55, 60, 66, 72, 76 — already elevated the week Computex 2026 happened, climbing every week since</title>

  <!-- Title -->
  <text x="600" y="48" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Hall Effect / Rapid Trigger — Trends Tracker W21 → W25</text>

  <!-- Chart area: x 200–1040, y 100 (score 100) to 360 (score 0) -->
  <!-- Scale: 260px for 100 score points = 2.6px per point -->
  <!-- W21 score 55 → y = 360 - (55 * 2.6) = 217 -->
  <!-- W22 score 60 → 360 - 156 = 204 -->
  <!-- W23 score 66 → 360 - 171.6 = 188 -->
  <!-- W24 score 72 → 360 - 187.2 = 173 -->
  <!-- W25 score 76 → 360 - 197.6 = 162 -->
  <!-- X: 5 points at x=200,410,620,830,1040 (step 210) -->

  <!-- Horizontal grid lines -->
  <line x1="180" y1="360" x2="1080" y2="360" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.35" stroke-width="1.5"/>
  <line x1="180" y1="308" x2="1080" y2="308" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="256" x2="1080" y2="256" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="204" x2="1080" y2="204" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="152" x2="1080" y2="152" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>
  <line x1="180" y1="100" x2="1080" y2="100" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.10"/>

  <!-- Y-axis labels -->
  <text x="168" y="364" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">0</text>
  <text x="168" y="312" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">20</text>
  <text x="168" y="260" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">40</text>
  <text x="168" y="208" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">60</text>
  <text x="168" y="156" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">80</text>
  <text x="168" y="104" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.40">100</text>

  <!-- Subtle fill below line -->
  <polygon
    points="200,217 410,204 620,188 830,173 1040,162 1040,360 200,360"
    fill="oklch(0.68 0.165 28 / 0.07)"
    stroke="none"
  />

  <!-- Computex 2026 marker at W21 — the week the tracker first picked up this row -->
  <line x1="200" y1="90" x2="200" y2="370" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.18" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="200" y="82" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">Computex 2026</text>
  <text x="200" y="95" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.70">May 20–24</text>

  <!-- Coral data line -->
  <polyline
    points="200,217 410,204 620,188 830,173 1040,162"
    stroke="oklch(0.68 0.165 28)"
    stroke-width="3"
    stroke-opacity="0.92"
    fill="none"
  />

  <!-- Data dots -->
  <!-- W21 Computex dot — accented, first tracked value -->
  <circle cx="200"  cy="217" r="5.5" fill="oklch(0.68 0.165 28 / 0.45)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.90"/>
  <circle cx="410"  cy="204" r="4" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.40"/>
  <circle cx="620"  cy="188" r="4" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.40"/>
  <circle cx="830"  cy="173" r="4" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.40"/>
  <!-- Terminal dot W25 — filled coral -->
  <circle cx="1040" cy="162" r="10" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.90"/>

  <!-- Score callout W21 -->
  <text x="200" y="208" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">55</text>
  <!-- Terminal score label -->
  <text x="1060" y="158" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.68 0.165 28)" stroke="none" font-weight="600">76</text>
  <text x="1060" y="176" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.50">W25</text>

  <!-- X-axis week labels -->
  <text x="200"  y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">W21</text>
  <text x="410"  y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">W22</text>
  <text x="620"  y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">W23</text>
  <text x="830"  y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">W24</text>
  <text x="1040" y="385" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">W25</text>

  <!-- Annotation -->
  <text x="600" y="420" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">already elevated the week of the show — and rising every week since</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="36" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
