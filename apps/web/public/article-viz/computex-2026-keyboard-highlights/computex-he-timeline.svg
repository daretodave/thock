  <text x="730" y="237" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">units expected</text>

  <!-- ===== EVENT 4: Q4 2026 (x=970) ===== -->
  <line x1="970" y1="175" x2="970" y2="205" stroke="oklch(0.78 0.005 90)" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="970" cy="190" r="5" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.45"/>
  <text x="970" y="162" font-family="IBM Plex Sans, sans-serif" font-size="12" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">Q4 2026</text>
