  <line x1="730" y1="175" x2="730" y2="205" stroke="oklch(0.78 0.005 90)" stroke-width="1.5" stroke-opacity="0.45"/>
  <circle cx="730" cy="190" r="5" fill="oklch(0.78 0.005 90)" stroke="oklch(0.78 0.005 90)" opacity="0.45"/>
