  <!-- Main timeline axis -->
  <line x1="120" y1="190" x2="1090" y2="190" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.35" stroke-width="2"/>
  <!-- Arrowhead on right -->
  <polygon points="1090,190 1075,183 1075,197" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.35"/>

  <!-- ===== EVENT 1: Computex (x=200) ===== -->
  <!-- Vertical tick -->
  <line x1="200" y1="175" x2="200" y2="205" stroke="oklch(0.68 0.165 28)" stroke-width="2.5" stroke-opacity="0.90"/>
  <!-- Dot on timeline -->
  <circle cx="200" cy="190" r="7" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.90"/>
  <!-- Label above -->
  <text x="200" y="160" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="700" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.92">Computex 2026</text>
  <text x="200" y="176" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.75">May 20–24</text>
  <!-- Details below -->
  <text x="200" y="222" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.60">IQUNIX EC75 debut</text>
  <text x="200" y="237" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Corsair CLIPPER PRO Mini 60</text>
  <text x="200" y="252" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">Gateron HE ecosystem shown</text>

