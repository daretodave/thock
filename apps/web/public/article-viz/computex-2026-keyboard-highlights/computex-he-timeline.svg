<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Horizontal timeline with four labeled events: Computex May 20 to 24 2026 IQUNIX EC75 debut and Corsair CLIPPER PRO Mini 60 reveal; mid-2026 Gateron Magnetic Lanes volume rollout expected; Q3 2026 first EC75 reviewer units expected; Q4 2026 configurator parity verdict</title>

  <!-- Title -->
