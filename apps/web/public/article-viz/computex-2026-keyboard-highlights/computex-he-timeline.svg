  <text x="970" y="237" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">verdict from reviews</text>

  <!-- "Now" pointer at Computex node -->
  <text x="200" y="132" font-family="JetBrains Mono, monospace" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.70">the floor</text>

