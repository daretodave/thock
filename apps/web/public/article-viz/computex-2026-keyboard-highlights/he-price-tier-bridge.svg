<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two-column price-tier diagram comparing Gaming HE tiers (flagship, mid, entry) with Enthusiast HE tiers (boutique custom, mid prebuilt), bridged by a converging-price arrow between the mid tiers</title>

  <!-- Title -->
  <text x="600" y="48" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Hall-effect price tiers — gaming vs. enthusiast, mid-2026</text>

  <!-- Column headers -->
  <text x="340" y="90" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">Gaming HE</text>
  <text x="860" y="90" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">Enthusiast HE</text>

  <!-- ===== GAMING HE COLUMN (left) ===== -->

  <!-- Flagship tier: $200+ -->
  <rect x="140" y="112" width="400" height="80" rx="4" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.30" stroke-width="1.5" fill="oklch(0.78 0.005 90 / 0.04)"/>
  <text x="340" y="142" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">Flagship</text>
  <text x="340" y="160" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">$200+</text>
  <text x="340" y="177" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">Razer, Wooting top-tier</text>

  <!-- Mid tier: $120–200 — highlighted with subtle coral tint (where the bridge lands) -->
  <rect x="140" y="204" width="400" height="80" rx="4" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.40" stroke-width="1.5" fill="oklch(0.68 0.165 28 / 0.06)"/>
  <text x="340" y="234" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">Mid</text>
  <text x="340" y="252" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.75">$120 – $200</text>
  <text x="340" y="269" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">Corsair CLIPPER PRO, Keychron Q HE</text>

  <!-- Entry tier: $80–120 -->
  <rect x="140" y="296" width="400" height="80" rx="4" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.30" stroke-width="1.5" fill="oklch(0.78 0.005 90 / 0.04)"/>
  <text x="340" y="326" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">Entry</text>
  <text x="340" y="344" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">$80 – $120</text>
  <text x="340" y="361" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">budget HE prebuilts, shallow configurators</text>

  <!-- Gaming HE column brace -->
  <line x1="140" y1="108" x2="140" y2="380" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.20" stroke-width="1"/>
  <line x1="540" y1="108" x2="540" y2="380" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.20" stroke-width="1"/>

  <!-- ===== ENTHUSIAST HE COLUMN (right) ===== -->

  <!-- Boutique custom tier: $200+ -->
  <rect x="660" y="112" width="400" height="80" rx="4" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.30" stroke-width="1.5" fill="oklch(0.78 0.005 90 / 0.04)"/>
  <text x="860" y="142" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.70">Boutique custom</text>
  <text x="860" y="160" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">$200+</text>
  <text x="860" y="177" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">IQUNIX EC75, group-buy HE chassis</text>

  <!-- Mid prebuilt: $130–200 — highlighted coral -->
  <rect x="660" y="204" width="400" height="80" rx="4" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.55" stroke-width="2" fill="oklch(0.68 0.165 28 / 0.08)"/>
  <text x="860" y="234" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">Mid prebuilt</text>
  <text x="860" y="252" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.80">$130 – $200</text>
  <text x="860" y="269" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.40">Keychron Q1 HE, Nuphy HE line</text>

  <!-- Enthusiast HE column brace -->
  <line x1="660" y1="108" x2="660" y2="300" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.20" stroke-width="1"/>
  <line x1="1060" y1="108" x2="1060" y2="300" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.20" stroke-width="1"/>

  <!-- ===== BRIDGE ARROW — mid gaming → mid enthusiast ===== -->
  <!-- Arrow runs from right-center of gaming mid (x=540, y=244) to left-center of enthusiast mid (x=660, y=244) -->
  <line x1="545" y1="244" x2="655" y2="244" stroke="oklch(0.68 0.165 28)" stroke-width="2.5" stroke-opacity="0.80" stroke-dasharray="6 4"/>
  <!-- Arrowhead -->
  <polygon points="655,244 643,238 643,250" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.80"/>

  <!-- Bridge label -->
  <text x="600" y="234" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85" font-weight="600">price curve</text>
  <text x="600" y="248" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.80">converging</text>

  <!-- Manufacturing volume note -->
  <text x="600" y="420" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">Gaming-peripheral volume drives HE sensor costs down — the mid tiers are closing the gap.</text>

  <!-- Annotation italic -->
  <text x="600" y="455" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">enthusiast HE is no longer priced like a niche</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="36" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
