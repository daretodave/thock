<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The tape mod — three to five painter's-tape strips applied to the back of the PCB, with hot-swap socket clearance</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">five minutes · zero dollars · reversible with a fingernail</text>

  <!-- PCB back view (rectangle) -->
  <rect x="240" y="160" width="720" height="260" stroke-opacity="0.85"/>
  <text x="240" y="148" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55">back of PCB (component side)</text>

  <!-- Four tape strips -->
  <g>
    <rect x="260" y="180" width="680" height="36" fill="oklch(0.68 0.165 28 / 0.30)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <rect x="260" y="240" width="680" height="36" fill="oklch(0.68 0.165 28 / 0.30)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <rect x="260" y="300" width="680" height="36" fill="oklch(0.68 0.165 28 / 0.30)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <rect x="260" y="360" width="680" height="36" fill="oklch(0.68 0.165 28 / 0.30)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
  </g>

  <!-- Hot-swap socket markers (faint, showing potential clearance issue) -->
  <g fill="oklch(0.78 0.005 90)" fill-opacity="0.15" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.55" stroke-width="1.5">
    <rect x="320" y="225" width="14" height="22"/>
    <rect x="500" y="225" width="14" height="22"/>
    <rect x="680" y="225" width="14" height="22"/>
    <rect x="860" y="225" width="14" height="22"/>
    <rect x="320" y="345" width="14" height="22"/>
    <rect x="500" y="345" width="14" height="22"/>
    <rect x="680" y="345" width="14" height="22"/>
    <rect x="860" y="345" width="14" height="22"/>
  </g>

  <!-- Right callout -->
  <g stroke-opacity="0.55">
    <line x1="960" y1="198" x2="1030" y2="180"/>
  </g>
  <text x="1040" y="180" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.95">3–5 strips</text>
  <text x="1040" y="200" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">painter's, not Kapton</text>

  <g stroke-opacity="0.55">
    <line x1="960" y1="378" x2="1030" y2="395"/>
  </g>
  <text x="1040" y="398" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">leave clear around</text>
  <text x="1040" y="418" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">hot-swap sockets</text>

  <!-- Caption -->
  <text x="600" y="475" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">an even grid across the surface that vibrates most freely</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
