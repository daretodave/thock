<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.52 0.008 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Switch anatomy application map — labeled lube zones on a cross-section diagram</title>

  <!-- Warm-paper background -->
  <rect width="1200" height="750" fill="oklch(0.97 0.01 85)" stroke="none"/>

  <!-- Faint inner frame border -->
  <rect x="24" y="24" width="1152" height="702" stroke="oklch(0.85 0.008 85)" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="62" font-family="Newsreader, serif" font-size="28" font-style="italic" font-weight="500" fill="oklch(0.28 0.012 80)" stroke="none" text-anchor="middle">Switch Anatomy — Lube Application Map</text>
  <line x1="160" y1="74" x2="1040" y2="74" stroke="oklch(0.85 0.008 85)" stroke-width="1" stroke-opacity="0.7"/>

  <!-- ================================================================
       Switch cross-section — centered at x=590, occupying y=105–670
       Uses slightly darker warm-grey stroke for visibility on paper bg
       ================================================================ -->

  <!-- Coral wash behind center -->
  <ellipse cx="590" cy="395" rx="230" ry="190" fill="oklch(0.65 0.18 28 / 0.07)" stroke="none"/>

  <!-- Faint explode guide lines -->
  <g stroke-dasharray="4 8" stroke-opacity="0.15">
    <line x1="300" y1="265" x2="890" y2="265"/>
    <line x1="300" y1="615" x2="890" y2="615"/>
  </g>

  <!-- ── TOP HOUSING ──────────────────────────────────────────────── -->
  <g stroke="oklch(0.52 0.008 90)" stroke-opacity="0.65">
    <path d="M 450 255 L 450 162 Q 450 110 512 110 L 668 110 Q 730 110 730 162 L 730 255 Z"/>
    <path d="M 555 110 L 635 110 L 635 128 L 555 128 Z" stroke-opacity="0.50"/>
    <path d="M 450 188 L 432 188 L 432 212 L 450 212" stroke-opacity="0.45"/>
    <line x1="484" y1="128" x2="484" y2="255" stroke-opacity="0.25"/>
    <line x1="696" y1="128" x2="696" y2="255" stroke-opacity="0.25"/>
    <path d="M 450 222 L 435 222 L 435 240 L 450 240" stroke-opacity="0.45"/>
    <path d="M 730 222 L 745 222 L 745 240 L 730 240" stroke-opacity="0.45"/>
    <line x1="450" y1="255" x2="730" y2="255" stroke-opacity="0.60"/>
  </g>

  <!-- ── STEM ──────────────────────────────────────────────────────── -->
  <g stroke="oklch(0.52 0.008 90)" stroke-opacity="0.55">
    <path d="M 572 142 L 608 142 L 608 158 L 620 158 L 620 172 L 560 172 L 560 158 L 572 158 Z"/>
    <rect x="560" y="172" width="60" height="108" rx="2"/>
    <line x1="590" y1="180" x2="590" y2="272" stroke-opacity="0.30"/>
    <line x1="560" y1="208" x2="544" y2="208" stroke-opacity="0.45"/>
    <line x1="560" y1="240" x2="544" y2="240" stroke-opacity="0.45"/>
    <line x1="620" y1="208" x2="636" y2="208" stroke-opacity="0.45"/>
    <line x1="620" y1="240" x2="636" y2="240" stroke-opacity="0.45"/>
    <line x1="590" y1="280" x2="590" y2="468" stroke-dasharray="3 6" stroke-opacity="0.28"/>
    <path d="M 552 280 L 628 280 L 632 308 L 548 308 Z" stroke-opacity="0.50"/>
    <path d="M 476 294 Q 520 310 552 294" stroke-opacity="0.48" stroke-width="1.5"/>
    <path d="M 704 294 Q 660 310 628 294" stroke-opacity="0.48" stroke-width="1.5"/>
  </g>

  <!-- ── SPRING ───────────────────────────────────────────────────── -->
  <g stroke="oklch(0.52 0.008 90)" stroke-opacity="0.50">
    <ellipse cx="590" cy="352" rx="44" ry="7"/>
    <ellipse cx="590" cy="365" rx="44" ry="7"/>
    <ellipse cx="590" cy="378" rx="44" ry="7"/>
    <ellipse cx="590" cy="391" rx="44" ry="7"/>
    <ellipse cx="590" cy="404" rx="44" ry="7"/>
    <ellipse cx="590" cy="417" rx="44" ry="7"/>
    <ellipse cx="590" cy="430" rx="44" ry="7"/>
    <ellipse cx="590" cy="443" rx="44" ry="7"/>
    <ellipse cx="590" cy="456" rx="44" ry="7"/>
    <line x1="590" y1="344" x2="590" y2="463" stroke-opacity="0.20" stroke-dasharray="2 5"/>
  </g>

  <!-- ── BOTTOM HOUSING ────────────────────────────────────────────── -->
  <g stroke="oklch(0.52 0.008 90)" stroke-opacity="0.65">
    <path d="M 450 480 L 730 480 L 716 630 L 464 630 Z"/>
    <line x1="486" y1="480" x2="486" y2="545" stroke-opacity="0.38"/>
    <line x1="694" y1="480" x2="694" y2="545" stroke-opacity="0.38"/>
    <path d="M 538 480 L 642 480 L 638 538 L 542 538 Z" stroke-opacity="0.42"/>
    <ellipse cx="590" cy="578" rx="50" ry="15" stroke-opacity="0.50"/>
    <circle cx="486" cy="602" r="5" stroke-opacity="0.60"/>
    <circle cx="694" cy="602" r="5" stroke-opacity="0.60"/>
    <circle cx="590" cy="562" r="6" stroke-opacity="0.40"/>
    <line x1="450" y1="480" x2="730" y2="480" stroke-opacity="0.55"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════════════
       CORAL CALLOUT LINES + LABELS — 4 lube zones
       ═══════════════════════════════════════════════════════════════ -->

  <!-- Callout 1: Stem legs (outer face, leaf spring contact zone) — upper left -->
  <circle cx="548" cy="294" r="6" fill="oklch(0.65 0.18 28 / 0.22)" stroke="oklch(0.65 0.18 28)" stroke-width="1.8"/>
  <circle cx="548" cy="294" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <path d="M 541 290 L 320 210" stroke="oklch(0.65 0.18 28)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="320" cy="210" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <!-- Label block -->
  <text x="315" y="197" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.38 0.12 28)" stroke="none">stem legs</text>
  <text x="315" y="165" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">Lube: 205g0 or 3203</text>
  <text x="315" y="180" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">(light pass)</text>

  <!-- Callout 2: Housing rails (slider grooves in bottom housing) — upper right -->
  <circle cx="694" cy="512" r="6" fill="oklch(0.65 0.18 28 / 0.22)" stroke="oklch(0.65 0.18 28)" stroke-width="1.8"/>
  <circle cx="694" cy="512" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <path d="M 700 512 L 870 468" stroke="oklch(0.65 0.18 28)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="870" cy="468" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <!-- Label block -->
  <text x="876" y="462" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.38 0.12 28)" stroke="none">housing rails</text>
  <text x="876" y="480" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">Lube: 205g0</text>
  <text x="876" y="495" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">(light-medium)</text>

  <!-- Callout 3: Spring wire coils — right side -->
  <circle cx="634" cy="404" r="6" fill="oklch(0.65 0.18 28 / 0.22)" stroke="oklch(0.65 0.18 28)" stroke-width="1.8"/>
  <circle cx="634" cy="404" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <path d="M 640 404 L 830 360" stroke="oklch(0.65 0.18 28)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="830" cy="360" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <!-- Label block -->
  <text x="836" y="354" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.38 0.12 28)" stroke="none">spring wire</text>
  <text x="836" y="372" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">Lube: GPL105 or 205g0</text>
  <text x="836" y="387" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none">(bag-lube or paint)</text>

  <!-- Callout 4: Spring seat / cup in bottom housing — lower left -->
  <circle cx="544" cy="578" r="6" fill="oklch(0.65 0.18 28 / 0.22)" stroke="oklch(0.65 0.18 28)" stroke-width="1.8"/>
  <circle cx="544" cy="578" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <path d="M 537 574 L 340 618" stroke="oklch(0.65 0.18 28)" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="340" cy="618" r="2.5" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <!-- Label block -->
  <text x="335" y="612" font-family="IBM Plex Sans, sans-serif" font-size="15" font-weight="600" fill="oklch(0.38 0.12 28)" stroke="none" text-anchor="end">spring seat</text>
  <text x="335" y="630" font-family="IBM Plex Sans, sans-serif" font-size="12.5" fill="oklch(0.42 0.10 28)" stroke="none" text-anchor="end">Optional: thin layer</text>

  <!-- Bronze theme dot -->
  <circle cx="1158" cy="42" r="4" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
