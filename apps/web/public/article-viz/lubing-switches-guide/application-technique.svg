<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.52 0.008 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Brush application technique — correct linear strokes vs incorrect circular motions on housing rails</title>

  <!-- Warm-paper background -->
  <rect width="1200" height="750" fill="oklch(0.97 0.01 85)" stroke="none"/>

  <!-- Faint inner frame border -->
  <rect x="24" y="24" width="1152" height="702" stroke="oklch(0.85 0.008 85)" stroke-width="1" stroke-opacity="0.6"/>

  <!-- Title -->
  <text x="600" y="62" font-family="Newsreader, serif" font-size="28" font-style="italic" font-weight="500" fill="oklch(0.28 0.012 80)" stroke="none" text-anchor="middle">Brush Application Technique</text>
  <line x1="160" y1="74" x2="1040" y2="74" stroke="oklch(0.85 0.008 85)" stroke-width="1" stroke-opacity="0.7"/>

  <!-- ================================================================
       Two side-by-side panels:
         Left (correct):  x=60–580, y=92–680
         Right (wrong):   x=620–1140, y=92–680
         Divider:         x=600
       ================================================================ -->

  <!-- Vertical panel divider -->
  <line x1="600" y1="92" x2="600" y2="688" stroke="oklch(0.80 0.006 90)" stroke-width="1.5" stroke-opacity="0.55"/>

  <!-- ── LEFT PANEL: CORRECT ──────────────────────────────────────── -->
  <!-- Slightly warm background tint (warm paper as-is, already warm) -->
  <rect x="61" y="93" width="518" height="594" fill="oklch(0.97 0.01 85)" stroke="none"/>

  <!-- Panel header label -->
  <text x="320" y="116" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.55 0.085 155)" stroke="none" text-anchor="middle" letter-spacing="0.10em">CORRECT</text>

  <!-- Rail cross-section — left panel: two horizontal rails shown as flat trapezoidal grooves -->
  <!-- Rail body (top and bottom flat rails) -->
  <rect x="140" y="180" width="360" height="52" rx="4" stroke="oklch(0.52 0.008 90)" stroke-width="2" fill="oklch(0.93 0.008 85)"/>
  <rect x="140" y="380" width="360" height="52" rx="4" stroke="oklch(0.52 0.008 90)" stroke-width="2" fill="oklch(0.93 0.008 85)"/>
  <!-- Rail inner groove (the actual sliding surface) -->
  <rect x="148" y="188" width="344" height="10" rx="2" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.89 0.006 85)"/>
  <rect x="148" y="388" width="344" height="10" rx="2" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.89 0.006 85)"/>
  <!-- Stem slot connecting the two rails (the channel) -->
  <rect x="140" y="232" width="360" height="148" rx="0" stroke="oklch(0.65 0.008 90)" stroke-width="1" stroke-dasharray="4 5" fill="oklch(0.95 0.006 85)" stroke-opacity="0.50"/>
  <!-- Stem placeholder inside channel (subtle) -->
  <rect x="240" y="250" width="160" height="112" rx="3" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.91 0.006 85)" stroke-opacity="0.40"/>

  <!-- Brush drawn at low angle making a straight stroke — left to right -->
  <!-- Brush handle -->
  <line x1="96" y1="155" x2="320" y2="178" stroke="oklch(0.45 0.015 60)" stroke-width="3" stroke-linecap="round"/>
  <!-- Brush ferrule (metal band) -->
  <rect x="290" y="171" width="30" height="10" rx="2" stroke="oklch(0.55 0.015 60)" stroke-width="1.5" fill="oklch(0.72 0.010 75)" stroke-opacity="0.80"/>
  <!-- Brush head (bristles at low angle) -->
  <path d="M 320 176 Q 355 182 370 196 Q 365 201 330 198 Q 310 190 320 176 Z" fill="oklch(0.45 0.015 60 / 0.70)" stroke="oklch(0.45 0.015 60)" stroke-width="1"/>
  <!-- Bristle detail lines -->
  <line x1="330" y1="180" x2="355" y2="196" stroke="oklch(0.62 0.010 80)" stroke-width="0.8" stroke-opacity="0.60"/>
  <line x1="338" y1="181" x2="360" y2="196" stroke="oklch(0.62 0.010 80)" stroke-width="0.8" stroke-opacity="0.60"/>
  <line x1="346" y1="183" x2="364" y2="197" stroke="oklch(0.62 0.010 80)" stroke-width="0.8" stroke-opacity="0.60"/>

  <!-- Stroke direction arrow — coral, straight left to right along top rail -->
  <path d="M 155 194 L 455 194" stroke="oklch(0.65 0.18 28)" stroke-width="2.5" stroke-linecap="round" marker-end="none"/>
  <polygon points="455,194 440,188 440,200" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <!-- Lube trail along the rail -->
  <path d="M 155 193 L 440 193" stroke="oklch(0.65 0.18 28 / 0.30)" stroke-width="5" stroke-linecap="round"/>

  <!-- Second stroke arrow on bottom rail -->
  <path d="M 455 395 L 155 395" stroke="oklch(0.65 0.18 28)" stroke-width="2.5" stroke-linecap="round"/>
  <polygon points="155,395 170,389 170,401" fill="oklch(0.65 0.18 28)" stroke="none"/>
  <path d="M 455 394 L 170 394" stroke="oklch(0.65 0.18 28 / 0.30)" stroke-width="5" stroke-linecap="round"/>

  <!-- Coral checkmark — top right corner of panel -->
  <circle cx="516" cy="118" r="16" fill="oklch(0.65 0.18 28 / 0.12)" stroke="oklch(0.65 0.18 28)" stroke-width="2"/>
  <polyline points="507,118 514,126 526,109" stroke="oklch(0.65 0.18 28)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Left panel caption -->
  <text x="320" y="580" font-family="Newsreader, serif" font-size="20" font-style="italic" font-weight="500" fill="oklch(0.32 0.012 80)" stroke="none" text-anchor="middle">Linear strokes along the rail length</text>
  <text x="320" y="610" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.45 0.008 80)" stroke="none" text-anchor="middle">One pass, full contact.</text>
  <!-- Small annotation -->
  <text x="320" y="650" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.55 0.085 155)" stroke="none" text-anchor="middle" letter-spacing="0.06em">consistent thin film</text>

  <!-- ── RIGHT PANEL: INCORRECT ────────────────────────────────────── -->
  <!-- Slightly cooler warm-grey tint to differentiate from left panel -->
  <rect x="601" y="93" width="518" height="594" fill="oklch(0.94 0.005 85)" stroke="none"/>

  <!-- Panel header label -->
  <text x="880" y="116" font-family="IBM Plex Sans, sans-serif" font-size="13" font-weight="600" fill="oklch(0.52 0.006 90)" stroke="none" text-anchor="middle" letter-spacing="0.10em">INCORRECT</text>

  <!-- Rail cross-section — right panel: same layout -->
  <rect x="700" y="180" width="360" height="52" rx="4" stroke="oklch(0.52 0.008 90)" stroke-width="2" fill="oklch(0.91 0.007 85)"/>
  <rect x="700" y="380" width="360" height="52" rx="4" stroke="oklch(0.52 0.008 90)" stroke-width="2" fill="oklch(0.91 0.007 85)"/>
  <rect x="708" y="188" width="344" height="10" rx="2" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.87 0.006 85)"/>
  <rect x="708" y="388" width="344" height="10" rx="2" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.87 0.006 85)"/>
  <rect x="700" y="232" width="360" height="148" rx="0" stroke="oklch(0.65 0.008 90)" stroke-width="1" stroke-dasharray="4 5" fill="oklch(0.93 0.006 85)" stroke-opacity="0.50"/>
  <rect x="800" y="250" width="160" height="112" rx="3" stroke="oklch(0.65 0.008 90)" stroke-width="1" fill="oklch(0.89 0.006 85)" stroke-opacity="0.40"/>

  <!-- Brush in wrong position — more upright, circular motion implied -->
  <line x1="740" y1="120" x2="790" y2="175" stroke="oklch(0.45 0.015 60)" stroke-width="3" stroke-linecap="round"/>
  <rect x="782" y="168" width="22" height="12" rx="2" stroke="oklch(0.55 0.015 60)" stroke-width="1.5" fill="oklch(0.72 0.010 75)" stroke-opacity="0.80"/>
  <path d="M 804 170 Q 830 172 840 184 Q 836 192 812 190 Q 796 180 804 170 Z" fill="oklch(0.45 0.015 60 / 0.65)" stroke="oklch(0.45 0.015 60)" stroke-width="1"/>

  <!-- Circular / swirling stroke indicators on top rail — loops suggest circular dabbing -->
  <path d="M 730 194 Q 760 175 790 194 Q 820 213 850 194 Q 880 175 910 194 Q 940 213 970 194 Q 1000 175 1030 194" stroke="oklch(0.52 0.008 90 / 0.60)" stroke-width="2" stroke-linecap="round"/>
  <!-- Pooling dot indicators -->
  <circle cx="760" cy="192" r="5" fill="oklch(0.60 0.008 90 / 0.40)" stroke="oklch(0.52 0.008 90)" stroke-width="1"/>
  <circle cx="850" cy="194" r="7" fill="oklch(0.60 0.008 90 / 0.45)" stroke="oklch(0.52 0.008 90)" stroke-width="1"/>
  <circle cx="940" cy="192" r="4" fill="oklch(0.60 0.008 90 / 0.35)" stroke="oklch(0.52 0.008 90)" stroke-width="1"/>
  <!-- Lube pooling: uneven coverage patches -->
  <ellipse cx="760" cy="192" rx="18" ry="4" fill="oklch(0.65 0.18 28 / 0.20)" stroke="none"/>
  <ellipse cx="850" cy="194" rx="26" ry="5" fill="oklch(0.65 0.18 28 / 0.25)" stroke="none"/>
  <ellipse cx="945" cy="192" rx="15" ry="4" fill="oklch(0.65 0.18 28 / 0.18)" stroke="none"/>

  <!-- Small swirl arrows suggesting circular motion on bottom rail -->
  <path d="M 780 400 Q 820 375 860 400 Q 870 410 860 420 Q 820 440 780 415 Q 772 405 780 400" stroke="oklch(0.52 0.008 90 / 0.55)" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M 880 400 Q 920 380 950 400 Q 958 410 950 420 Q 920 438 880 415 Q 872 406 880 400" stroke="oklch(0.52 0.008 90 / 0.55)" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Cool-grey X — top right corner of right panel -->
  <circle cx="1076" cy="118" r="16" fill="oklch(0.86 0.004 90 / 0.60)" stroke="oklch(0.62 0.006 90)" stroke-width="2"/>
  <line x1="1067" y1="109" x2="1085" y2="127" stroke="oklch(0.55 0.006 90)" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="1085" y1="109" x2="1067" y2="127" stroke="oklch(0.55 0.006 90)" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Right panel caption -->
  <text x="880" y="580" font-family="Newsreader, serif" font-size="20" font-style="italic" font-weight="500" fill="oklch(0.32 0.012 80)" stroke="none" text-anchor="middle">Circular or dabbing motions</text>
  <text x="880" y="610" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.45 0.008 80)" stroke="none" text-anchor="middle">Pooling and uneven coverage.</text>
  <!-- Small annotation -->
  <text x="880" y="650" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.52 0.006 90)" stroke="none" text-anchor="middle" letter-spacing="0.06em">inconsistent film depth</text>

  <!-- Bronze theme dot -->
  <circle cx="1158" cy="42" r="4" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
