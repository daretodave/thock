<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Spec comparison across three boards — Corsair CLIPPER PRO Mini 60 (gaming-mainstream), IQUNIX EC75 (enthusiast HE), Mode Sonnet R2 (boutique gasket, no HE). Rows: switch type, polling rate, Rapid Trigger, price tier. The CLIPPER PRO and EC75 columns match on all HE/RT dimensions; Mode Sonnet R2 differs on switch type, polling rate, and RT support.</title>

  <!-- Title -->
  <text x="600" y="50" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">spec comparison — the gap that closed</text>

