  <text x="630" y="95" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" font-weight="600">IQUNIX EC75</text>
  <text x="630" y="113" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.7">enthusiast HE · Alice-adjacent</text>

