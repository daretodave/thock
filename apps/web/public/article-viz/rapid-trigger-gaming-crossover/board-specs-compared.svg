<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="800" height="320" fill="none">
  <!-- Title -->
  <text x="400" y="20" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">Specs at a Glance: Gaming vs Enthusiast vs Boutique</text>

  <!-- Layout constants:
       Label column: x=20..200 (label text at x=60, right-aligned at x=185)
       Col 1 (Corsair): center x=300, span 200..400
       Col 2 (IQUNIX): center x=500, span 400..600
       Col 3 (Mode Sonnet R2): center x=680, span 600..760
       Header row: y=50 (top) to y=75 (bottom)
       Row 1 (Switch type):   y=75 ..120
       Row 2 (Polling rate):  y=120..165
       Row 3 (Rapid Trigger): y=165..210
       Row 4 (Price tier):    y=210..255
       Footer strip:          y=255..280
  -->

  <!-- Vertical divider: label / data boundary -->
  <line x1="200" y1="40" x2="200" y2="260" stroke="#333333" stroke-width="1"/>
  <!-- Vertical divider: col1 / col2 -->
  <line x1="400" y1="40" x2="400" y2="260" stroke="#333333" stroke-width="1"/>
  <!-- Vertical divider: col2 / col3 -->
  <line x1="600" y1="40" x2="600" y2="260" stroke="#333333" stroke-width="1"/>

  <!-- Horizontal divider: header bottom -->
  <line x1="20" y1="75" x2="780" y2="75" stroke="#333333" stroke-width="1"/>
  <!-- Horizontal divider: row 1 bottom -->
  <line x1="20" y1="120" x2="780" y2="120" stroke="#333333" stroke-width="1"/>
  <!-- Horizontal divider: row 2 bottom -->
  <line x1="20" y1="165" x2="780" y2="165" stroke="#333333" stroke-width="1"/>
  <!-- Horizontal divider: row 3 bottom -->
  <line x1="20" y1="210" x2="780" y2="210" stroke="#333333" stroke-width="1"/>
  <!-- Horizontal divider: row 4 bottom -->
  <line x1="20" y1="255" x2="780" y2="255" stroke="#333333" stroke-width="1"/>

  <!-- Column headers -->
  <text x="300" y="63" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#cccccc" text-anchor="middle">Corsair CLIPPER PRO Mini</text>
  <text x="500" y="63" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#cccccc" text-anchor="middle">IQUNIX EC75</text>
  <text x="690" y="63" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="13" font-weight="bold" fill="#cccccc" text-anchor="middle">mode Sonnet R2</text>

  <!-- Sub-headers for column context (small, muted) -->
  <text x="300" y="72" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="9" fill="#888888" text-anchor="middle">gaming mainstream</text>
  <text x="500" y="72" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="9" fill="#888888" text-anchor="middle">enthusiast hall-effect</text>
  <text x="690" y="72" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="9" fill="#888888" text-anchor="middle">boutique gasket, no HE</text>

  <!-- Row labels (left side) -->
  <text x="60" y="102" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="start">Switch type</text>
  <text x="60" y="147" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="start">Polling rate</text>
  <text x="60" y="192" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="start">Rapid Trigger</text>
  <text x="60" y="237" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#999999" text-anchor="start">Price tier</text>

  <!-- Row 1: Switch type -->
  <text x="300" y="102" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">Hall-effect</text>
  <text x="500" y="102" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">Hall-effect</text>
  <text x="690" y="102" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#888888" text-anchor="middle">Contact (MX linear)</text>

  <!-- Row 2: Polling rate -->
  <text x="300" y="147" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">8000 Hz</text>
  <text x="500" y="147" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">8000 Hz</text>
  <text x="690" y="147" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#888888" text-anchor="middle">1000 Hz</text>

  <!-- Row 3: Rapid Trigger — coral highlight rects behind Yes cells -->
  <rect x="201" y="166" width="198" height="43" fill="#e05a4e" opacity="0.12"/>
  <rect x="401" y="166" width="198" height="43" fill="#e05a4e" opacity="0.12"/>
  <text x="300" y="192" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">Yes</text>
  <text x="500" y="192" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">Yes</text>
  <text x="690" y="192" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#888888" text-anchor="middle">No</text>

  <!-- Row 4: Price tier -->
  <text x="300" y="237" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">mid-range</text>
  <text x="500" y="237" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#dddddd" text-anchor="middle">premium</text>
  <text x="690" y="237" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="11" fill="#888888" text-anchor="middle">boutique</text>

  <!-- Bronze theme dot: upper-right ornamental anchor -->
  <circle cx="770" cy="18" r="5" fill="#c9952e" opacity="0.90"/>

  <!-- Bottom caption -->
  <text x="400" y="275" font-family="'IBM Plex Sans', system-ui, sans-serif" font-size="10" fill="#666666" text-anchor="middle">thock · rapid-trigger-gaming-crossover</text>
</svg>
