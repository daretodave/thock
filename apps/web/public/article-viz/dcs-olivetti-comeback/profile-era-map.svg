<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Horizontal era strip in four sections — typewriter era with DCS-adjacent tall cylindrical profiles, early hobby era still DCS-dominant, Cherry consolidation era from 2016 through 2023, and the current small-rebellion phase from 2024 to 2026 with DCS climbing again, highlighted in coral</title>

  <!-- Title -->
  <text x="600" y="65" font-family="Newsreader, serif" font-size="19" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.9">how Cherry became the default</text>

  <!-- Shared timeline bar — y=150 to y=250, full width -->
  <!-- Era 1: Typewriter / pre-hobby — x=80 to x=300 -->
  <!-- Era 2: Early hobby (Das era) — x=300 to x=520 -->
  <!-- Era 3: Cherry consolidation — x=520 to x=860 -->
  <!-- Era 4: Small rebellion — x=860 to x=1120 -->

  <!-- Era 1 block -->
  <rect x="80" y="148" width="218" height="105" rx="6" fill="oklch(0.78 0.005 90 / 0.06)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <text x="189" y="182" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">typewriter era</text>
  <text x="189" y="202" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">pre-2008</text>
  <text x="189" y="222" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Olivetti, IBM</text>
  <text x="189" y="238" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">tall cylindrical profiles</text>

  <!-- Arrow between era 1 and 2 -->
  <line x1="298" y1="200" x2="308" y2="200" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <polyline points="305,195 312,200 305,205" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3" fill="none"/>

  <!-- Era 2 block -->
  <rect x="312" y="148" width="205" height="105" rx="6" fill="oklch(0.78 0.005 90 / 0.06)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <text x="414" y="182" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">early hobby</text>
  <text x="414" y="202" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">2008–2015</text>
  <text x="414" y="222" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Das Keyboard, PMK</text>
  <text x="414" y="238" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">DCS dominant</text>

  <!-- Arrow between era 2 and 3 -->
  <line x1="517" y1="200" x2="527" y2="200" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <polyline points="524,195 531,200 524,205" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3" fill="none"/>

  <!-- Era 3 block — the biggest, Cherry consolidation -->
  <rect x="531" y="148" width="325" height="105" rx="6" fill="oklch(0.78 0.005 90 / 0.06)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <text x="693" y="182" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">Cherry consolidation</text>
  <text x="693" y="202" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">2016–2023</text>
  <text x="693" y="220" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">GMK rises, clone market follows</text>
  <text x="693" y="238" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">Cherry = catalog default</text>

  <!-- Arrow between era 3 and 4 -->
  <line x1="856" y1="200" x2="866" y2="200" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3"/>
  <polyline points="863,195 870,200 863,205" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.3" fill="none"/>

  <!-- Era 4 block — coral highlight, small rebellion -->
  <rect x="870" y="140" width="245" height="120" rx="6" fill="oklch(0.68 0.165 28 / 0.09)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.85" stroke-width="2.5"/>
  <text x="992" y="176" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">small rebellion</text>
  <text x="992" y="198" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">2024–2026</text>
  <text x="992" y="217" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">DCS, KAT, MT3 climbing</text>
  <text x="992" y="236" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">DCS Olivetti +18 W19</text>
  <text x="992" y="252" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">experienced builders rotating out</text>

  <!-- Caption -->
  <text x="600" y="340" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">Cherry orthodoxy built on GMK quality, clone depth, and compatibility — all real advantages</text>
  <text x="600" y="360" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.75">the faction rotating out knows what it is trading away</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
