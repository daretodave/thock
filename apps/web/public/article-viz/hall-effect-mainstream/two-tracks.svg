<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two parallel mid-tier slots in the 2026 prebuilt market — linear-mechanical (HMX-led) and Hall-effect (Wooting + Razer + Keychron + Mode) — serving distinct audiences out of the same configurator</title>

  <!-- Horizontal divider -->
  <line x1="100" y1="290" x2="1100" y2="290" stroke-opacity="0.2"/>

  <!-- TOP TRACK: linear-mechanical -->
  <text x="600" y="120" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">linear-mechanical mid-tier</text>
  <text x="600" y="142" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">load-bearing variables: sound, bottom-out shape</text>

  <g>
    <rect x="180" y="180" width="180" height="60" rx="6" stroke-opacity="0.55"/>
    <text x="270" y="216" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">HMX Cloud</text>
    <rect x="380" y="180" width="180" height="60" rx="6" stroke-opacity="0.55"/>
    <text x="470" y="216" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">Oil King</text>
    <rect x="580" y="180" width="180" height="60" rx="6" stroke-opacity="0.55"/>
    <text x="670" y="216" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.8">Tecsee Sapphire</text>
    <text x="850" y="218" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">audience: typists who listen</text>
  </g>

  <!-- BOTTOM TRACK: Hall-effect -->
  <text x="600" y="350" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">Hall-effect mid-tier — the new default</text>
  <text x="600" y="372" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">load-bearing variables: polling rate, rapid trigger, actuation depth</text>

  <g>
    <rect x="180" y="410" width="180" height="60" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="270" y="446" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Wooting 60 HE</text>
    <rect x="380" y="410" width="180" height="60" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="470" y="446" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Razer V3 Pro</text>
    <rect x="580" y="410" width="180" height="60" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="670" y="446" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Q1 HE 8K Marble</text>
    <rect x="780" y="410" width="180" height="60" rx="6" fill="oklch(0.68 0.165 28 / 0.10)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="870" y="446" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Mode Sonnet R2 HE</text>
    <text x="980" y="448" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.95">audience: performance</text>
  </g>

  <!-- Caption -->
  <text x="600" y="510" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">two tiers, two audiences — out of the same prebuilt configurators</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
