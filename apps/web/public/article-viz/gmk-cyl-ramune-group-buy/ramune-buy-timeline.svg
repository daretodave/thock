<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Ramune group buy timeline — opens 2026-05-15, closes approx. 2026-06-20, estimated ship Q3/Q4 2026 across 10 regional storefronts</title>

  <!-- Title -->
  <text x="600" y="52" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">5-week buy · 10 vendors · global</text>

  <!-- Timeline axis -->
  <line x1="100" y1="158" x2="1100" y2="158" stroke-opacity="0.52"/>

  <!-- Milestone 1: Opens 2026-05-15 -->
  <line x1="210" y1="118" x2="210" y2="198" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
  <circle cx="210" cy="158" r="10" fill="oklch(0.68 0.165 28 / 0.22)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="210" y="110" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">opens</text>
  <text x="210" y="224" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">2026-05-15</text>

  <!-- Buy window bar -->
  <rect x="210" y="150" width="570" height="16" fill="oklch(0.68 0.165 28 / 0.16)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.78" stroke-width="2"/>
  <text x="495" y="138" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.80">window open · ~5 weeks</text>

  <!-- Milestone 2: Closes ~2026-06-20 -->
  <line x1="780" y1="118" x2="780" y2="198" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
  <circle cx="780" cy="158" r="10" fill="oklch(0.68 0.165 28 / 0.22)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="780" y="110" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">closes</text>
  <text x="780" y="224" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">~2026-06-20</text>

  <!-- Dotted gap: close → ship (GMK lead time) -->
  <line x1="780" y1="158" x2="1040" y2="158" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- Milestone 3: Est. ship Q3/Q4 2026 -->
  <line x1="1040" y1="122" x2="1040" y2="194" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.48" stroke-width="2"/>
  <circle cx="1040" cy="158" r="8" fill="none" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.48" stroke-width="2"/>
  <text x="1040" y="110" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.58">est. ship</text>
  <text x="1040" y="224" font-family="Newsreader, serif" font-size="17" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.68">Q3/Q4 2026</text>
  <text x="1040" y="244" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.42">GMK ABS lead time</text>

  <!-- Three feature chips -->
  <rect x="148" y="275" width="228" height="48" rx="5" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.48"/>
  <text x="262" y="294" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">material</text>
  <text x="262" y="311" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">doubleshot ABS</text>

  <rect x="486" y="275" width="228" height="48" rx="5" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.48"/>
  <text x="600" y="294" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">vendor spread</text>
  <text x="600" y="311" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">10 regional storefronts</text>

  <rect x="824" y="275" width="228" height="48" rx="5" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.48"/>
  <text x="938" y="294" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.90">base color</text>
  <text x="938" y="311" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">WS1-white</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
