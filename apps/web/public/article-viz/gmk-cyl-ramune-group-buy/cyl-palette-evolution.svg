<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>GMK CYL palette arc — five colorways across the sub-line, from dark European anchor to Ramune's pastel pivot</title>

  <!-- Title -->
  <text x="540" y="38" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Five CYL sets — the palette arc</text>

  <!-- Swatch G1: Prussian Alert (x=40) -->
  <rect x="40" y="55" width="196" height="132" fill="oklch(0.42 0.15 25)" rx="3" stroke="none"/>
  <rect x="40" y="189" width="196" height="46" fill="oklch(0.92 0.02 70)" stroke="none"/>
  <text x="138" y="258" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Prussian Alert</text>
  <text x="138" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">dark red · cream</text>

  <!-- Swatch G2: GREG (x=260) -->
  <rect x="260" y="55" width="196" height="132" fill="oklch(0.60 0.10 45)" rx="3" stroke="none"/>
  <rect x="260" y="189" width="196" height="46" fill="oklch(0.88 0.04 60)" stroke="none"/>
  <text x="358" y="258" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">GREG</text>
  <text x="358" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">terracotta · warm off-white</text>

  <!-- Swatch G3: Ishtar R2 (x=480) -->
  <rect x="480" y="55" width="196" height="132" fill="oklch(0.38 0.13 285)" rx="3" stroke="none"/>
  <rect x="480" y="189" width="196" height="46" fill="oklch(0.30 0.09 290)" stroke="none"/>
  <text x="578" y="258" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Ishtar R2</text>
  <text x="578" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">lapis-berry · deep plum</text>

  <!-- Swatch G4: King of the Seas (x=700) -->
  <rect x="700" y="55" width="196" height="132" fill="oklch(0.55 0.14 220)" rx="3" stroke="none"/>
  <rect x="700" y="189" width="196" height="46" fill="oklch(0.55 0.13 185)" stroke="none"/>
  <text x="798" y="258" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">King of the Seas</text>
  <text x="798" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.50">ocean blue · teal</text>

  <!-- Bracket spanning G1–G4 (x=40 to x=896) -->
  <line x1="40" y1="302" x2="896" y2="302" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.45" stroke-width="1.5"/>
  <line x1="40" y1="297" x2="40" y2="307" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.45" stroke-width="1.5"/>
  <line x1="896" y1="297" x2="896" y2="307" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.45" stroke-width="1.5"/>
  <text x="468" y="325" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.68">dark, saturated, European-anchored</text>

  <!-- Highlight frame around G5 (Ramune) — bordeaux accent -->
  <rect x="938" y="46" width="228" height="252" rx="4" stroke="oklch(0.62 0.13 25)" stroke-width="1.8" stroke-opacity="0.85" fill="oklch(0.62 0.13 25 / 0.03)"/>
  <text x="1052" y="43" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.90">pastel pivot</text>

  <!-- Swatch G5: Ramune (x=946, w=212) -->
  <rect x="946" y="55" width="212" height="132" fill="oklch(0.82 0.11 220)" rx="3" stroke="none"/>
  <!-- Secondary row: blush pink (left) + WS1 white (right) -->
  <rect x="946" y="189" width="106" height="46" fill="oklch(0.85 0.08 0)" stroke="none"/>
  <rect x="1052" y="189" width="106" height="46" fill="oklch(0.97 0.005 90)" stroke="none"/>
  <text x="1052" y="258" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Ramune</text>
  <text x="1052" y="275" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.85">pastel blue · pink · WS1 white</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="345" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
