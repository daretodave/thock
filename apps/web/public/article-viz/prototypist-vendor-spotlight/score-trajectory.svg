<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Line chart of Prototypist's vendor tracker signal across eight weeks, W23 through W30, peaking at 33 in W26 before cooling to a recent low of 15 and ticking back up to 20 this week</title>

  <text x="600" y="40" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Prototypist's tracker signal, last eight weeks</text>

  <!-- axis -->
  <line x1="100" y1="60" x2="100" y2="340" stroke-opacity="0.3"/>

  <!-- trend line -->
  <path d="M120,183 L257,127 L394,150 L531,82 L669,138 L806,172 L943,284 L1080,228" stroke="oklch(0.68 0.165 28)" stroke-width="3" fill="none"/>

  <!-- markers -->
  <circle cx="120" cy="183" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="257" cy="127" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="394" cy="150" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="531" cy="82" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="669" cy="138" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="806" cy="172" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="943" cy="284" r="4" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.7"/>
  <circle cx="1080" cy="228" r="6" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" stroke-width="2"/>

  <!-- endpoint labels -->
  <text x="120" y="205" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">24</text>
  <text x="531" y="66" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">33</text>
  <text x="1080" y="212" font-family="JetBrains Mono, monospace" font-size="15" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle">+20</text>

  <!-- week ticks -->
  <text x="120" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W23</text>
  <text x="257" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W24</text>
  <text x="394" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W25</text>
  <text x="531" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W26</text>
  <text x="669" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W27</text>
  <text x="806" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W28</text>
  <text x="943" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">W29</text>
  <text x="1080" y="366" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">W30</text>

  <text x="600" y="400" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.9">cooling from its summer peak, ticking up again on the back of its own pipeline</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="30" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
