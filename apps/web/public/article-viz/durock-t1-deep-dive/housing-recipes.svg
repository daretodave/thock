<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two housing recipes compared — all-nylon top and bottom (Durock T1, Gazzew Boba U4T) versus polycarbonate top with nylon bottom (Gateron Lanes, Drop Holy Panda X)</title>

  <!-- Center divider -->
  <line x1="600" y1="60" x2="600" y2="470" stroke-opacity="0.18" stroke-dasharray="4 6"/>

  <!-- ===================== LEFT: ALL-NYLON ===================== -->
  <text x="140" y="48" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.9">All-nylon top + bottom</text>

  <!-- Top housing box -->
  <path d="M 140 70 L 480 70 L 480 190 L 140 190 Z" stroke-opacity="0.75"/>
  <text x="160" y="135" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55" letter-spacing="0.04em">NYLON TOP</text>

  <!-- Bottom housing box -->
  <path d="M 140 190 L 480 190 L 480 300 L 140 300 Z" stroke-opacity="0.75"/>
  <text x="160" y="250" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55" letter-spacing="0.04em">NYLON BOTTOM</text>

  <!-- Switch labels -->
  <text x="140" y="335" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.9">Durock T1</text>
  <text x="140" y="358" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.8">Gazzew Boba U4T</text>

  <!-- Muted low sound waves -->
  <path d="M 140 400 C 165 392 190 408 215 400 C 240 392 265 408 290 400 C 315 392 340 408 365 400 C 390 392 415 408 440 400 C 460 394 470 400 480 400"
    stroke="oklch(0.78 0.10 80)" stroke-opacity="0.6" stroke-width="2"/>
  <text x="140" y="440" font-family="Newsreader, serif" font-style="italic" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">muted, deep, contained —</text>
  <text x="140" y="460" font-family="Newsreader, serif" font-style="italic" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">no bright upper register</text>

  <!-- ===================== RIGHT: PC TOP + NYLON BOTTOM ===================== -->
  <text x="640" y="48" font-family="IBM Plex Sans, sans-serif" font-size="16" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.9">Polycarbonate top + nylon bottom</text>

  <!-- Top housing box -->
  <path d="M 640 70 L 980 70 L 980 190 L 640 190 Z" stroke-opacity="0.9"/>
  <text x="660" y="135" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6" letter-spacing="0.04em">POLYCARBONATE TOP</text>

  <!-- Bottom housing box -->
  <path d="M 640 190 L 980 190 L 980 300 L 640 300 Z" stroke-opacity="0.75"/>
  <text x="660" y="250" font-family="JetBrains Mono, monospace" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55" letter-spacing="0.04em">NYLON BOTTOM</text>

  <!-- Switch labels -->
  <text x="640" y="335" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.9">Gateron Lanes</text>
  <text x="640" y="358" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.8">Drop Holy Panda X</text>

  <!-- Brighter, taller sound waves at top -->
  <path d="M 640 395 C 655 370 670 420 685 395 C 700 370 715 420 730 395 C 745 370 760 420 775 395 C 790 370 805 420 820 395 C 840 375 860 395 880 395"
    stroke="oklch(0.78 0.10 80)" stroke-opacity="0.8" stroke-width="2"/>
  <text x="640" y="440" font-family="Newsreader, serif" font-style="italic" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">brighter upper register,</text>
  <text x="640" y="460" font-family="Newsreader, serif" font-style="italic" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7">contained landing at bottom-out</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
