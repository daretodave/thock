<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Three trackable trend lines for the week of 2026-W19 — Alice down 18 versus Mode Designs up 24 and Gateron Oil King up 42</title>

  <!-- Zero baseline -->
  <line x1="120" y1="270" x2="1080" y2="270" stroke-opacity="0.55"/>
  <text x="110" y="274" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">0</text>

  <!-- Y-axis ticks -->
  <g stroke-opacity="0.2">
    <line x1="118" y1="140" x2="122" y2="140"/>
    <line x1="118" y1="205" x2="122" y2="205"/>
    <line x1="118" y1="335" x2="122" y2="335"/>
  </g>
  <text x="110" y="145" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.4">+40</text>
  <text x="110" y="210" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.4">+20</text>
  <text x="110" y="340" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.4">-20</text>

  <!-- ALICE: -18, declining trajectory -->
  <g>
    <path d="M 200 220 L 350 235 L 500 255 L 650 285 L 800 305 L 950 325 L 1000 328" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="3"/>
    <circle cx="1000" cy="328" r="7" fill="oklch(0.62 0.13 25)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95"/>
    <text x="1015" y="332" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">Alice  -18</text>
  </g>

  <!-- MODE DESIGNS: +24, up -->
  <g stroke-opacity="0.45">
    <path d="M 200 255 L 350 245 L 500 230 L 650 215 L 800 200 L 950 192 L 1000 192" stroke-width="2"/>
    <circle cx="1000" cy="192" r="5"/>
  </g>
  <text x="1015" y="196" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55">Mode Designs  +24</text>

  <!-- OIL KING: +42, way up -->
  <g stroke-opacity="0.45">
    <path d="M 200 250 L 350 230 L 500 205 L 650 180 L 800 160 L 950 145 L 1000 138" stroke-width="2"/>
    <circle cx="1000" cy="138" r="5"/>
  </g>
  <text x="1015" y="142" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.55">Gateron Oil King  +42</text>

  <!-- X-axis week labels -->
  <text x="200" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">W12</text>
  <text x="500" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">W15</text>
  <text x="800" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">W18</text>
  <text x="1000" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.85">W19</text>

  <!-- Section caption -->
  <text x="600" y="445" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">not a collapse — out-gravitated</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
