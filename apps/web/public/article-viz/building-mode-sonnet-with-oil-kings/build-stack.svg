<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Sonnet + Oil King build stack — layer by layer, with each layer's contribution to the sound and feel signature</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">how the layers compose</text>

  <!-- Top: Keycaps -->
  <g>
    <rect x="380" y="150" width="440" height="36" rx="4" stroke-opacity="0.85"/>
    <text x="600" y="174" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">GMK Striker R3 — Cherry doubleshot ABS</text>
  </g>
  <!-- Switches -->
  <g>
    <rect x="380" y="200" width="440" height="36" rx="4" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
    <text x="600" y="224" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.9">70× Gateron Oil King — 55g bottom-out, factory-lubed</text>
  </g>
  <!-- Plate -->
  <g>
    <rect x="380" y="250" width="440" height="22" rx="4" stroke-opacity="0.85"/>
    <text x="600" y="266" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">1.5mm polycarbonate plate</text>
  </g>
  <!-- Leaf gasket -->
  <g>
    <rect x="380" y="280" width="440" height="14" rx="2" fill="oklch(0.62 0.13 25 / 0.18)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2"/>
    <text x="600" y="291" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">silicone leaf gasket — the soft mount</text>
  </g>
  <!-- PE foam -->
  <g>
    <rect x="380" y="302" width="440" height="14" rx="2" fill="oklch(0.62 0.13 25 / 0.12)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.8" stroke-width="2"/>
    <text x="600" y="313" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.85">PE foam between plate and PCB</text>
  </g>
  <!-- PCB -->
  <g>
    <rect x="380" y="324" width="440" height="22" rx="4" stroke-opacity="0.85"/>
    <text x="600" y="340" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">PCB · Staebies V3, clipped, holee-modded</text>
  </g>
  <!-- Poron foam -->
  <g>
    <rect x="380" y="354" width="440" height="14" rx="2" fill="oklch(0.62 0.13 25 / 0.10)" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.7" stroke-width="2"/>
    <text x="600" y="365" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">2mm Poron under the PCB</text>
  </g>
  <!-- Case -->
  <g>
    <path d="M 380 380 L 820 380 L 820 430 L 380 430 Z" stroke-opacity="0.85"/>
    <text x="600" y="410" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Mode Sonnet — aluminum 65% case · no case foam</text>
  </g>

  <!-- Right-side contribution callouts -->
  <g stroke-opacity="0.45">
    <line x1="830" y1="218" x2="900" y2="218"/>
    <line x1="830" y1="287" x2="900" y2="287"/>
    <line x1="830" y1="309" x2="900" y2="309"/>
  </g>
  <text x="910" y="222" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">supplies the weight</text>
  <text x="910" y="291" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">absorbs the sharpness</text>
  <text x="910" y="313" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" opacity="0.95">tightens high-mid</text>

  <!-- Left-side complaint callouts -->
  <g stroke-opacity="0.45">
    <line x1="290" y1="174" x2="370" y2="174"/>
    <line x1="290" y1="408" x2="370" y2="408"/>
  </g>
  <text x="280" y="178" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.7">balances the low end</text>
  <text x="280" y="412" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.7">mount does the damping</text>

  <!-- Caption -->
  <text x="600" y="495" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="middle" opacity="0.95">plate absorbs the sharpness · switch supplies the weight</text>
  <text x="600" y="525" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">the whole stack stops fighting itself</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
