<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two switch cross-sections comparing the Gazzew Boba U4 (foam dampeners) and Boba U4T (dampeners removed)</title>

  <!-- Center divider -->
  <line x1="600" y1="60" x2="600" y2="500" stroke-opacity="0.18" stroke-dasharray="3 6"/>

  <!-- ══════════════════ LEFT PANEL: Boba U4 — foam dampeners ══════════════════ -->
  <text x="300" y="58" font-family="IBM Plex Sans, sans-serif" font-size="18" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Boba U4 — foam dampeners</text>

  <!-- Top housing -->
  <path d="M 210 100 L 390 100 L 402 150 L 198 150 Z"/>
  <!-- Ghost cavity + foam pad (filled, present) -->
  <rect x="270" y="128" width="60" height="14" rx="4" stroke-opacity="0.55" fill="oklch(0.78 0.005 90 / 0.12)"/>

  <!-- Stem + housing walls -->
  <line x1="198" y1="150" x2="198" y2="320" stroke-opacity="0.7"/>
  <line x1="402" y1="150" x2="402" y2="320" stroke-opacity="0.7"/>
  <path d="M 282 158 L 318 158 L 318 200 L 282 200 Z"/>
  <line x1="300" y1="200" x2="300" y2="380" stroke-opacity="0.5" stroke-dasharray="3 5"/>

  <!-- Bottom housing -->
  <path d="M 198 320 L 402 320 L 402 420 L 198 420 Z"/>
  <!-- Foam pad at floor, present -->
  <rect x="264" y="392" width="72" height="14" rx="4" stroke-opacity="0.55" fill="oklch(0.78 0.005 90 / 0.12)"/>

  <!-- Small, contained sound-wave arcs at both contacts -->
  <g stroke="oklch(0.78 0.005 90)" stroke-opacity="0.4">
    <path d="M 285 100 A 15 15 0 0 1 315 100"/>
    <path d="M 285 440 A 15 15 0 0 0 315 440"/>
  </g>

  <text x="300" y="480" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">small, contained impact — muffled</text>

  <!-- ══════════════════ RIGHT PANEL: Boba U4T — dampeners removed ══════════════════ -->
  <text x="900" y="58" font-family="IBM Plex Sans, sans-serif" font-size="18" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">Boba U4T — dampeners removed</text>

  <path d="M 810 100 L 990 100 L 1002 150 L 798 150 Z"/>
  <!-- Ghost cavity, empty — dashed outline, no fill -->
  <rect x="870" y="128" width="60" height="14" rx="4" stroke-opacity="0.3" stroke-dasharray="3 4"/>

  <line x1="798" y1="150" x2="798" y2="320" stroke-opacity="0.7"/>
  <line x1="1002" y1="150" x2="1002" y2="320" stroke-opacity="0.7"/>
  <path d="M 882 158 L 918 158 L 918 200 L 882 200 Z"/>
  <line x1="900" y1="200" x2="900" y2="380" stroke-opacity="0.5" stroke-dasharray="3 5"/>

  <path d="M 798 320 L 1002 320 L 1002 420 L 798 420 Z"/>
  <!-- Floor, empty — dashed outline, no fill -->
  <rect x="864" y="392" width="72" height="14" rx="4" stroke-opacity="0.3" stroke-dasharray="3 4"/>

  <!-- Tall, coral-highlighted sound-wave arcs radiating from both contacts -->
  <g stroke="oklch(0.68 0.165 28)">
    <path d="M 870 100 A 30 30 0 0 1 930 100" stroke-opacity="0.55"/>
    <path d="M 852 100 A 48 48 0 0 1 948 100" stroke-opacity="0.35"/>
    <path d="M 834 100 A 66 66 0 0 1 966 100" stroke-opacity="0.2"/>
    <path d="M 870 440 A 30 30 0 0 0 930 440" stroke-opacity="0.55"/>
    <path d="M 852 440 A 48 48 0 0 0 948 440" stroke-opacity="0.35"/>
    <path d="M 834 440 A 66 66 0 0 0 966 440" stroke-opacity="0.2"/>
  </g>

  <text x="900" y="480" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.9">ring freely — deep, full-bodied thud</text>

  <!-- Shared stem/housing labels -->
  <text x="600" y="530" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.45">identical stem, identical housing — the only variable is what sits at top-out and bottom-out</text>

  <!-- Bronze theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
