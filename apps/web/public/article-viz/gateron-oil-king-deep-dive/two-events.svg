<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>What to listen for — top-out and bottom-out as two distinct events spaced a quarter-second apart, not one fused sound</title>

  <!-- Baseline / time axis -->
  <line x1="100" y1="300" x2="1100" y2="300" stroke-opacity="0.55"/>
  <text x="100" y="335" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6">t = 0</text>
  <text x="1100" y="335" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.6" text-anchor="end">~0.25s</text>

  <!-- TOP LANE: Oil King — two distinct events -->
  <text x="60" y="120" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none">Oil King</text>
  <text x="60" y="142" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" opacity="0.9">two events, ¼s apart</text>

  <!-- Event 1: top-out (brighter, taller) at x=350 — PC voice -->
  <path d="M 320 200 L 350 100 L 380 200" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.95" stroke-width="2.5"/>
  <path d="M 335 200 L 350 150 L 365 200" stroke-opacity="0.5"/>
  <text x="350" y="225" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">top-out (PC)</text>

  <!-- Gap — quarter-second -->
  <line x1="390" y1="200" x2="690" y2="200" stroke-opacity="0.3" stroke-dasharray="4 6"/>
  <text x="540" y="195" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.85">¼ second</text>

  <!-- Event 2: bottom-out (rounder, deeper, lower-frequency) at x=750 — nylon voice -->
  <path d="M 690 200 C 720 200 740 130 760 130 C 780 130 800 200 830 200" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.95" stroke-width="2.5"/>
  <path d="M 695 200 C 720 200 740 130 760 130 C 780 130 800 200 825 200 Z" fill="oklch(0.68 0.165 28 / 0.12)" stroke="none"/>
  <circle cx="760" cy="130" r="5" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)"/>
  <text x="760" y="225" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">bottom-out (nylon)</text>

  <!-- Inferior comparison row — fused single sound -->
  <text x="60" y="380" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">most under-30¢ linears:</text>
  <path d="M 320 360 C 380 360 400 320 470 320 C 540 320 560 360 620 360" stroke-opacity="0.55"/>
  <text x="470" y="395" font-family="Newsreader, serif" font-size="15" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">one fused sound</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
