<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Density comparison — copper, brass, steel, and aluminum in grams per cubic centimeter</title>

  <!-- Theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>

  <!-- Header -->
  <text x="100" y="66" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.9">density, not cleverness</text>

  <!-- Y-axis -->
  <line x1="200" y1="100" x2="200" y2="380" stroke-opacity="0.55"/>
  <!-- X-axis -->
  <line x1="200" y1="380" x2="1048" y2="380" stroke-opacity="0.55"/>

  <!-- X-axis ticks (0, 2.5, 5, 7.5, 10 g/cm3) -->
  <g stroke-opacity="0.4">
    <line x1="200" y1="380" x2="200" y2="388"/>
    <line x1="412" y1="380" x2="412" y2="388"/>
    <line x1="624" y1="380" x2="624" y2="388"/>
    <line x1="836" y1="380" x2="836" y2="388"/>
    <line x1="1048" y1="380" x2="1048" y2="388"/>
  </g>
  <text x="200" y="406" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">0</text>
  <text x="412" y="406" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2.5</text>
  <text x="624" y="406" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">5.0</text>
  <text x="836" y="406" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">7.5</text>
  <text x="1048" y="406" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">10</text>
  <text x="625" y="434" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.4">density, grams per cubic centimeter (g/cm³)</text>

  <!-- Grid lines -->
  <g stroke-opacity="0.1">
    <line x1="412" y1="100" x2="412" y2="380"/>
    <line x1="624" y1="100" x2="624" y2="380"/>
    <line x1="836" y1="100" x2="836" y2="380"/>
    <line x1="1048" y1="100" x2="1048" y2="380"/>
  </g>

  <!-- ROW 1: Copper 8.9 g/cm3 -> width 8.9/10*848 = 755 -->
  <text x="180" y="140" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.75">copper</text>
  <rect x="200" y="118" width="755" height="32" fill="oklch(0.78 0.005 90 / 0.10)" stroke-opacity="0.6" stroke-width="2"/>
  <text x="965" y="140" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">~8.9</text>

  <!-- ROW 2: Brass ~8.5 g/cm3 -> width 8.5/10*848 = 721 — highlighted, the mod's material -->
  <text x="180" y="203" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.80 0.135 75)" stroke="none" text-anchor="end" opacity="0.95">brass</text>
  <rect x="200" y="181" width="721" height="32" fill="oklch(0.80 0.135 75 / 0.24)" stroke="oklch(0.80 0.135 75)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="931" y="203" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.80 0.135 75)" stroke="none" opacity="0.95">~8.5</text>
  <text x="210" y="200" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.80 0.135 75)" stroke="none" opacity="0.75">the mod's default material</text>

  <!-- ROW 3: Steel 7.85 g/cm3 -> width 7.85/10*848 = 666 -->
  <text x="180" y="266" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.75">steel</text>
  <rect x="200" y="244" width="666" height="32" fill="oklch(0.78 0.005 90 / 0.10)" stroke-opacity="0.6" stroke-width="2"/>
  <text x="876" y="266" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">~7.85</text>

  <!-- ROW 4: Aluminum 2.7 g/cm3 -> width 2.7/10*848 = 229 -->
  <text x="180" y="329" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.75">aluminum</text>
  <rect x="200" y="307" width="229" height="32" fill="oklch(0.78 0.005 90 / 0.10)" stroke-opacity="0.6" stroke-width="2"/>
  <text x="439" y="329" font-family="JetBrains Mono, monospace" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">~2.7</text>
  <text x="210" y="326" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.45">the case material around it</text>

  <!-- Bottom note -->
  <line x1="100" y1="452" x2="1100" y2="452" stroke-opacity="0.15"/>
  <text x="600" y="468" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.4">standard material densities — copper, brass, and steel run three to four times denser than the aluminum case they sit inside</text>
</svg>
