<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two colorways, one buy — The Sovereign in deep ocean blues and The Mutation in electric pink, both shipping concurrently inside the same KBDfans configurator</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">same base set · two opposed accents · single configurator</text>

  <!-- Left: The Sovereign -->
  <g>
    <rect x="120" y="160" width="400" height="240" rx="12" fill="oklch(0.45 0.15 250 / 0.12)" stroke="oklch(0.45 0.15 250)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="320" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.45 0.15 250)" stroke="none" text-anchor="middle" opacity="0.95">moody · desk-as-furniture</text>
    <text x="320" y="240" font-family="Newsreader, serif" font-size="24" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">The Sovereign</text>
    <text x="320" y="270" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">deep ocean blues</text>
    <!-- mini key grid in deep blue -->
    <g fill="oklch(0.45 0.15 250 / 0.35)" stroke="oklch(0.45 0.15 250)" stroke-opacity="0.7" stroke-width="1.5">
      <rect x="200" y="300" width="22" height="22" rx="2"/>
      <rect x="230" y="300" width="22" height="22" rx="2"/>
      <rect x="260" y="300" width="22" height="22" rx="2"/>
      <rect x="290" y="300" width="22" height="22" rx="2"/>
      <rect x="320" y="300" width="22" height="22" rx="2"/>
      <rect x="350" y="300" width="22" height="22" rx="2"/>
      <rect x="380" y="300" width="22" height="22" rx="2"/>
      <rect x="410" y="300" width="22" height="22" rx="2"/>
    </g>
    <text x="320" y="365" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">saturated naturalistic</text>
  </g>

  <!-- Right: The Mutation -->
  <g>
    <rect x="680" y="160" width="400" height="240" rx="12" fill="oklch(0.68 0.20 0 / 0.12)" stroke="oklch(0.68 0.20 0)" stroke-opacity="0.95" stroke-width="3"/>
    <text x="880" y="195" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.68 0.20 0)" stroke="none" text-anchor="middle" opacity="0.95">electric · desk-as-instrument</text>
    <text x="880" y="240" font-family="Newsreader, serif" font-size="24" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">The Mutation</text>
    <text x="880" y="270" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">electric pink</text>
    <g fill="oklch(0.68 0.20 0 / 0.35)" stroke="oklch(0.68 0.20 0)" stroke-opacity="0.7" stroke-width="1.5">
      <rect x="760" y="300" width="22" height="22" rx="2"/>
      <rect x="790" y="300" width="22" height="22" rx="2"/>
      <rect x="820" y="300" width="22" height="22" rx="2"/>
      <rect x="850" y="300" width="22" height="22" rx="2"/>
      <rect x="880" y="300" width="22" height="22" rx="2"/>
      <rect x="910" y="300" width="22" height="22" rx="2"/>
      <rect x="940" y="300" width="22" height="22" rx="2"/>
      <rect x="970" y="300" width="22" height="22" rx="2"/>
    </g>
    <text x="880" y="365" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">saturated synthetic</text>
  </g>

  <!-- Middle vertical bar showing the split mechanic -->
  <g>
    <line x1="600" y1="180" x2="600" y2="380" stroke-opacity="0.25" stroke-dasharray="3 5"/>
    <circle cx="600" cy="280" r="22" fill="oklch(0.10 0 0)" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.7" stroke-width="2"/>
    <text x="600" y="285" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">or</text>
  </g>

  <!-- Caption -->
  <text x="600" y="450" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">choose at checkout · not at IC · the less-common pattern</text>
  <text x="600" y="475" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">two MOQs to clear inside one window</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
