<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Two-panel comparison. Left: the press — Hall-effect and MX force curves are identical. Right: the firmware behavior — Hall-effect shows a continuous voltage curve with actuation threshold and rapid-trigger reset window; MX shows a binary step function.</title>

  <!-- Panel divider -->
  <line x1="600" y1="60" x2="600" y2="420" stroke-opacity="0.15"/>

  <!-- ═════ LEFT PANEL: The Press ═════ -->
  <text x="300" y="82" font-family="Newsreader, serif" font-size="24" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">the press</text>
  <text x="300" y="104" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">force over travel</text>

  <!-- Axes (left panel) -->
  <line x1="100" y1="360" x2="500" y2="360" stroke-opacity="0.4"/>
  <line x1="100" y1="140" x2="100" y2="360" stroke-opacity="0.4"/>
  <text x="300" y="388" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">travel →</text>
  <text x="82" y="252" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.5">force</text>

  <!-- MX curve (warm-grey, slightly transparent) -->
  <path d="M 100 345 L 500 195" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.45" stroke-width="3"/>
  <text x="508" y="198" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">MX</text>

  <!-- Hall-effect curve (amber, drawn identically — same line, offset slightly for visibility) -->
  <path d="M 100 348 L 500 198" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.9" stroke-width="3" stroke-dasharray="10 5"/>
  <text x="508" y="214" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.9">HE</text>

  <!-- Legend note -->
  <text x="300" y="430" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">feel is equivalent when specced correctly</text>

  <!-- ═════ RIGHT PANEL: The Firmware Behavior ═════ -->
  <text x="900" y="82" font-family="Newsreader, serif" font-size="24" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">the firmware behavior</text>
  <text x="900" y="104" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">voltage vs. binary actuation</text>

  <!-- Axes (right panel) -->
  <line x1="680" y1="360" x2="1120" y2="360" stroke-opacity="0.4"/>
  <line x1="680" y1="140" x2="680" y2="360" stroke-opacity="0.4"/>
  <text x="900" y="388" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">travel →</text>

  <!-- Hall-effect voltage curve (amber, smooth analog rise) -->
  <path d="M 680 355 C 720 348 760 320 810 285 C 855 255 895 230 950 215 C 985 205 1020 200 1060 198 L 1120 195" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.9" stroke-width="3"/>

  <!-- Actuation threshold line -->
  <line x1="680" y1="263" x2="1120" y2="263" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1126" y="267" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.85">actuation</text>
  <text x="1126" y="280" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.85">threshold</text>

  <!-- Actuation dot on curve (where curve crosses threshold) -->
  <circle cx="877" cy="263" r="5" fill="oklch(0.78 0.10 80)" stroke="oklch(0.78 0.10 80)"/>

  <!-- Rapid-trigger reset window bracket -->
  <line x1="877" y1="292" x2="877" y2="340" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55" stroke-width="1.5"/>
  <line x1="847" y1="316" x2="907" y2="316" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55" stroke-width="1.5"/>
  <path d="M 847 324 L 847 316 L 907 316 L 907 324" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="920" y="322" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.85">rapid-trigger</text>
  <text x="920" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.85">reset window</text>

  <!-- MX binary step function (warm-grey) -->
  <path d="M 680 355 L 820 355 L 820 263 L 1120 263" stroke="oklch(0.78 0.005 90)" stroke-opacity="0.38" stroke-width="2.5"/>
  <text x="830" y="253" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.5">MX binary step</text>

  <!-- Y-axis label (analog) -->
  <text x="668" y="252" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="end" opacity="0.7">voltage</text>
  <text x="668" y="355" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.5">rest</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
