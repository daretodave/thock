<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Where a switch film sits in the housing seam — and the wobble gap it closes</title>

  <!-- Title -->
  <text x="600" y="100" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">a 0.13mm shim between top and bottom housing</text>

  <!-- Cross-section view of a switch -->
  <!-- Top housing -->
  <path d="M 460 180 L 740 180 L 740 240 L 760 270 L 440 270 L 460 240 Z" stroke-opacity="0.85"/>
  <!-- Film band - emphasized -->
  <rect x="440" y="270" width="320" height="8" fill="oklch(0.78 0.10 80 / 0.45)" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="2.5"/>
  <!-- Bottom housing -->
  <path d="M 440 278 L 760 278 L 760 380 L 440 380 Z" stroke-opacity="0.85"/>

  <!-- Stem inside -->
  <line x1="580" y1="195" x2="580" y2="370" stroke-opacity="0.5"/>
  <line x1="620" y1="195" x2="620" y2="370" stroke-opacity="0.5"/>

  <!-- Pins below -->
  <line x1="490" y1="380" x2="490" y2="410" stroke-opacity="0.55"/>
  <line x1="710" y1="380" x2="710" y2="410" stroke-opacity="0.55"/>

  <!-- Wobble arrows on the top housing -->
  <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.5" stroke-width="2" stroke-dasharray="3 3">
    <path d="M 410 210 L 380 210"/>
    <path d="M 790 210 L 820 210"/>
  </g>
  <text x="370" y="214" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.62 0.13 25)" stroke="none" text-anchor="end" opacity="0.65">housing wobble — closed by film</text>

  <!-- Film callout -->
  <g stroke-opacity="0.55">
    <line x1="760" y1="274" x2="900" y2="274"/>
  </g>
  <text x="910" y="270" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.10 80)" stroke="none" opacity="0.95">switch film</text>
  <text x="910" y="290" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.65">POM 0.13mm · or PORON</text>

  <!-- Top housing callout -->
  <g stroke-opacity="0.55">
    <line x1="440" y1="220" x2="280" y2="180"/>
  </g>
  <text x="270" y="178" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.85">top housing</text>

  <!-- Bottom housing callout -->
  <g stroke-opacity="0.55">
    <line x1="440" y1="330" x2="280" y2="370"/>
  </g>
  <text x="270" y="374" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.85">bottom housing</text>

  <!-- Bottom strip: what films do/don't -->
  <text x="600" y="450" font-family="Newsreader, serif" font-size="14" font-style="italic" fill="oklch(0.78 0.10 80)" stroke="none" text-anchor="middle" opacity="0.95">closes the seam · reduces wobble · changes nothing about the spring</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
