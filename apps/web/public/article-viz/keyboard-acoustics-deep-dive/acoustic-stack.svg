<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" fill="none">
  <defs>
    <style>
      text { font-family: 'IBM Plex Sans', sans-serif; }
      .label-serif { font-family: 'Newsreader', serif; font-style: italic; }
      .label-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
  </defs>

  <!-- Background warm paper -->
  <rect width="1200" height="560" fill="oklch(0.97 0.008 80)" />

  <!-- Theme dot upper right -->
  <circle cx="1162" cy="38" r="9" fill="oklch(0.80 0.135 75)" />

  <!-- Layers: each is a horizontal band in the center column -->
  <!-- Total column: x=220 to x=780, width=560 -->

  <!-- Layer 1: Keycap -->
  <rect x="220" y="50" width="560" height="54" rx="4" fill="oklch(0.92 0.010 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2"/>
  <text x="500" y="83" text-anchor="middle" font-size="15" fill="oklch(0.35 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">Keycap</text>

  <!-- Layer 2: Switch housing -->
  <rect x="220" y="118" width="560" height="66" rx="4" fill="oklch(0.88 0.012 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2"/>
  <text x="500" y="155" text-anchor="middle" font-size="15" fill="oklch(0.35 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">Switch housing + stem</text>

  <!-- Layer 3: Plate — ochre focal wash -->
  <rect x="220" y="198" width="560" height="56" rx="4" fill="oklch(0.88 0.065 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2.5"/>
  <text x="500" y="231" text-anchor="middle" font-size="15" fill="oklch(0.30 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="700">Plate</text>

  <!-- Layer 4: PCB -->
  <rect x="220" y="268" width="560" height="52" rx="4" fill="oklch(0.88 0.012 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2"/>
  <text x="500" y="299" text-anchor="middle" font-size="15" fill="oklch(0.35 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">PCB</text>

  <!-- Layer 5: Mount / gasket interface -->
  <rect x="220" y="334" width="560" height="52" rx="4" fill="oklch(0.84 0.018 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="500" y="365" text-anchor="middle" font-size="15" fill="oklch(0.35 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">Mount interface (gasket / standoffs)</text>

  <!-- Layer 6: Case -->
  <rect x="220" y="400" width="560" height="56" rx="4" fill="oklch(0.80 0.015 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2"/>
  <text x="500" y="433" text-anchor="middle" font-size="15" fill="oklch(0.35 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">Case (cavity + walls)</text>

  <!-- Layer 7: Desk surface -->
  <rect x="220" y="470" width="560" height="52" rx="4" fill="oklch(0.74 0.018 80)" stroke="oklch(0.78 0.005 90)" stroke-width="2"/>
  <text x="500" y="502" text-anchor="middle" font-size="15" fill="oklch(0.28 0.005 90)" font-family="IBM Plex Sans, sans-serif" font-weight="600">Desk surface</text>

  <!-- Right margin annotations -->
  <line x1="786" y1="77" x2="826" y2="77" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="81" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">mass + profile</text>

  <line x1="786" y1="152" x2="826" y2="152" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="156" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">resonant chamber</text>

  <!-- Plate annotation — ochre -->
  <line x1="786" y1="226" x2="826" y2="226" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <text x="832" y="230" font-size="12" fill="oklch(0.45 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="600">transmission medium</text>

  <line x1="786" y1="295" x2="826" y2="295" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="299" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">energy bridge</text>

  <line x1="786" y1="360" x2="826" y2="360" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="364" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">decoupling layer</text>

  <line x1="786" y1="428" x2="826" y2="428" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="432" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">cavity coloration</text>

  <line x1="786" y1="497" x2="826" y2="497" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="832" y="501" font-size="12" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">final absorber</text>

  <!-- Left margin: downward energy arrow -->
  <line x1="190" y1="60" x2="190" y2="500" stroke="oklch(0.78 0.10 80)" stroke-width="2" stroke-dasharray="5 4"/>
  <polygon points="190,510 184,494 196,494" fill="oklch(0.78 0.10 80)"/>
  <text x="176" y="290" font-size="11" fill="oklch(0.50 0.010 80)" font-family="IBM Plex Sans, sans-serif" transform="rotate(-90 176 290)" text-anchor="middle">energy flow</text>

  <!-- Title -->
  <text x="500" y="26" text-anchor="middle" font-size="13" fill="oklch(0.50 0.005 90)" font-family="IBM Plex Sans, sans-serif" letter-spacing="0.08em" text-transform="uppercase">THE ACOUSTIC STACK</text>
</svg>
