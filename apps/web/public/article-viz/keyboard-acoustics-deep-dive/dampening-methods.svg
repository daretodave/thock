<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <style>
      text { font-family: 'IBM Plex Sans', sans-serif; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="oklch(0.97 0.008 80)" />

  <!-- Theme dot -->
  <circle cx="1162" cy="36" r="9" fill="oklch(0.80 0.135 75)" />

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-size="13" fill="oklch(0.50 0.005 90)" font-family="IBM Plex Sans, sans-serif" letter-spacing="0.08em">DAMPENING METHODS — WHAT EACH TARGETS</text>

  <!-- Four panels: each ~270px wide with 10px gaps, starting x=30 -->
  <!-- Panel width: (1200 - 60 - 30) / 4 = 277.5, use 275 with 10px gaps -->
  <!-- Panel 1: PE Foam, x=30 -->
  <rect x="30" y="50" width="268" height="320" rx="5" fill="oklch(0.92 0.010 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>

  <!-- PE foam cross-section sketch -->
  <!-- Case bottom -->
  <rect x="60" y="290" width="208" height="22" rx="2" fill="oklch(0.75 0.010 80)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <!-- PE foam layer (ochre) -->
  <rect x="60" y="264" width="208" height="22" rx="2" fill="oklch(0.85 0.080 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>
  <text x="164" y="279" text-anchor="middle" font-size="10" fill="oklch(0.35 0.010 80)" font-family="JetBrains Mono, monospace">PE foam</text>
  <!-- PCB -->
  <rect x="60" y="240" width="208" height="20" rx="2" fill="oklch(0.80 0.012 140)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="164" y="254" text-anchor="middle" font-size="10" fill="oklch(0.30 0.005 90)" font-family="IBM Plex Sans, sans-serif">PCB</text>

  <text x="164" y="88" text-anchor="middle" font-size="16" fill="oklch(0.35 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="700">PE foam</text>
  <line x1="60" y1="100" x2="238" y2="100" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <text x="164" y="130" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">targets case cavity</text>
  <text x="164" y="148" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">resonance</text>
  <text x="164" y="170" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">fills the hollow air gap</text>
  <text x="164" y="186" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">below the PCB</text>

  <!-- Frequency sketch: low emphasis -->
  <path d="M 70 225 Q 100 205 130 220 Q 160 235 190 215 Q 210 208 228 218" stroke="oklch(0.78 0.10 80)" stroke-width="1.5" fill="none"/>
  <text x="164" y="238" text-anchor="middle" font-size="9" fill="oklch(0.55 0.010 80)" font-family="IBM Plex Sans, sans-serif">damps low-mid resonance</text>

  <!-- Panel 2: Tape mod, x=308 -->
  <rect x="308" y="50" width="268" height="320" rx="5" fill="oklch(0.92 0.010 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>

  <!-- PCB with tape strips sketch -->
  <rect x="338" y="240" width="208" height="52" rx="2" fill="oklch(0.80 0.012 140)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <!-- Tape strips (ochre) -->
  <rect x="338" y="246" width="208" height="8" rx="1" fill="oklch(0.85 0.080 80)" stroke="none"/>
  <rect x="338" y="262" width="208" height="8" rx="1" fill="oklch(0.85 0.080 80)" stroke="none"/>
  <rect x="338" y="278" width="208" height="8" rx="1" fill="oklch(0.85 0.080 80)" stroke="none"/>
  <text x="442" y="305" text-anchor="middle" font-size="10" fill="oklch(0.30 0.005 90)" font-family="IBM Plex Sans, sans-serif">PCB back face + tape strips</text>

  <text x="442" y="88" text-anchor="middle" font-size="16" fill="oklch(0.35 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="700">tape mod</text>
  <line x1="338" y1="100" x2="516" y2="100" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <text x="442" y="130" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">targets PCB surface</text>
  <text x="442" y="148" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">resonance</text>
  <text x="442" y="170" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">adds mass and absorption</text>
  <text x="442" y="186" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">at the PCB back face</text>

  <path d="M 348 225 Q 372 212 400 222 Q 428 232 456 218 Q 476 210 516 222" stroke="oklch(0.78 0.10 80)" stroke-width="1.5" fill="none"/>
  <text x="442" y="238" text-anchor="middle" font-size="9" fill="oklch(0.55 0.010 80)" font-family="IBM Plex Sans, sans-serif">damps PCB ring</text>

  <!-- Panel 3: O-ring mod, x=586 -->
  <rect x="586" y="50" width="268" height="320" rx="5" fill="oklch(0.92 0.010 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>

  <!-- Standoff + O-ring cross-section sketch -->
  <!-- Case base -->
  <rect x="616" y="330" width="208" height="20" rx="2" fill="oklch(0.75 0.010 80)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <!-- Standoff post -->
  <rect x="690" y="280" width="24" height="50" rx="2" fill="oklch(0.68 0.010 80)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <!-- O-ring (ochre) -->
  <ellipse cx="702" cy="276" rx="18" ry="7" fill="oklch(0.82 0.090 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>
  <!-- PCB -->
  <rect x="616" y="250" width="208" height="20" rx="2" fill="oklch(0.80 0.012 140)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="720" y="306" text-anchor="middle" font-size="9" fill="oklch(0.45 0.005 90)" font-family="IBM Plex Sans, sans-serif">standoff + O-ring</text>
  <text x="720" y="244" text-anchor="middle" font-size="9" fill="oklch(0.30 0.005 90)" font-family="IBM Plex Sans, sans-serif">PCB</text>

  <text x="720" y="88" text-anchor="middle" font-size="16" fill="oklch(0.35 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="700">o-ring mod</text>
  <line x1="616" y1="100" x2="824" y2="100" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <text x="720" y="130" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">targets standoff impact</text>
  <text x="720" y="148" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">transmission</text>
  <text x="720" y="170" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">cushions rigid PCB-to-</text>
  <text x="720" y="186" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">standoff contact</text>

  <path d="M 626 225 Q 660 208 690 222 Q 715 232 745 214 Q 770 204 822 220" stroke="oklch(0.78 0.10 80)" stroke-width="1.5" fill="none"/>
  <text x="720" y="238" text-anchor="middle" font-size="9" fill="oklch(0.55 0.010 80)" font-family="IBM Plex Sans, sans-serif">softens metallic impact spike</text>

  <!-- Panel 4: Silicone pour, x=864 -->
  <rect x="864" y="50" width="268" height="320" rx="5" fill="oklch(0.92 0.010 80)" stroke="oklch(0.78 0.10 80)" stroke-width="2"/>

  <!-- Case with filled cavity sketch -->
  <rect x="894" y="240" width="208" height="88" rx="2" fill="oklch(0.75 0.010 80)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <!-- Silicone fill (ochre) -->
  <rect x="900" y="246" width="196" height="68" rx="2" fill="oklch(0.82 0.085 80)" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <!-- PCB sitting on top -->
  <rect x="894" y="222" width="208" height="16" rx="2" fill="oklch(0.80 0.012 140)" stroke="oklch(0.78 0.005 90)" stroke-width="1.5"/>
  <text x="998" y="282" text-anchor="middle" font-size="10" fill="oklch(0.35 0.010 80)" font-family="JetBrains Mono, monospace">silicone fill</text>
  <text x="998" y="216" text-anchor="middle" font-size="9" fill="oklch(0.30 0.005 90)" font-family="IBM Plex Sans, sans-serif">PCB</text>

  <text x="998" y="88" text-anchor="middle" font-size="16" fill="oklch(0.35 0.010 80)" font-family="IBM Plex Sans, sans-serif" font-weight="700">silicone pour</text>
  <line x1="894" y1="100" x2="1102" y2="100" stroke="oklch(0.78 0.10 80)" stroke-width="1.5"/>
  <text x="998" y="130" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">eliminates cavity</text>
  <text x="998" y="148" text-anchor="middle" font-size="12" fill="oklch(0.40 0.005 90)" font-family="IBM Plex Sans, sans-serif">resonance entirely</text>
  <text x="998" y="170" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">fills the resonant volume</text>
  <text x="998" y="186" text-anchor="middle" font-size="11" fill="oklch(0.55 0.005 90)" font-family="IBM Plex Sans, sans-serif">permanently (irreversible)</text>

  <path d="M 904 225 Q 934 196 970 214 Q 1000 228 1030 205 Q 1055 192 1100 210" stroke="oklch(0.78 0.10 80)" stroke-width="1.5" fill="none"/>
  <text x="998" y="238" text-anchor="middle" font-size="9" fill="oklch(0.55 0.010 80)" font-family="IBM Plex Sans, sans-serif">broadband resonance removal</text>
</svg>
