<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The mid-tier price band HMX defended — $0.20 utility, $0.45–0.55 HMX, $1.00+ enthusiast</title>

  <!-- Y-axis price -->
  <line x1="180" y1="80" x2="180" y2="430" stroke-opacity="0.6"/>
  <g stroke-opacity="0.45">
    <line x1="172" y1="110" x2="188" y2="110"/>
    <line x1="172" y1="180" x2="188" y2="180"/>
    <line x1="172" y1="250" x2="188" y2="250"/>
    <line x1="172" y1="320" x2="188" y2="320"/>
    <line x1="172" y1="390" x2="188" y2="390"/>
  </g>
  <text x="160" y="116" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="end">$1.00+</text>
  <text x="160" y="186" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="end">$0.75</text>
  <text x="160" y="256" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="end">$0.50</text>
  <text x="160" y="326" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="end">$0.25</text>
  <text x="160" y="396" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="end">$0.00</text>

  <!-- Three tier bands -->
  <!-- Utility band: $0.00 - $0.25 -->
  <rect x="240" y="320" width="120" height="70" stroke-opacity="0.55" stroke-dasharray="6 6"/>
  <text x="300" y="410" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">utility</text>
  <text x="300" y="428" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Akko CS · Outemu V3</text>

  <!-- HMX band: $0.45 - $0.55 — BRONZE EMPHASIZED -->
  <rect x="500" y="236" width="180" height="42" fill="oklch(0.80 0.135 75 / 0.18)" stroke="oklch(0.80 0.135 75)" stroke-width="3" stroke-opacity="0.9"/>
  <text x="590" y="232" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.80 0.135 75)" stroke="none" text-anchor="middle" font-weight="500">$0.45 – $0.55</text>
  <text x="590" y="298" font-family="Newsreader, serif" font-size="22" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">HMX</text>
  <text x="590" y="320" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">Cloud · Hyacinth · Macchiato</text>

  <!-- Enthusiast band: $1.00+ -->
  <rect x="820" y="80" width="180" height="40" stroke-opacity="0.55" stroke-dasharray="6 6"/>
  <text x="910" y="140" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">enthusiast</text>
  <text x="910" y="158" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Tecsee · Geon · small-batch</text>

  <!-- Prebuilt anchor on the HMX band -->
  <g stroke-opacity="0.4">
    <line x1="700" y1="257" x2="780" y2="257"/>
    <path d="M 772 251 L 780 257 L 772 263"/>
  </g>
  <text x="790" y="252" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.85">absorbs into</text>
  <text x="790" y="269" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.85">$130 BOM</text>

  <!-- Hatching connectors between tiers -->
  <g stroke-opacity="0.25" stroke-dasharray="2 4">
    <line x1="360" y1="320" x2="500" y2="278"/>
    <line x1="680" y1="236" x2="820" y2="120"/>
  </g>

  <line x1="180" y1="430" x2="1080" y2="430" stroke-opacity="0.6"/>

  <!-- Axis label -->
  <text x="100" y="255" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" opacity="0.7" text-anchor="middle" transform="rotate(-90 100 255)">per-switch price</text>

  <!-- Caption strip below -->
  <text x="630" y="490" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.85">a 25-cent band — wide enough to ship a coherent catalog, narrow enough not to chase the slots above or below</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
