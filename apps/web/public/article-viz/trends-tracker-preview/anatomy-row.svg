<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Anatomy of a Trends Tracker row — five columns: name, category, direction, week score, and sparkline</title>

  <!-- Column headers -->
  <text x="170" y="120" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">NAME</text>
  <text x="430" y="120" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">CATEGORY</text>
  <text x="620" y="120" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">DIRECTION</text>
  <text x="800" y="120" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">WEEK SCORE</text>
  <text x="1010" y="120" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">SPARKLINE</text>

  <!-- Example row -->
  <line x1="80" y1="160" x2="1120" y2="160" stroke-opacity="0.25"/>
  <line x1="80" y1="240" x2="1120" y2="240" stroke-opacity="0.25"/>

  <!-- Name -->
  <text x="170" y="208" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">Gateron Oil King</text>

  <!-- Category chip -->
  <rect x="380" y="188" width="100" height="28" rx="14" fill="oklch(0.68 0.165 28 / 0.18)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2"/>
  <text x="430" y="207" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">switch</text>

  <!-- Direction up glyph -->
  <g stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="3">
    <path d="M 600 215 L 620 195 L 640 215"/>
    <line x1="620" y1="195" x2="620" y2="220"/>
  </g>

  <!-- Score -->
  <text x="800" y="215" font-family="Newsreader, serif" font-size="36" font-style="italic" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">+42</text>

  <!-- Sparkline -->
  <g>
    <path d="M 920 220 L 940 215 L 960 205 L 980 195 L 1000 188 L 1020 178 L 1040 175 L 1060 168" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95" stroke-width="2.5"/>
    <circle cx="1060" cy="168" r="5" fill="oklch(0.68 0.165 28)" stroke="oklch(0.68 0.165 28)" stroke-opacity="0.95"/>
  </g>

  <!-- Annotation arrows + descriptions below -->
  <g stroke-opacity="0.45" stroke-dasharray="3 4">
    <line x1="170" y1="245" x2="170" y2="290"/>
    <line x1="430" y1="245" x2="430" y2="290"/>
    <line x1="620" y1="245" x2="620" y2="290"/>
    <line x1="800" y1="245" x2="800" y2="290"/>
    <line x1="1000" y1="245" x2="1000" y2="290"/>
  </g>

  <text x="170" y="310" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">the community spelling</text>
  <text x="430" y="310" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">one of five buckets</text>
  <text x="620" y="310" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">the headline glyph</text>
  <text x="800" y="310" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">-100 to +100</text>
  <text x="1000" y="310" font-family="IBM Plex Sans, sans-serif" font-size="12" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.7">last 8 weeks</text>

  <text x="170" y="328" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">not "G Pro 3.0 v2"</text>
  <text x="430" y="328" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">color-matched chip</text>
  <text x="620" y="328" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">up · flat · down</text>
  <text x="800" y="328" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">vs 4-week baseline</text>
  <text x="1000" y="328" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.5">trend or anomaly?</text>

  <!-- Section header -->
  <text x="600" y="80" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">how to read a row · live W19 example</text>

  <!-- Footer -->
  <text x="600" y="430" font-family="IBM Plex Sans, sans-serif" font-size="14" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.75">the glyph is the headline; the score is the detail; the sparkline is the context</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
