<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>What the Trends Tracker is and is not — a weekly attention read, not a buying ranking, popularity contest, or stock chart</title>

  <!-- Three "is not" cards (struck through) -->
  <g>
    <rect x="80" y="140" width="280" height="160" rx="10" stroke-opacity="0.45" stroke-dasharray="6 5"/>
    <text x="220" y="180" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">a buying ranking</text>
    <text x="220" y="220" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">+42 is not a recommendation</text>
    <text x="220" y="240" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">-18 is not a warning</text>
    <!-- big X across -->
    <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round">
      <line x1="120" y1="170" x2="320" y2="270"/>
      <line x1="120" y1="270" x2="320" y2="170"/>
    </g>
  </g>

  <g>
    <rect x="460" y="140" width="280" height="160" rx="10" stroke-opacity="0.45" stroke-dasharray="6 5"/>
    <text x="600" y="180" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">a popularity contest</text>
    <text x="600" y="220" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">normalized against</text>
    <text x="600" y="240" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">each row's own baseline</text>
    <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round">
      <line x1="500" y1="170" x2="700" y2="270"/>
      <line x1="500" y1="270" x2="700" y2="170"/>
    </g>
  </g>

  <g>
    <rect x="840" y="140" width="280" height="160" rx="10" stroke-opacity="0.45" stroke-dasharray="6 5"/>
    <text x="980" y="180" font-family="Newsreader, serif" font-size="18" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.65">a stock chart</text>
    <text x="980" y="220" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">prices are not the input</text>
    <text x="980" y="240" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">sparklines are not signals</text>
    <g stroke="oklch(0.62 0.13 25)" stroke-opacity="0.75" stroke-width="3" stroke-linecap="round">
      <line x1="880" y1="170" x2="1080" y2="270"/>
      <line x1="880" y1="270" x2="1080" y2="170"/>
    </g>
  </g>

  <!-- Section header -->
  <text x="600" y="90" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">it is not</text>

  <!-- Affirmative below -->
  <text x="600" y="370" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.68 0.165 28)" stroke="none" text-anchor="middle" opacity="0.95">it is</text>
  <text x="600" y="405" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">a weekly read of where the hobby is paying attention</text>
  <text x="600" y="430" font-family="IBM Plex Sans, sans-serif" font-size="13" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">with enough structure to be argued with</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
