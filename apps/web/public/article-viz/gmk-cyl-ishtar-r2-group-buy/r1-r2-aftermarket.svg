<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>The Ishtar price curve — R1 MSRP at open, aftermarket premium curve, R2 returning to MSRP, with the post-Q4-fulfillment compression question</title>

  <!-- Y-axis -->
  <line x1="120" y1="100" x2="120" y2="430" stroke-opacity="0.5"/>
  <line x1="120" y1="430" x2="1080" y2="430" stroke-opacity="0.55"/>

  <!-- Price tier labels -->
  <line x1="120" y1="350" x2="1080" y2="350" stroke-opacity="0.18" stroke-dasharray="4 6"/>
  <text x="110" y="354" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">MSRP</text>

  <line x1="120" y1="220" x2="1080" y2="220" stroke-opacity="0.18" stroke-dasharray="4 6"/>
  <text x="110" y="224" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="end" opacity="0.55">2× MSRP</text>

  <!-- R1 open -->
  <circle cx="200" cy="350" r="9" fill="oklch(0.55 0.13 270 / 0.25)" stroke="oklch(0.55 0.13 270)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="200" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.55 0.13 270)" stroke="none" text-anchor="middle" opacity="0.95">R1 close</text>

  <!-- Aftermarket curve climbing past R1 -->
  <path d="M 200 350 C 280 320 360 260 480 220 C 600 200 680 200 740 230" stroke="oklch(0.55 0.13 270)" stroke-opacity="0.8" stroke-width="2.5" stroke-dasharray="6 5"/>
  <text x="450" y="200" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.55 0.13 270)" stroke="none" text-anchor="middle" opacity="0.85">aftermarket premium · 2× and rising</text>

  <!-- R2 open / close -->
  <circle cx="740" cy="350" r="9" fill="oklch(0.55 0.13 270 / 0.25)" stroke="oklch(0.55 0.13 270)" stroke-opacity="0.95" stroke-width="3"/>
  <text x="740" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.55 0.13 270)" stroke="none" text-anchor="middle" opacity="0.95">R2 close</text>
  <text x="740" y="375" font-family="IBM Plex Sans, sans-serif" font-size="10" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.6">2026-05-10</text>

  <!-- Drop down arrow from aftermarket -->
  <g stroke="oklch(0.55 0.13 270)" stroke-opacity="0.95" stroke-width="3">
    <path d="M 740 220 L 740 340"/>
    <path d="M 732 332 L 740 340 L 748 332"/>
  </g>
  <text x="760" y="290" font-family="Newsreader, serif" font-size="13" font-style="italic" fill="oklch(0.55 0.13 270)" stroke="none" opacity="0.95">R2 returns to MSRP</text>

  <!-- Fulfillment + compression question -->
  <circle cx="980" cy="350" r="8" fill="none" stroke="oklch(0.55 0.13 270)" stroke-opacity="0.7" stroke-width="2" stroke-dasharray="3 3"/>
  <text x="980" y="335" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.55 0.13 270)" stroke="none" text-anchor="middle" opacity="0.85">Q4 2026 · fulfillment</text>

  <!-- compression question annotation -->
  <text x="980" y="395" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">does R1 premium compress?</text>

  <!-- X-axis time labels -->
  <text x="200" y="455" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">~2024</text>
  <text x="740" y="455" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">2026-05-10</text>
  <text x="980" y="455" font-family="IBM Plex Sans, sans-serif" font-size="11" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle" opacity="0.55">Q4 2026 +</text>

  <!-- Title -->
  <text x="600" y="80" font-family="Newsreader, serif" font-size="20" font-style="italic" fill="oklch(0.78 0.005 90)" stroke="none" text-anchor="middle">second-and-likely-last chance at MSRP</text>

  <!-- Brass theme dot -->
  <circle cx="1170" cy="42" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
