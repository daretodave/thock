<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" preserveAspectRatio="xMidYMid meet" fill="none" stroke="oklch(0.78 0.005 90)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title>Do and don't map for a first split or ergonomic keyboard purchase — three recommended moves marked with amber checkmarks and three common pitfalls marked with warm-red x marks</title>

  <!-- Column headers -->
  <text x="60" y="55" font-family="IBM Plex Sans, sans-serif" font-size="20" fill="oklch(0.78 0.10 80)" stroke="none" font-weight="700" letter-spacing="0.04em">DO</text>
  <line x1="60" y1="66" x2="200" y2="66" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.6" stroke-width="1.5"/>

  <text x="640" y="55" font-family="IBM Plex Sans, sans-serif" font-size="20" fill="oklch(0.62 0.13 25)" stroke="none" font-weight="700" letter-spacing="0.04em">DON'T</text>
  <line x1="640" y1="66" x2="800" y2="66" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- Vertical divider -->
  <line x1="600" y1="40" x2="600" y2="390" stroke-opacity="0.2" stroke-dasharray="4 6"/>

  <!-- DO row 1 -->
  <circle cx="80" cy="130" r="16" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85"/>
  <path d="M 72 130 L 78 137 L 90 122" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="115" y="126" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Change one axis at a time</text>

  <!-- DO row 2 -->
  <circle cx="80" cy="230" r="16" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85"/>
  <path d="M 72 230 L 78 237 L 90 222" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="115" y="222" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Keep the old board as</text>
  <text x="115" y="242" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">a fallback</text>

  <!-- DO row 3 -->
  <circle cx="80" cy="330" r="16" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.85"/>
  <path d="M 72 330 L 78 337 L 90 322" stroke="oklch(0.78 0.10 80)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="115" y="322" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Commit to the firmware</text>
  <text x="115" y="342" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">before the layout</text>

  <!-- DON'T row 1 -->
  <circle cx="660" cy="130" r="16" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.85"/>
  <line x1="652" y1="122" x2="668" y2="138" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <line x1="668" y1="122" x2="652" y2="138" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="695" y="118" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Buy split, column-stagger,</text>
  <text x="695" y="138" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">ortho, and tenting all</text>
  <text x="695" y="158" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">at once as a first board</text>

  <!-- DON'T row 2 -->
  <circle cx="660" cy="245" r="16" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.85"/>
  <line x1="652" y1="237" x2="668" y2="253" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <line x1="668" y1="237" x2="652" y2="253" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="695" y="241" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Sell the old board</text>
  <text x="695" y="261" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">the same week</text>

  <!-- DON'T row 3 -->
  <circle cx="660" cy="345" r="16" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.85"/>
  <line x1="652" y1="337" x2="668" y2="353" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <line x1="668" y1="337" x2="652" y2="353" stroke="oklch(0.62 0.13 25)" stroke-opacity="0.95" stroke-width="2.5"/>
  <text x="695" y="351" font-family="IBM Plex Sans, sans-serif" font-size="15" fill="oklch(0.78 0.005 90)" stroke="none">Judge week one</text>

  <!-- Brass-bronze theme dot -->
  <circle cx="1170" cy="30" r="3" fill="oklch(0.80 0.135 75)" stroke="oklch(0.80 0.135 75)"/>
</svg>
