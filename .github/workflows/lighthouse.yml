name: lighthouse

# Lighthouse CI on every Vercel preview deploy.
#
# Trigger: GitHub's `deployment_status` event, fired when Vercel
# reports a deployment outcome. thock is trunk-based — the march
# loop commits straight to `main`, which Vercel deploys as
# Production; there are no PRs, so no Preview deploys ever exist.
# We therefore filter to success + Production (filtering to Preview
# meant this workflow skipped 100% of runs and never once
# executed — fixed 2026-05-17). Vercel's dashboard shows Speed
# Insights, not Lighthouse-CI assertion gating against
# .lighthouserc.json, so running here on Production is real signal,
# not a double-count.
#
# Asserts: see .lighthouserc.json — a11y / best-practices / SEO are
# hard errors at ≥95; performance is a warn at ≥90 because mobile-
# network simulation has a wide single-run variance. numberOfRuns:3
# absorbs that noise via median-of-3.
#
# Output: temporary public-storage link + a job artifact, both
# discoverable from the Actions run page. No PR comment yet — add
# one in a follow-up iterate if the run page is too friction.
#
# Closes #84 #85.

on:
  deployment_status:

permissions:
  contents: read

concurrency:
  # One lighthouse run per ref. A new push supersedes any in-flight
  # run on the same branch — lighthouse against an older preview is
  # wasted signal.
  group: lighthouse-${{ github.event.deployment.environment }}-${{ github.event.deployment.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    # Vercel emits `deployment_status` with state in {in_progress,
    # success, error, failure}. We act only on `success` for the
    # Production environment — thock has no Preview deploys (trunk-
    # based loop), so Production is the only deploy that exists and
    # the only place these assertions can run.
    if: >
      github.event.deployment_status.state == 'success' &&
      github.event.deployment.environment == 'Production'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (so the action can read .lighthouserc.json)
        uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Walk a small, intentional set: home (typical reader
          # entry), a deep-dive article (canonical article shape +
          # InlineViz figures), the data-heavy trends tracker, and
          # the visual-heavy group-buys index. Keep this list short
          # — each URL × numberOfRuns adds runtime; the median-of-3
          # noise floor matters more than coverage breadth here.
          #
          # Audit the public canonical alias (siteConfig.siteUrl), not
          # the per-deployment Vercel hostname. The deployment URL is
          # gated by Vercel Deployment Protection (Authentication/SSO)
          # so target_url 307-redirects to vercel.com/login — Lighthouse
          # then audits the login page, which trips ~21 assertions and
          # produces zero signal about thock. The Production trigger
          # above still gates the run on a successful Vercel deploy of
          # the commit; only the audited URL changes. (Fixed 2026-05-23
          # — see plan/AUDIT.md #190.)
          urls: |
            https://thock.xyz/
            https://thock.xyz/article/gateron-oil-king-deep-dive
            https://thock.xyz/trends/tracker
            https://thock.xyz/group-buys
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./.lighthouserc.json
