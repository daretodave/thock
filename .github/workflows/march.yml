name: march

# Cloud half of the thock autonomous loop. One scheduled invocation =
# one /march tick. State of truth is the repo on origin/main; every
# tick reads it fresh, no memory between runs.
#
# See .github/CLOUD_LOOP.md for setup, debugging, and the upgrade path.

on:
  schedule:
    # Hourly, 24/7. Bumped 2026-05-11 from "every 2h off-peak ET"
    # (~7 ticks/day) to hourly (~24 ticks/day max) after the cloud
    # loop went genuinely operational. Bounded downstream by:
    #   - the daily commit ceiling (12 cloud-shipped commits / 24h
    #     — see "Daily commit ceiling check" step below). Past that
    #     point every tick exits cleanly with no work.
    #   - the concurrency group `march` (a long-running tick blocks
    #     the next firing instead of racing it).
    #   - the 5h timeout per tick.
    # Net: up to ~12 commits/day in the worst case, with no-op ticks
    # absorbing the remaining ~12 slots when nothing's queued.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  # Serialize ticks. A long-running tick blocks the next scheduled
  # firing rather than racing the working tree. Acceptable.
  group: march
  cancel-in-progress: false

jobs:
  march:
    runs-on: ubuntu-latest
    # 6h is the GH-Actions hard limit; 5h leaves headroom. Most ticks
    # finish in under 15min; the long tail is /ship-a-phase doing a
    # full prerendered build.
    timeout-minutes: 300
    permissions:
      contents: write   # push back to main
      issues: write     # /triage labels + cloud-failed issue
      id-token: write   # Claude Code Action's OIDC handshake
    steps:
      - name: Checkout (full history for /march dispatch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT (not GITHUB_TOKEN) so git push commits as you, not as
          # github-actions[bot]. Token needs contents:write + issues:write.
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('apps/e2e/package.json', 'pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers (chromium only)
        # @playwright/test is only installed under apps/e2e in the
        # workspace, so `pnpm exec playwright` from root can't find
        # it. Run the e2e package's own install script instead.
        run: pnpm --filter "@thock/e2e" e2e:install

      - name: Daily commit ceiling check
        id: ceiling
        run: |
          # Cloud commits are identified by the `Cloud-Run:` trailer
          # the agent appends to every commit message (the brief
          # mandates it). Author is daretodave on both cloud AND
          # local commits, so we distinguish via trailer instead of
          # author. The ceiling bounds *cloud-shipped volume* in 24h;
          # your local commits don't count.
          since="$(date -u -d '24 hours ago' '+%Y-%m-%d %H:%M:%S')"
          count=$(git log --since="$since" --grep='Cloud-Run:' --oneline | wc -l | tr -d ' ')
          echo "Cloud-shipped commits in last 24h: $count"
          if [ "$count" -ge 12 ]; then
            echo "Cloud ceiling reached (12 cloud-shipped commits / 24h). Exiting cleanly — no work this tick."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # Git author identity is set via env vars on the action step
      # below, NOT via `git config` in a separate workflow step. The
      # action runs its own internal `git config user.name "claude[bot]"`
      # AFTER any preceding workflow step (see input `bot_name` default
      # in v1 action.yml), which overrides repo-local config silently.
      # The only reliable override is the GIT_AUTHOR_* / GIT_COMMITTER_*
      # env-var path — git checks env vars first when reading author
      # identity at `git commit` time, before falling back to config.

      - name: Run /march (cloud mode)
        id: claude_run
        if: steps.ceiling.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Sonnet 4.6 for the cloud loop. To upgrade to Opus 4.7,
          # change the model below to "claude-opus-4-7" once you've
          # measured a week of weekly-cap consumption and have
          # confirmed headroom.
          #
          # --dangerously-skip-permissions mirrors the user's local
          # invocation. The runner is an ephemeral GitHub-hosted
          # ubuntu container — its blast radius is bounded by the
          # ACTIONS_PAT (thock-only, contents+issues write) and the
          # VERCEL_TOKEN (deploy-scoped). The container itself dies
          # at job end. Permission_denials_count was running at
          # 30–40 per tick under the default (deny-by-default in
          # scheduled mode), wasting turns on tool calls the agent
          # would otherwise use productively — WebFetch for scout
          # research, broader Bash forms for ops scripts, etc.
          claude_args: |
            --model claude-sonnet-4-6
            --dangerously-skip-permissions
          prompt: |
            You are running thock's autonomous loop in CI (GitHub Actions).
            Read agents.md first for the standing rules — they all apply.

            Cloud-mode adjustments on top of agents.md:

            1. Skip /oversight entirely. It is interactive and never runs in cloud.
            2. Skip /critique. The reader sub-agent depends on a Chrome MCP that is not available on the runner. /critique stays a local-only ritual.
            3. /expand may run; candidates land in plan/PHASE_CANDIDATES.md. Promotion happens only via local /oversight — do not promote candidates from cloud.
            4. The verify gate (`pnpm verify`) and deploy gate (`pnpm deploy:check`) are non-negotiable. Same as local. NEVER --no-verify.
            5. Commit author is David Rehmat <me@dave.blue> via GIT_AUTHOR_* / GIT_COMMITTER_* env vars (already configured by the workflow). Do not run `git config user.*` to change it — the env vars take precedence anyway, but explicit overrides muddy the log.
            6. EVERY commit you ship in this tick MUST end with this exact trailer (a blank line before it, then the trailer as its own line):

                  Cloud-Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

               This is how the next tick's ceiling check distinguishes cloud-shipped commits from the user's local work — both have the same author. If a commit lacks this trailer it does not count toward the cloud ceiling, which would let the loop run away. Treat the trailer as non-negotiable, like the verify gate. agents.md's "no Co-Authored-By trailers, plain commit message bodies" rule has an explicit carve-out for this single trailer; nothing else.
            7. If the tick cannot ship cleanly (red verify, red deploy, blocked phase, no work to do, anything else), do NOT half-commit. Either:
               - exit cleanly with a one-line note in the action log explaining why no work shipped this tick, or
               - if there is a real failure to surface, open a GitHub issue with `gh issue create --title "Cloud march failed: <iso-date>" --body "<context + run URL>"` and exit. Do not pass `--label` — the issue lands unlabeled and the next scheduled tick's /triage classifies and labels it appropriately.

            The dispatch order is the standard /march order from skills/march.md: triage → critique (skipped) → ship-a-phase → ship-data → expand → iterate.

            Begin. One tick. One commit-and-push (or no-op). Then exit.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # ACTIONS_PAT (not GITHUB_TOKEN) so the agent's `gh` calls
          # and any direct git operations identify as you, not as
          # the bot.
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          # Git author identity. These four env vars take precedence
          # over any `git config user.*` value at `git commit` time,
          # including the action's own internal "Set git user as
          # claude[bot]" step. Without these, commits author as
          # claude[bot] (the action's default GitHub App identity);
          # with them, commits attribute to the human user the way
          # local commits do. Email matches the user's verified
          # GitHub address so the avatar resolves on github.com.
          GIT_AUTHOR_NAME:     "David Rehmat"
          GIT_AUTHOR_EMAIL:    "me@dave.blue"
          GIT_COMMITTER_NAME:  "David Rehmat"
          GIT_COMMITTER_EMAIL: "me@dave.blue"

      # Surface execution problems through the GitHub-issue address
      # loop the rest of the project uses, instead of accumulating
      # transcripts as artifacts on every tick. A clean tick (no
      # denials, no errors, action exit 0) leaves no artifact and no
      # issue. A problematic tick uploads the transcript and opens a
      # single issue linking to it. The next /triage tick classifies
      # the issue naturally.

      - name: Inspect execution for problem signals
        id: inspect
        if: always() && steps.ceiling.outputs.skip != 'true'
        run: |
          transcript="${{ steps.claude_run.outputs.execution_file }}"
          outcome="${{ steps.claude_run.outcome }}"
          reasons=""

          if [ -z "$transcript" ] || [ ! -f "$transcript" ]; then
            # Action crashed before producing a transcript (auth fail,
            # OOM, runner-side error). Still surface this — but there's
            # no transcript to attach.
            if [ "$outcome" = "failure" ]; then
              reasons="- action crashed before producing a transcript (no artifact available)"
              echo "has_issues=true"     >> "$GITHUB_OUTPUT"
              echo "has_transcript=false">> "$GITHUB_OUTPUT"
            else
              echo "has_issues=false"    >> "$GITHUB_OUTPUT"
              echo "has_transcript=false">> "$GITHUB_OUTPUT"
            fi
          else
            # Pull signals from the transcript's result block. The
            # action writes one entry with type=="result" at end-of-run.
            denials=$(jq    '[.[] | select(.type=="result") | .permission_denials_count // 0][0] // 0' "$transcript")
            is_error=$(jq   '[.[] | select(.type=="result") | .is_error // false][0] // false'        "$transcript")
            api_error=$(jq -r '[.[] | select(.type=="result") | .api_error_status // empty][0] // ""' "$transcript")

            if [ "$denials" != "0" ];      then reasons="${reasons}- permission_denials_count: ${denials}"$'\n'; fi
            if [ "$is_error" = "true" ];   then reasons="${reasons}- result.is_error: true"$'\n'; fi
            if [ -n "$api_error" ];        then reasons="${reasons}- api_error_status: ${api_error}"$'\n'; fi
            if [ "$outcome" = "failure" ]; then reasons="${reasons}- action outcome: failure"$'\n'; fi

            if [ -n "$reasons" ]; then
              echo "has_issues=true"     >> "$GITHUB_OUTPUT"
            else
              echo "has_issues=false"    >> "$GITHUB_OUTPUT"
            fi
            echo "has_transcript=true"   >> "$GITHUB_OUTPUT"
          fi

          {
            echo "reasons<<EOF_REASONS"
            printf "%s" "$reasons"
            echo
            echo "EOF_REASONS"
          } >> "$GITHUB_OUTPUT"

          echo "--- inspect summary ---"
          echo "outcome:        $outcome"
          echo "has_transcript: $([ -f "$transcript" ] && echo true || echo false)"
          echo "reasons:"
          printf "%s" "$reasons"

      - name: Upload Claude execution transcript (only when problematic)
        if: steps.inspect.outputs.has_issues == 'true' && steps.inspect.outputs.has_transcript == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-${{ github.run_id }}
          path: ${{ steps.claude_run.outputs.execution_file }}
          retention-days: 30
          if-no-files-found: warn

      - name: Open GitHub issue for problematic execution
        if: steps.inspect.outputs.has_issues == 'true'
        env:
          GH_TOKEN: ${{ secrets.ACTIONS_PAT }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REASONS: ${{ steps.inspect.outputs.reasons }}
          HAS_TRANSCRIPT: ${{ steps.inspect.outputs.has_transcript }}
        run: |
          # Dedupe by title prefix — same posture as before. Once an
          # open issue exists, subsequent runs won't pile on until
          # /triage closes/labels it. PAT scope: Issues:write at
          # content level (no label-management permission needed).
          existing=$(gh issue list --search 'in:title "Cloud march execution had issues" state:open' --json number --jq 'length')
          if [ "$existing" != "0" ]; then
            echo "An open 'Cloud march execution had issues' issue already exists — skipping."
            exit 0
          fi

          if [ "$HAS_TRANSCRIPT" = "true" ]; then
            transcript_line="**Transcript:** download the \`claude-execution-${{ github.run_id }}\` artifact from the run page (Artifacts section). 30-day retention."
          else
            transcript_line="**Transcript:** unavailable — action crashed before writing one."
          fi

          # Build the issue body via a temp file. A here-doc here would
          # require the body lines to start at column 0 in this YAML,
          # which terminates the surrounding `run: |` block scalar.
          # Per-line echo into a file keeps every script line at the
          # YAML scalar's indent level — no parse ambiguity.
          body_file="$(mktemp)"
          {
            echo "The cloud /march tick at ${RUN_URL} surfaced one or more execution issues."
            echo
            echo "**Signals:**"
            printf '%s\n' "${REASONS}"
            echo
            echo "${transcript_line}"
            echo
            echo "The next /triage tick will classify and label this issue."
          } > "$body_file"

          gh issue create \
            --title "Cloud march execution had issues: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --body-file "$body_file"
