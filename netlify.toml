# Netlify configuration for thock
# Connect this repo to https://app.netlify.com → site at https://thock.netlify.app

[build]
  command = "pnpm install --frozen-lockfile && pnpm --filter @thock/web build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NPM_FLAGS = "--version" # forces Netlify to defer to pnpm via lockfile
  NEXT_TELEMETRY_DISABLED = "1"

# The Next.js runtime plugin is auto-installed by Netlify on Next.js sites.
# Pin it explicitly so a fresh deploy never silently changes builder versions.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-cache static assets; HTML is served fresh.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers — conservative, can be tuned per-route in middleware later.
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
